rp Suite [Most Voted}", "Wireshark"], "c": [2], "e": null}, {"q": "A bank stores and processes sensitive privacy information related to home loans. However, auditing has never been enabled on the system. What\nis the first step that the bank should take before enabling the audit feature?", "a": ["Perform a vulnerability scan of the system.", "Perform a cost/benefit analysis of the audit feature.", "Allocate funds for staffing of audit log review.", "Determine the impact of enabling the audit feature."], "c": [3], "e": null}, {"q": "A penetration tester is performing the footprinting process and is reviewing publicly available information about an organization by using the\nGoogle search engine.\nWhich of the following advanced operators would allow the pen tester to restrict the search to the organization's web domain?", "a": ["[link:]", "[allinurl:]", "[site:]", "[location:]"], "c": [2], "e": null}, {"q": "The security team of Debry Inc. decided to upgrade Wi-Fi security to thwart attacks such as dictionary attacks and key recovery attacks. For this\npurpose, the security team started implementing cutting-edge technology that uses a modern key establishment protocol called the simultaneous\nauthentication of equals (SAE), also known as dragonfly key exchange, which replaces the PSK concept.\nWhat is the Wi-Fi encryption technology implemented by Debry Inc.?", "a": ["WEP", "WPA3", "WPA2", "WPA"], "c": [1], "e": null}, {"q": "A security analyst uses Zenmap to perform an ICMP timestamp ping scan to acquire information related to the current time from the target host\nmachine.\nWhich of the following Zenmap options must the analyst use to perform the ICMP timestamp ping scan?", "a": ["-PP", "-PU", "-PY", "-Pn"], "c": [0], "e": null}, {"q": "An attacker decided to crack the passwords used by industrial control systems. In this process, he employed a loop strategy to recover these\npasswords. He used one character at a time to check whether the first character entered is correct; if so, he continued the loop for consecutive\ncharacters. If not, he terminated the loop. Furthermore, the attacker checked how much time the device took to finish one complete password\nauthentication process, through which he deduced how many characters entered are correct.\nWhat is the attack technique employed by the attacker to crack the passwords of the industrial control systems?", "a": ["Side-channel attack", "Buffer overflow attack", "HMI-based attack", "Denial-of-service attack"], "c": [0], "e": null}, {"q": "Topic 1\nGiven below are different steps involved in the vulnerability-management life cycle.                         Topic 1\n1) Remediation\n2)) Identify assets and create a baseline\n3) Verification\n4) Monitor\n5)) Vulnerability scan\n6) Risk assessment\nIdentify the correct sequence of steps involved in vulnerability management.", "a": ["2>-1->5-6>4-3", "2>5>6-1-3-4", "2>-4-5-3-6-1", "1>2>3---4-5-6"], "c": [1], "e": null}, {"q": "Which type of attack attempts to overflow the content-addressable memory (CAM) table in an Ethernet switch?", "a": ["DDoS attack", "DNS cache flooding", "Evil twin attack", "MAC flooding"], "c": [3], "e": null}, {"q": "What is the following command used for?\nsqlmap.py -u \"http://10.10.1.20/?p=1&forumaction=search\" -dbs", "a": ["Searching database statements at the IP address given", "Creating backdoors using SQL injection", "Enumerating the databases in the DBMS for the URL", "Retrieving SQL statements being executed on the database"], "c": [2], "e": null}, {"q": "Jane is working as a security professional at CyberSol Inc. She was tasked with ensuring the authentication and integrity of messages being\ntransmitted in the corporate network. To encrypt the messages, she implemented a security model in which every user in the network maintains a\nring of public keys. In this model, a user needs to encrypt a message using the receiver's public key, and only the receiver can decrypt the\nmessage using their private key.\nWhat is the security model implemented by Jane to secure corporate messages?", "a": ["Secure Socket Layer", "Zero trust network", "Web of trust", "Transport Layer Security"], "c": [2], "e": null}, {"q": "Clark, a professional hacker, attempted to perform a Btlejacking attack using an automated tool, BtleJack, and hardware tool, micro:bit. This\nattack allowed Clark to hijack, read, and export sensitive information shared between connected devices. To perform this attack, Clark executed\nvarious btlejack commands.\nWhich of the following commands was used by Clark to hijack the connections?", "a": ["btlejack -f 0x129f3244 -j", "btlejack -f 0x9c68fd30 -t -m Ox fffffffff", "btlejack -d /dev/ttyACMO -d /dev/ttyACM2 -s", "btlejack -c any"], "c": [0], "e": null}, {"q": "John, a professional hacker, targeted CyberSol Inc., an MNC. He decided to discover the loT devices connected in the target network that are\nusing default credentials and are vulnerable to various hijacking attacks. For this purpose, he used an automated tool to scan the target network\nfor specific types of loT devices and detect whether they are using the default, factory-set credentials.\nWhat is the tool employed by John in the above scenario?", "a": ["loT Inspector", "Azure loT Central", "loTSeeker", "AT&T loT Platform"], "c": [2], "e": null}, {"q": "To hide the file on a Linux system, you have to start the filename with a specific character.\nWhat is the character?", "a": ["Period", "Tilde", "Underscore", "Exclamation mark"], "c": [0], "e": null}, {"q": "Tony wants to integrate a 128-bit symmetric block cipher with key sizes of 128, 192, or 256 bits into a software program, which involves 32 rounds\nof computational operations that include substitution and permutation operations on four 32-bit word blocks using 8-variable S-boxes with 4-bit\nentry and 4-bit exit.\nWhich of the following algorithms includes all the above features and can be integrated by Tony into the software program?", "a": ["Serpent", "CAST-128", "TEA", "RCS"], "c": [0], "e": null}, {"q": "Jacob works as a system administrator in an organization. He wants to extract the source code of a mobile application and disassemble the\napplication to analyze its design flaws. Using this technique, he wants to fix any bugs in the application, discover underlying vulnerabilities, and\nimprove defense strategies against attacks.\nWhat is the technique used by Jacob in the above scenario to improve the security of the mobile application?", "a": ["Social engineering", "App sandboxing", "Reverse engineering", "Jailbreaking"], "c": [2], "e": null}, {"q": "Mirai malware targets loT devices. After infiltration, it uses them to propagate and create botnets that are then used to launch which types of\nattack?", "a": ["DDoS attack", "Password attack", "Birthday attack", "MITM attack"], "c": [0], "e": null}, {"q": "Bill has been hired as a penetration tester and cyber security auditor for a major credit card company.\nWhich information security standard is most applicable to his role?", "a": ["Sarbanes-Oxley Act", "HITECH", "FISMA", "PCI-DSS"], "c": [3], "e": null}, {"q": "Geena, a cloud architect, uses a master component in the Kubernetes cluster architecture that scans newly generated pods and allocates a node\nto them. This component can also assign nodes based on factors such as the overall resource requirement, data locality,\nsoftware/hardware/policy restrictions, and internal workload interventions.\nWhich of the following master components is explained in the above scenario?", "a": ["Kube-sche[MdosutlVoetedr}", "Kube-controller-manager", "Etcd cluster", "Kube-apiserver"], "c": [0], "e": null}, {"q": "According to the NIST cloud deployment reference architecture, which of the following provides connectivity and transport services to\nconsumers?", "a": ["Cloud provider", "Cloud connector", "Cloud carrier", "Cloud broker"], "c": [2], "e": null}, {"q": "A group of hackers were roaming around a bank office building in a city, driving a luxury car. They were using hacking tools on their laptop with the\nintention to find a free-access wireless network. What is this hacking process known as?", "a": ["Spectrum analysis", "Wardriving", "GPS mapping", "Wireless sniffing"], "c": [1], "e": null}, {"q": "Which among the following is the best example of the third step (delivery) in the cyber kill chain?", "a": ["An intruder's malware is installed on a targets machine.", "An intruder's malware is triggered when a target opens a malicious email attachment.", "An intruder sends a malicious attachment via email to a target.", "An intruder creates malware to be used as a malicious attachment to an email."], "c": [2], "e": null}, {"q": "Calvin, a grey-hat hacker, targets a web application that has design flaws in its authentication mechanism. He enumerates usernames from the\nlogin form of the web application, which requests users to feed data and specifies the incorrect field in case of invalid credentials. Later, Calvin\nuses this information to perform social engineering.\nWhich of the following design flaws in the authentication mechanism is exploited by Calvin?", "a": ["User impersonation", "Password reset mechanism", "Insecure transmission of credentials", "Verbose failure messages"], "c": [3], "e": null}, {"q": "Rebecca, a security professional, wants to authenticate employees who use web services for safe and secure communication. In this process, she\nemploys a component of the Web Service Architecture, which is an extension of SOAP, and it can maintain the integrity and confidentiality of SOAP\nmessages.\nWhich of the following components of the Web Service Architecture is used by Rebecca for securing the communication?", "a": ["WS-Security", "WSDL", "WS-Work Processes", "WS-Policy"], "c": [0], "e": null}, {"q": "Which wireless security protocol replaces the personal pre-shared key (PSK) authentication with Simultaneous Authentication of Equals (SAE) and\nis therefore nformation about specific threats\nagainst the organization. From this information, he retrieved contextual information about security events and incidents that helped him disclose\npotential risks and gain insight into attacker methodologies. He collected the information from sources such as humans, social media, and chat\nrooms as well as from events that resulted in cyberattacks. In this process, he also prepared a report that includes identified malicious activities,\nrecommended courses of action, and warnings for emerging attacks.\nWhat is the type of threat intelligence collected by Arnold in the above scenario?", "a": ["Tactical threat intelligence", "Operational threat intelligence", "Technical threat intelligence", "Strategic threat intelligence"], "c": [1], "e": null}, {"q": "Which of the following types of SQL injection attacks extends the results returned by the original query, enabling attackers to run two or more\nstatements if they have the same structure as the original one?", "a": ["Boolean-based blind SQL injection", "Blind SQL injection", "Error-based injection", "Union SQL injection"], "c": [3], "e": null}, {"q": "What information security law or standard aims at protecting stakeholders and the general public from accounting errors and fraudulent activities\nwithin organizations?", "a": ["PCI-DSS", "SOX", "FISMA", "ISO/IEC 27001:2013"], "c": [1], "e": null}, {"q": "Which of the following web vulnerabilities would an attacker be attempting to exploit if they delivered the following input?\n\u003c!DOCTYPE blah [ \u003c !ENTITY trustme SYSTEM \"file:///etc/passwd\" > ] >", "a": ["XXS", "SQLi                                  C", "IDOR", "XXE"], "c": [3], "e": null}, {"q": "What useful information is gathered during a successful Simple Mail Transfer Protocol (SMTP) enumeration?", "a": ["Reveals the daily outgoing message limits before mailboxes are locked.", "The internal command RCPT provides a list of ports open to message traffic.", "The two internal commands VRFY and EXPN provide a confirmation of valid users, email addresses, aliases, and mailing lists.", "A list of all mail proxy server addresses used by the targeted host."], "c": [2], "e": null}, {"q": "When considering how an attacker may exploit a web server, what is web server footprinting?", "a": ["When an attacker creates a complete profile of the site's external links and file structures", "When an attacker uses a brute-force attack to crack a web-server password", "When an attacker implements a vulnerability scanner to identity weaknesses", "When an attacker gathers system-level data, including account details and server names"], "c": [0], "e": null}, {"q": "An attacker identified that a user and an access point are both compatible with WPA2 and WPA3 encryption. The attacker installed a rogue access\npoint with only WPA2 compatibility in the vicinity and forced the victim to go through the WPA2 four-way handshake to get connected. After the\nconnection was established, the attacker used automated tools to crack WPA2-encrypted messages.\nWhat is the attack performed in the above scenario?", "a": ["Timing-based attack", "Side-channel attack", "Cache-based attack", "Downgrade security attack"], "c": [3], "e": null}, {"q": "James is working as an ethical hacker at Technix Solutions. The management ordered James to discover how vulnerable its network is towards\nfootprinting attacks. James took the help of an open-source framework for performing automated reconnaissance activities. This framework\nhelped James in gathering information using free tools and resources.\nWhat is the framework used by James to conduct footprinting and reconnaissance activities?", "a": ["OSINT framework", "WebSploit Framework", "SpeedPhish Framework", "Browser Exploitation Framework"], "c": [0], "e": null}, {"q": "What would be the purpose of running \"wget 192.168.0.15 -q -S\" against a web server?", "a": ["Performing content enumeration on the web server to discover hidden folders", "Flooding the web server with requests to perform a DoS attack", "Using wget to perform banner grabbing on the webserver", "Downloading all the contents of the web page locally for further examination"], "c": [2], "e": null}, {"q": "Harris is attempting to identify the OS running on his target machine. He inspected the initial TTL in the IP header and the related TCP window size\nand obtained the following results:\nTTL: 64 -\nWindow Size: 5840 -\nWhat the OS running on the target machine?", "a": ["Mac OS", "Solaris OS", "Linux OS", "Windows OS"], "c": [2], "e": null}, {"q": "Calvin, a software developer, uses a feature that helps him auto-generate the content of a web page without manual involvement and is integrated\nwith SSI directives. This leads to a vulnerability in the developed web application as this feature accepts remote user inputs and uses them on the\npage. Hackers can exploit this feature and pass malicious SSI directives as input values to perform malicious activities such as modifying and\nerasing server files.\nWhat is the type of injection attack Calvin's web application is susceptible to?", "a": ["Server-side template injection", "Server-side includes injection", "CRLF injection", "Server-side JS injection"], "c": [1], "e": null}, {"q": "Jack, a professional hacker, targets an organization and performs vulnerability scanning on the target web server to identify any possible\nweaknesses, vulnerabilities, and misconfigurations. In this process, Jack uses an automated tool that eases his work and performs vulnerability\nscanning to find hosts, services, and other vulnerabilities in the target server.\nWhich of the following tools is used by Jack to perform vulnerability scanning?", "a": ["WebCopier Pro", "Infoga", "NCollector Studio", "Netsparker"], "c": [3], "e": null}, {"q": "Stephen, an attacker, targeted the industrial control systems of an organization. He generated a fraudulent email with a malicious attachment and\nsent it to employees of the target organization. An employee who manages the sales software of the operational plant opened the fraudulent\nemail and clicked on the malicious attachment. This resulted in the malicious attachment being downloaded and malware being injected into the\nsales software maintained in the victim's system. Further, the malware propagated itself to other networked systems, finally damaging the\nindustrial automation components.\nWhat is the attack technique used by Stephen to damage the industrial systems?", "a": ["Spear-phishing attack", "HMI-based attack", "Reconnaissance attack", "SMishing attack"], "c": [0], "e": null}, {"q": "In an attempt to damage the reputation of a competitor organization, Hailey, a professional hacker, gathers a list of employee and client email\naddresses and other related information by using various search engines, social networking sites, and web spidering tools. In this process, she\nalso uses an automated tool to gather a list of words from the target website to further perform a brute-force attack on the previously gathered\nemail addresses.\nWhat is the tool used by Hailey for gathering a list of words from the target website?", "a": ["Orbot", "CeWL", "Psiphon", "Shadowsocks"], "c": [1], "e": null}, {"q": "Miley, a professional hacker, decided to attack a target organization's network. To perform the attack, she used a tool to send fake ARP messages\nover the target network to link her MAC address with the target system's IP address. By performing this, Miley received messages directed to the\nvictim's MAC address and further used the tool to intercept steal, modify, and block sensitive communication to the target system.\nWhat is the tool employed by Miley to perform the above attack?", "a": ["BetterCAP", "Gobbler", "DerpNSpoof", "Wireshark"], "c": [0], "e": null}, {"q": "George, an employee of an organization, is attempting to access restricted websites from an official computer. For this purpose, he used an\nanonymizer that masked his real IP address and ensured complete and continuous anonymity for all his online activities.\nWhich of the following anonymizers helps George hide his activities?", "a": ["https://www.baidu.com", "https://www.wolframalpha.com", "https://www.guardster.com", "https://karmadecay.com"], "c": [2], "e": null}, {"q": "Kevin, an encryption specialist, implemented a technique that enhances the security of keys used for encryption and authentication. Using this\ntechnique, Kevin input an initial key to an algorithm that generated an enhanced key that is resistant to brute-force attacks.\nWhat is the technique employed by Kevin to improve the security of encryption keys?", "a": ["Key stretching", "Public key infrastructure", "Key reinstallation", "Key derivation function"], "c": [0], "e": null}, {"q": "Jake, a professional hacker, installed spyware on a target iPhone to spy on the target user's activities. He can take complete control of the target\nmobile device by jailbreaking the device remotely and record audio, capture screenshots, and monitor all phone calls and SMS messages.\nWhat is the type of spyware that Jake used to infect the target device?", "a": ["Trident", "Zscaler", "DroidSheep", "Androrat"], "c": [0], "e": null}, {"q": "Robert, a professional hacker, is attempting to execute a fault injection attack on a target loT device. In this process, he injects faults into the\npower supply that can be used for remote execution, also causing the skipping of key instructions. He also injects faults into the clock network\nused for delivering a synchronized signal across the chip.\nWhich of the following types of fault injection attack is performed by Robert in the above scenario?", "a": ["Power/clock/reset glitching", "Frequency/voltage tampering", "Optical, electromagnetic fault injection", "Temperature attack"], "c": [0], "e": null}, {"q": "Kate dropped her phone and subsequently encountered an issue with the phone's internal speaker. Thus, she is using the phone's loudspeaker for\nphone calls and other activities. Bob, an attacker, takes advantage of this vulnerability and secretly exploits the hardware of Kate's phone so that\nhe can monitor the loudspeaker's output from data sources such as voice assistants, multimedia messages, and audio files by using a malicious\napp to breach speech privacy.\nWhat is the type of attack Bob performed on Kate in the above scenario?", "a": ["SIM card attack", "aLTEr attack", "Spearphone attack", "Man-in-the-disk attack"], "c": [2], "e": null}, {"q": "Dayn, an attacker, wanted to detect if any honeypots are installed in a target network. For this purpose, he used a time-based TCP fingerprinting\nmethod to validate the response to a normal computer and the response of a honeypot to a manual SYN request.\nWhich of the following techniques is employed by Dayn to detect honeypots?", "a": ["Detecting the presence of Snort_inline honeypots", "Detecting the presence of Honeyd honeypots", "Detecting honeypots running on VMware", "Detecting the presence of Sebek-based honeypots"], "c": [1], "e": null}, {"q": "Morris, an attacker, wanted to check whether the target AP is in a locked state. He attempted using different utilities to identify WPS-enabled APs\nin the target wireless network. Ultimately, he succeeded with one special command-line utility.\nWhich of the following command-line utilities allowed Morris to discover the WPS-enabled APs?", "a": ["wash", "net view", "ntptrace", "macof"], "c": [0], "e": null}, {"q": "BitLocker encryption has been implemented for all the Windows-based computers in an organization. You are concerned that someone might lose\ntheir cryptographic key. Therefore, a mechanism was implemented to recover the keys from Active Directory.\nWhat is this mechanism called in cryptography?", "a": ["Certificate rollover", "Key renewal", "Key archival", "Key escrow"], "c": [3], "e": null}, {"q": "A post-breach forensic investigation revealed that a known vulnerability in Apache Struts was to blame for the Equifax data breach that affected\n143 million customers. A fix was available from the software vendor for several months prior to the intrusion. This is likely a failure in which of the\nfollowing security processes?", "a": ["Secure development lifecycle", "Vendor risk management", "Patch management", "Security awareness training"], "c": [2], "e": null}, {"q": "Which type of malware spreads from one system to another or from one network to another and causes similar types of damage as viruses do to\nthe infected system?", "a": ["Adware", "Worm", "Rootkit", "Trojan"], "c": [1], "e": null}, {"q": "Which is the first step followed by Vulnerability Scanners for scanning a network?", "a": ["TCP/UDP Port scanning", "Firewall detection", "Checking if the remote host is alive", "OS Detection"], "c": [2], "e": null}, {"q": "Which Nmap switch helps evade IDS or firewalls?", "a": ["-n/-R", "-T", "-D", "-oN/-oX/-0G"], "c": [1], "e": null}, {"q": "A \"Server-Side Includes\" attack refers to the exploitation of a web application by injecting scripts in HTML pages or executing arbitrary code\nremotely.\nWhich web-page file type, if it exists on the web server, is a strong indication that the server is vulnerable to this kind of attack?", "a": [".html", ".stm", ".cms", ".rss"], "c": [1], "e": null}, {"q": "Harper, a software engineer, is developing an email application. To ensure the confidentiality of email messages, Harper uses a symmetric-key\nblock cipher having a classical 12- or 16-round Feistel network with a block size of 64 bits for encryption, which includes large 8 x 32-bit S-boxes\n(S1, $2, $3, $4) based on bent functions, modular addition and subtraction, key-dependent rotation, and XOR operations. This cipher also uses a\nmasking key (Km1) and a rotation key (Kr1) for performing its functions.\nWhat is the algorithm employed by Harper to secure the email messages?", "a": ["GOST block cipher", "AES", "DES", "CAST-128"], "c": [3], "e": null}, {"q": "Ron, a security professional, was pen testing web applications and SaaS platforms used by his company. While testing, he found a vulnerability\nthat allows hackers to gain unauthorized access to API objects and perform actions such as view, update, and delete sensitive data of the\ncompany.\nWhat is the API vulnerability revealed in the above scenario?", "a": ["Business logic flaws", "No ABAC validation", "Code injections", "Improper use of CORS"], "c": [1], "e": null}, {"q": "Louis, a professional hacker, had used specialized tools or search engines to encrypt all his browsing activity and navigate anonymously to obtain\nsensitive/hidden information about official government or federal databases. After gathering the information, he successfully performed an attack\non the target government organization without being traced. Which of the following techniques is described in the above scenario?", "a": ["Dark web footprinting", "VoIP footprinting", "VPN footprinting", "Website footprinting"], "c": [0], "e": null}, {"q": "Thomas, a cloud security professional, is performing security assessment on cloud services to identify any loopholes. He detects a vulnerability in\na bare-metal cloud server that can enable hackers to implant malicious backdoors in its firmware. He also identified that an installed backdoor\ncan persist even if the server is reallocated to new clients or businesses that use it as an laaS.\nWhat is the type of cloud attack that can be performed by exploiting the vulnerability discussed in the above scenario?", "a": ["Metadata spoofing attack", "Cloud cryptojacking", "Cloudborne attack", "Man-in-the-cloud attack"], "c": [2], "e": null}, {"q": "Which of the following tactics uses malicious code to redirect users' web traffic?", "a": ["Phishing", "Spimming", "Pharming", "Spear-phishing"], "c": [2], "e": null}, {"q": "You are a security analyst for a medium-sized e-commerce company. Recently, the company has been suffering from repeated incidents of\nsession hijacking. To prevent future incidents, you've been asked to suggest a robust strategy to mitigate this disk.\nWhich of the following approaches would you recommend?", "a": ["Implement a new physical security policy to prevent unauthorized access to the company's data centres.", "Implement a security awareness program to educate employees on the risks and signs of session hijacking.", "Deploy a network-based intrusion prevention system to detect and prevent session hijacking attempts in real-time.", "Apply an IPsec VPN solution that encrypts the entire IP packet, thereby making session hijacking attempts more difficult."], "c": [3], "e": null}, {"q": "As an IT professional, you are attending a webinar on cybersecurity. The presenter emphasizes the importance of ethical hacking and the different\ntypes of hackers involved in the cyber world. Suddenly, the term \"script kiddie\" is mentioned, piquing your curiosity.\nAccording to the presenter, who are \"script kiddies\" in the context of ethical hacking?", "a": ["They are ethical hackers who use scripts to conduct penetration testing on their systems.", "They are hackers who specialize in scripting languages to launch sophisticated cyberattacks.", "They are novices in the hacking world who mainly use scripts and codes developed by others.", "They are highly skilled hackers who write their scripts to breach security systems."], "c": [2], "e": null}, {"q": "At XYZ Corporation, a multinational firm known for its digital services, the cybersecurity team is tasked with ensuring a robust, secure network\nenvironment. This responsibility includes maintaining a keen focus on vulnerability assessment and patch management strategies to guard\nagainst potential threats, including the increasingly prevalent zero-day attacks. Recent intelligence has alerted the team to a concerning issue: the\nprimary web server software that the corporation relies on for its critical operations has been hit with a newly discovered zero-day vulnerability.\nAlarmingly, this vulnerability is not just theoretical; active exploitations of this vulnerability have been spotted in the wild, making the threat\nimmediate and real. However, the vendor of the software, caught off guard by the discovery, has not yet released an official patch to mitigate this\nvulnerability.\nGiven these circumstances, what is the FIRST step that the cybersecurity team at XYZ Corporation should undertake to manage the significant risk\nposed by this unpatched zero-day vulnerability?", "a": ["Proactively shut down the web server completely until an official patch is released by the software vendor to fix the identified vulnerability.", "Swiftly apply a virtual patch to the affected web server using a web application firewall to temporarily safeguard against potential exploits.", "Initiate a regimented protocol of regular backups of the web server data and ensure a thoroughly developed incident response plan is ready", "Maintain the course of normal operations but keep a close watch on the web server for any unusual activities or signs of a potential attack."], "c": [1], "e": null}, {"q": "A cybersecurity team at a multinational company notices unusual network traffic on their Bluetooth devices. It is suspected to be a Bluesnarfing\nattack, aimed at accessing unauthorized information from Bluetooth-enabled devices.\nWhich of the following would be the most effective countermeasure to prevent further unauthorized access?", "a": ["Disable \"Discoverable Mode\" and activate \"Non-discoverable Mode\" on all Bluetooth devices.", "Implement network-level encryption on all data transmission over Bluetooth.", "Regularly update Bluetooth devices to the latest firmware versions.", "Increase the complexity and length of the PIN codes on Bluetooth devices."], "c": [0], "e": null}, {"q": "As an Ethical Hacker, you've been asked to test an application's vulnerability to SQL injection. In the process, you discover an entry field that\nappears susceptible. However, the backend database is unknown, and regular SQL injection techniques have so far failed to elicit useful\ninformation.\nWhich advanced SQL injection technique should you apply next?", "a": ["Time-Based Blind SQL Injection", "Error-Based SQL Injection", "Union-Based SQL Injection", "Content-Based Blind SQL Injection"], "c": [0], "e": null}, {"q": "A prominent healthcare organization relies on mobile platforms to access electronic health records (EHR) and facilitate communication among\nhealthcare professionals. Recently, the security team detected suspicious activities indicating potential vulnerabilities in the mobile platforms,\nraising concerns about unauthorized access to sensitive patient data and potential breaches of medical privacy laws. The team is tasked with\nidentifying advanced hacking techniques targeting mobile platforms and implementing robust measures to enhance mobile security and protect\npatient confidentiality.\nGiven the scenario described, which sophisticated hacking technique, resembling a scenario-based attack, poses the greatest challenge for the\nsecurity team to detect and mitigate effectively, potentially compromising the security of the healthcare organization's mobile platforms?", "a": ["App Spoofing Impersonating Legitimate Healthcare Apps to Trick Users into Providing Sensitive Information, Such as Medical History or", "Bluejacking Exploiting Bluetooth Connections to Send Unsolicited Messages or Malicious Links to Nearby Mobile Devices, Potentially", "Zero-Day Exploits Leveraging Previously Unknown Vulnerabilities in Mobile Operating Systems or Applications to Gain Unauthorized Access", "Side-Channel Attack Exploiting Physical Characteristics of Mobile Devices, such as Power Consumption or Electromagnetic Emissions, to"], "c": [2], "e": null}, {"q": "During a red team exercise, an attacker dresses as a network technician and gains unchallenged access to a restricted area. Once inside, he\nroams freely, observing employees and reviewing sensitive documents left unattended.\nWhich of the following tactics best represents this scenario?", "a": ["Pretending to offer remote tech support over a call to obtain credentials.", "Gaining physical access by assuming the identity of a trusted internal staff.", "Collecting confidential information by digging through trash bins.", "Calling the help desk and claiming to be a high-ranking executive needing urgent access."], "c": [1], "e": null}, {"q": "During an investigation, an ethical hacker discovered that a web application's API has been compromised, leading to unauthorized access and\ndata manipulation. They identified webhooks and a webshell being used by the attacker.\nTo prevent further exploits, which of the following actions should be taken?", "a": ["Perform regular code reviews for the webhooks and modify the API to block connections from unknown IP addresses.", "Implement a Web Application Firewall with rules to block webshell traffic and increase the logging verbosity of webhooks.", "Implement input validation on all API endpoints, review webhook payloads, and schedule regular scanning for webshells.", "Harden the web server security, add multi-factor authentication for API users, and restrict the execution of scripts server-side."], "c": [3], "e": null}, {"q": "You are a security analyst investigating a network compromise. The infected systems are receiving external instructions, masking the control\ntraffic using widely allowed protocols like HTTP and DNS. The payloads are stealthy and modify system components without saving files to disk.\nWhat would be the most effective action to detect and disrupt this kind of malware communication?", "a": ["Focus on updating antivirus signatures regularly to catch known malware variants.", "Use behavioral analytics to monitor for irregular outbound requests and abnormal application behavior.", "Configure proxy servers to allow only encrypted traffic and block all plain HTTP requests.", "Implement port blocking for common malware-associated ports like 6667 and 12345."], "c": [1], "e": null}, {"q": "While performing a vulnerability assessment for XYZ Corporation, you discover that several key systems are regularly interacting with unidentified\nexternal entities. These interactions often involve data transfers, both incoming and outgoing. While some of these might be legitimate, the nature\nand volume of this unmonitored traffic raise concerns about potential data exfiltration or malware introduction.\nGiven the ambiguous nature of these interactions and the high stakes involved, which strategy would most directly identify and mitigate the\nvulnerabilities associated with these unsanctioned exchanges?", "a": ["Initiate a deep-dive forensic analysis on the systems involved, looking for signs of past breaches, malware, or unauthorized data", "Implement an aggressive zero-trust model across the board, cutting off all external interactions until each can be individually vetted and", "Institute a company-wide training session on the dangers of unsolicited communications, hoping to curtail inadvertent employee", "Prioritize a behavioral analytics solution that profiles normal system behaviors and alerts on deviations, focusing on the interaction"], "c": [3], "e": null}, {"q": "As a security expert for a prominent tech company, you've noticed an increasing number of attacks on your web services. You've concluded that\nthe best course of action is to enhance your patch management strategies.\nConsidering the information presented, which of the following strategies would be most effective in ensuring the secure and efficient\nmanagement of patches and hotfixes?", "a": ["Implementing an automatic patch management process and using a patch management tool to monitor the patched systems.", "Downloading and applying all patches and hotfixes, regardless of the source, to cover all possible vulnerabilities.", "Only applying patches and hotfixes that are distributed outside the customer organization to avoid vendor-specific vulnerabilities.", "Manual installation of patches and hotfixes on the live server directly from the vendors' websites."], "c": [0], "e": null}, {"q": "A Certified Ethical Hacker (CEH) is investigating a recent attack on a company's web server. The server hosts multiple domains and uses a web\nproxy to maintain anonymity and prevent IP blocking. The CEH discovers that the server's document root directory, which stores critical HTML\nfiles, is named \"certroot\" and is stored in the directory /admin/web. The server root, which stores the server's configuration, error, executable, and\nlog files, is also identified. The CEH also notes that the server uses a virtual document tree for additional storage. The server was compromised\nvia a DNS server hijacking attack where the attacker redirected all requests coming towards the target web server to their own malicious server.\nGiven this scenario which of the following actions would most likely prevent such an attack in the future?", "a": ["Implementing an open-source web server architecture such as LAMP", "Implementing DNSSEC on the DNS server", "Changing the server's IP address regularly", "Regularly updating and patching the server software"], "c": [1], "e": null}, {"q": "During a cybersecurity operation, a CEH professional discovered an unknown Bluetooth Low Energy (BLE) device actively transmitting pairing\nsignals. The professional decided to breach the BLE device using a crackle. The device was seen pairing and exchanging keys, leading to the\nestablishment of a secure connection. However, the professional only managed to capture LL_ENC_REQ and LL_ENC_RSP packets, but not the\nLong-Term Key (LTK).\nWhich of the following best describes the professional's next course of action?", "a": ["The operation cannot continue without the LTK.", "Decrypt the pcap data using the -o option.", "Use the BlueZ tool hcitool ing to reveal more information about the device.", "Use Btlejacking to hijack the connection."], "c": [0], "e": null}, {"q": "A multinational corporation provides its employees with mobile devices to support remote work and enhance productivity. Recently, the security\nteam detected suspicious activities indicating potential vulnerabilities in the mobile platforms, raising concerns about unauthorized access and\ndata leakage. The team is tasked with identifying advanced hacking techniques targeting mobile platforms and implementing robust measures to\nenhance mobile security and prevent intrusions.\nGiven the scenario described, which sophisticated hacking technique, resembling a scenario-based attack, poses the greatest challenge for the\nsecurity team to detect and mitigate effectively, potentially compromising the security of the multinational corporation's mobile platforms?", "a": ["Jailbreaking/Rooting Exploiting Vulnerabilities to Remove Software Restrictions on Mobile Devices, Allowing Installation of Unauthorized", "Man-in-the-Middle Attack Interfering with Communication between Mobile Devices and Corporate Servers to Intercept Sensitive", "Clickjacking Attack Embedding Malicious Links or Buttons in Legitimate Apps to Trick Users into Performing Unintended Actions, such as", "Remote Access Trojan Implanting Malicious Software on Mobile Devices to Gain Unauthorized Remote Access and Monitor User"], "c": [3], "e": null}, {"q": "In a recent penetration testing assignment, you were able to breach a servers web service and install a backdoor. Your aim is to maintain access\nfor as long as possible without getting detected.\nConsidering the web server countermeasures explained earlier, which of the following actions would make your backdoor most likely to remain\nundetected?", "a": ["Increasing the size of the backdoor's code to avoid signature-based detection.", "Install the backdoor on a non-web file referenced in a URL.", "Placing the backdoor in a file type that is typically excluded from resource maps.", "Embedding the backdoor in a regularly updated web file."], "c": [1], "e": null}, {"q": "During a cybersecurity training session at your organization, you present several hypothetical scenarios to the trainees to assess their\nunderstanding of social engineering threats.\nWhich of these scenarios best describes a social engineering attack?", "a": ["Mary, an IT executive, uses a packet sniffer to monitor network traffic for unusual activity.", "Alex, a system administrator, inadvertently introduces malware into the network while updating the operating system on all company", "John, an employee, leaves his computer unlocked while going for lunch, and a stranger takes this opportunity to access sensitive data.", "Sarah, a new recruit, receives a call from someone claiming to be from the IT department, who asks for her login credentials to solve a non-"], "c": [3], "e": null}, {"q": "As a cybersecurity professional in a growing organization, you are tasked with conducting comprehensive reconnaissance of your own company's\ndigital presence. In addition to using tools like WHOIS, DNS analysis, and search engines, you are also considering investigating the Deep Web.\nWhich of the following justifications best supports your idea to explore the Deep Web for potential risks related to your organization's information?", "a": ["Exploring the Deep Web can help you identify the physical location of potential attackers.", "Search engines don't index the Deep Web, and there could be non-indexed company information lying there.", "The Deep Web is a hub for hackers and can help you understand the latest hacking techniques.", "The Deep Web contains a lot of user-generated content which could reveal insider threats."], "c": [1], "e": null}, {"q": "During an internal security audit, the cybersecurity team at a large healthcare organization detects abnormal patterns in DNS resolution behavior\non the corporate internal network. Several employees report that when they attempt to visit legitimate internal and external websites, they are\nredirected to login pages that appear slightly altered. Upon deeper inspection, security logs reveal that DNS responses are being returned from an\ninternal IP address that is not an authorized DNS server. These rogue responses are consistently faster than the legitimate replies from the\ncorporate DNS server. Around the same time, network monitoring tools register a sharp spike in ARP spoofing alerts originating from a specific\nsubnet. The organization becomes concerned that sensitive login credentials and personal health data may have been intercepted by an insider.\nGiven this scenario, what type of sniffing-based attack is most likely being executed?", "a": ["Internet DNS spoofing via altered primary DNS settings", "Intranet DNS poisoning via local spoofed responses", "Proxy-based DNS redirection over remote tunnels", "DNS cache poisoning from an upstream DNS resolver"], "c": [1], "e": null}, {"q": "The web application security team of a global firm detected a sophisticated injection attack that exploited a flaw in the application's input\nvalidation. The attack was carried out using a custom script that used obfuscation and evasion techniques to bypass security measures. To\ncounter such attacks in the future, the security team is considering implementing additional security measures.\nWhich of the following would be the most effective?", "a": ["Deploy a Web Application Firewall with built-in evasion detection features.", "Configure Security Information and Event Management to monitor user activity in real time.", "Enforce Two-Factor Authentication for all user-level application access.", "Implement continuous security code review and penetration testing."], "c": [0], "e": null}, {"q": "As the newly appointed head of IT security at a growing startup, you have been tasked with improving the company's security posture. Given the\nrise in social engineering attacks, you decide to set up training sessions for employees to help them identify these threats. During a session, you\nask the team to identify the type of social engineering attack where an attacker impersonates a co-worker or an authority figure to extract\nconfidential information.\nWhich option correctly identifies this type of attack?", "a": ["Quid pro quo", "Phishing", "Baiting", "Pretexting"], "c": [3], "e": null}, {"q": "A multinational company is planning to integrate an loT-based environmental control system for its manufacturing units worldwide. They engage a\ncybersecurity team to ensure that the new system remains secure from any potential threats. The cybersecurity team is tasked with identifying the\nmost likely method an advanced persistent threat (APT) group might use to compromise the new loT-based environmental control system.\nWhat is the most plausible attack vector?", "a": ["The APT group will perform an encryption-based Man-in-the-Middle attack between the loT devices and the control server.", "The APT group will execute a DDoS attack to overload the network and gain control over the loT devices.", "The APT group will infiltrate the network using compromised user credentials.", "The APT group will exploit zero-day vulnerabilities present in the loT device firmware."], "c": [3], "e": null}, {"q": "As a newly appointed ethical hacker for XYZ Corporation, you have been assigned your first major task. The company has been facing persistent\ncyber threats and as a precautionary measure, you are tasked to conduct a thorough network vulnerability assessment. Your key objective is to\nefficiently map out all open ports and associated services in the organization's expansive network. Simultaneously, it's of paramount importance\nthat your activities remain stealthy and do not trigger the advanced intrusion detection systems (IDS) employed by the organization.\nGiven these requirements, which scanning technique would you opt for to achieve your task with maximum efficacy and discretion?", "a": ["Stealth Scan", "FIN Scan", "ACK Scan", "TCP Connect Scan"], "c": [0], "e": null}, {"q": "A cybersecurity firm has deployed a comprehensive defense system, including Intrusion Detection Systems (IDS), firewalls, and honeypots, to\nprotect its network from malicious activities. Despite these measures, the security team has noticed suspicious traffic patterns indicating\npotential attempts to evade detection and breach the network perimeter. The team is tasked with identifying advanced evasion techniques and\nstrengthening the defense mechanisms to mitigate emerging threats effectively.\nGiven the scenario described, which sophisticated evasion technique, resembling a scenario-based attack, poses the greatest challenge for the\nsecurity team to detect and mitigate effectively, potentially compromising the integrity of the cybersecurity firm's network?", "a": ["Covert Channel Communication Exploiting Unused IP Header Fields to Conceal Malicious Traffic and Evade Detection by Security Devices", "Protocol-Level Evasion Techniques Fragmenting Packets to Evade Stateful Inspection by Firewalls", "Polymorphic Malware Variants Generating Unique Payloads to Bypass Signature-Based Detection by IDS", "Honeypot Spoofing Attacks Mimicking Legitimate Network Services to Avoid Detection by Intrusion Detection Systems"], "c": [0], "e": null}, {"q": "As a cybersecurity analyst working for a multinational corporation, you are tasked with the responsibility of conducting routine vulnerability scans.\nThis time around, you decided to use a different strategy and opted to employ a FIN scan, which is a type of stealth scanning technique. Upon\nconclusion of your scan, you notice an interesting anomaly -- a significant number of ports did not respond to your FIN packets. With this\nunexpected result, you are now faced with the challenge of correctly interpreting the findings and planning the next course of action.\nBased on your understanding of FIN scanning and TCP/IP protocols, how should you interpret these findings?", "a": ["Conclude that these ports are closed since they did not respond to the FIN packets.", "Consider the possibility of firewall blocking the FIN packets and investigate further.", "Immediately escalate this issue to management as it indicates a potential ongoing breach.", "Interpret this as a sign of network congestion and prioritize network optimization."], "c": [1], "e": null}, {"q": "As a cybersecurity professional conducting a network vulnerability assessment for your organization, you discover a potentially critical\nvulnerability. This vulnerability arises from an outdated software component installed on a critical production server used by the financial\ndepartment. The software vendor has acknowledged this vulnerability and promptly released a patch to fix it. However, the application of the\npatch has been deferred due to the department''s operational needs, as they cannot tolerate downtime during business hours, which would\nsignificantly impact their productivity. The situation poses a significant risk due to the potential for exploitation until the patch is applied.\nWith these constraints in mind, as a Certified Ethical Hacker, what immediate action could you undertake to reduce the risk associated with this\nvulnerability without disrupting department operations?", "a": ["Implement a strategy of Virtual Patching, providing a protective layer around the vulnerability until the actual patch can be applied.", "Initiate a full-scale penetration test on the vulnerable server to evaluate the true potential impact of the vulnerability.", "Insist that the financial department cease all operations and use of the server until the patch has been applied.", "Continually monitor network traffic to and from the server to detect any attempts at exploiting the identified vulnerability."], "c": [0], "e": null}, {"q": "Ared team simulation reveals a malware strain that adapts its behavior based on observed user activity and evades detection by altering its code\ndynamically. The malware exfiltrates data only when the system is idle and uses encrypted channels for communication.\nBased on these traits, what is the most probable nature ofthis malware?", "a": ["Al-powered malware using machine learning to tailor its execution.", "Polymorphic virus that changes its signature during replication.", "A worm that exploits known OS vulnerabilities to propagate.", "Rootkit that hides files and processes from detection."], "c": [0], "e": null}, {"q": "As a cybersecurity consultant, you have been hired by a multinational corporation to identify potential security risks in their network. During the\nenumeration phase, you utilize LDAP to gather information about the network infrastructure. However, you observe that some critical information\nisn't retrievable.\nWhat could be the primary reason for this?", "a": ["The LDAP directory data is protected by Access Control Lists.", "The company network is currently experiencing heavy traffic, leading to dropped requests.", "The LDAP service is running on a non-standard port.", "The hosts are located in a different subnet."], "c": [0], "e": null}, {"q": "A logistics company recently found that some of its fleet vehicles equipped with smart locking systems were compromised, leading to vehicle\nthefts. The cybersecurity team suspects that attackers captured unique signals emitted by the key fobs during regular usage.\nTo effectively confirm and prevent this attack in the future, what should the security team prioritize?", "a": ["Implement a secure firmware update on each vehicle's onboard control system.", "Monitor wireless signals for abnormal jamming or interference.", "Increase physical surveillance around vehicle parking areas.", "Deploy anti-malware systems on all company smartphones associated with vehicles."], "c": [0], "e": null}, {"q": "You are currently serving as a cybersecurity analyst at a global banking corporation. Your team has recently identified a series of irregular\nincidents that indicate a potential backdoor attack on the company's intricate network system. Some of these irregularities include a significant\nrise in outbound network traffic during non-working hours, unexpected and unaccounted system reboots, and strangely modified system files. Your\nprimary focus now is to detect any hidden backdoor in the system, neutralize it, and ensure the overall integrity of the systems involved, while\npreventing any further security breaches.\nGiven the complexity of the situation and the importance of maintaining the bank's network security, what combination of measures would be\nmost effective in accurately identifying the potential backdoor, neutralizing it, and ensuring the system's security?", "a": ["Implement strict access control lists, ensure regular updates of security patches, and conduct an extensive audit of user accounts", "Implement stringent password policies, enforce multi-factor authentication for all users, and conduct regular vulnerability", "Review the firewall logs regularly, perform a thorough analysis of network traffic during non-working hours, and carry out an immediate", "Perform detailed monitoring of system and file activity, incorporate anomaly detection techniques in the security framework, and utilize"], "c": [3], "e": null}, {"q": "A cybersecurity team is assessing an organization's network for misconfigurations. During the enumeration process, they use a tool that sends a\nrequest to UDP port 161 and receives a large list of software names installed on remote devices. The operation is successful due to the use of a\npublicly known community string.\nWhat enabled this enumeration technique to work so effectively?", "a": ["The SNMP agent was misconfigured to log trap messages in plain text.", "The SNMP agent allowed anonymous bulk data queries due to default settings.", "The organization was using unencrypted FTP services to store software data.", "The SNMP manager had access to encrypted Windows registry keys remotely."], "c": [1], "e": null}, {"q": "While conducting a thorough reconnaissance operation on a potential threat actor's digital footprint, an ethical hacker working for a cybersecurity\nfirm stumbled upon an interesting discovery. The threat actor appeared to have left a series of digital breadcrumbs across various internet forums\nand hidden web pages, pointing to a potential future attack strategy. The ethical hacker, wanting to gather as much information as possible about\nthe actor's potential strategy without tipping them off, has to make careful tool and technique choices.\nWhich of the following approaches should the ethical hacker most likely avoid to maintain a low profile and avoid alerting the threat actor?", "a": ["Utilizing internet archive services like the Wayback Machine to inspect any past versions of the threat actor's web pages for additional", "Employing WHOIS and DNS lookup tools to gain information about the ownership and IP addresses associated with the internet forums.", "Using the Tor browser to anonymously browse and investigate the hidden web pages without leaving a trace.", "Directly interacting with the threat actor on the forums using a pseudonym to gain more information about their plans."], "c": [3], "e": null}, {"q": "A cybersecurity analyst working for a multinational corporation is tasked with performing regular surveillance of their competitors' digital\npresence to identify any changes that could indicate strategic shifts or potential threats. To stay updated on their competitors' web content\nupdates, the analyst has devised a plan to use several tools and techniques to achieve his objective efficiently. However, there is a key component\nin his strategy that he overlooked.\nWhich of the following is the most crucial aspect he should add to ensure the effective implementation of his surveillance strategy?", "a": ["Engage in discussions on the competitors' blogs and forums to obtain inside information about their operations.", "Use a VPN service when visiting the competitors' websites to obscure his own IP address.", "Hire a third-party service to hack into the competitors' databases and gather confidential data.", "Set up Google Alerts to receive email notifications whenever new web content includes their competitors' names or other key terms."], "c": [3], "e": null}, {"q": "A security analyst working for a large financial corporation has been assigned to conduct a comprehensive penetration test on the corporation's\nwireless infrastructure. The infrastructure relies on a secured WPA2-PSK-secured network to ensure data protection. During the course of the\nexamination, the analyst discerned a significant vulnerability within the network that could potentially be exploited.\nWhich of the subsequent options most accurately delineates the procedure that the analyst might have employed to pinpoint this particular\nvulnerability?", "a": ["The analyst implemented a jamming attack, deliberately interfering with the wireless network's communication functionality, forcing the", "The analyst conducted a rogue access point attack, cunningly emulating the characteristics of the legitimate access point to deceive", "The analyst initiated a man-in-the-middle attack, surreptitiously intercepting and modifying the communication between the client and the", "The analyst instigated a de-authentication attack, purposely causing a mass disconnection of all clients from the access point. The analyst"], "c": [3], "e": null}, {"q": "As a cybersecurity analyst at a renowned software corporation, you've noticed some peculiar activity. The company's internal network has seen a\nsudden increase in redundant network traffic and system crashes. Initial scans have found that most affected systems run a particular version of\nthe operating system, and the identified malicious code seems to be self-replicating and spreading across the network autonomously.\nConsidering the following malware types, which would you identify as the probable cause of this anomalous behavior? Furthermore, how would\nyou prioritize your response to counteract this malware threat and alleviate the system disruptions?", "a": ["Ransomware: Advise users to disconnect their systems from the network, back up vital data, and utilize a reputable decryption tool to", "Worm: Quarantine the affected systems, perform an immediate network-wide sweep with the latest antivirus definitions, and update the", "Trojan: Initiate a thorough network scan with updated anti-malware tools, isolate the affected systems, and patch all the systems with the", "Rootkit: Recommend a system reboot in safe mode, followed by deployment of an advanced rootkit scanner and subsequent patching of"], "c": [1], "e": null}, {"q": "You are a cybersecurity analyst at a financial institution. Your company hasa strict policy against any unencrypted protocols. You've noticed some\ndata packets being sent via HTTP rather than HTTPS on the network. This raises your concern because HTTP is a protocol that sends data in\nplaintext. To further investigate this matter, you decide to use a sniffing tool.\nWhich of the following would be the most appropriate choice?", "a": ["Netcat", "Nmap", "Nessus", "Wireshark"], "c": [3], "e": null}, {"q": "As part of a security audit, your team evaluates a system flagged by your automated scanner. The tool outputs a vector string with a numerical\nrange of 9.8, indicating a critical severity. However, the client is unsure about the real-world implications of this score. You are tasked with\nexplaining what this score conveys and how it was derived.\nWhich of the following best explains the purpose and benefit of this type of rating in prioritizing remediation efforts?", "a": ["It measures authentication errors in binary protocols to align patching with service configuration.", "It provides a qualitative baseline that supports public exploit classification based on behavior.", "It quantifies technical impact and ease of exploitation, guiding structured risk response based on impact and environment.", "It simplifies attack replication by generating matching exploit payloads from live memory dumps."], "c": [2], "e": null}, {"q": "A red team operator is conducting reconnaissance on a financial organization's infrastructure. While probing UDP port 123, they send NTP queries\nand receive a list of internal IP addresses and connected hostnames. The organization is unaware that sensitive network details are exposed\nexternally.\nWhat is the most likely reason for this information disclosure?", "a": ["The NTP service is using TCP fallback, allowing enumeration through TCP 443.", "The firewall is rerouting NTP traffic to a honeypot that simulates internal hosts.", "The NTP daemon is configured to accept queries from external sources without restriction.", "The DNS resolver for the organization has been poisoned to leak internal names."], "c": [2], "e": null}, {"q": "In a healthcare organization, the network security team detects unusual network activity, indicating advanced sniffing techniques used by a\npotential attacker. Upon investigation, it's found that the attacker exploits vulnerabilities in medical imaging protocols to intercept patient data.\nThe security team must identify the specific sniffing technique being used and take action to protect patient privacy.\nConsidering the scenario, which sophisticated sniffing technique poses the greatest challenge for the security team, potentially compromising\npatient data security?", "a": ["Creating a covert channel within hospital administrative messages for data exfiltration.", "Injecting malicious code into ultrasound machine software to capture patient records.", "Manipulating radiology report formats to embed patient data within CT scan images.", "Exploiting MRI machine firmware vulnerabilities to intercept real-time patient scans."], "c": [0], "e": null}, {"q": "A penetration tester intercepts HTTP requests between a user and a vulnerable web server. The tester observes that the session ID is embedded\nin the URL, and the web application does not regenerate the session upon login.\nWhich session hijacking technique is most likely to succeed in this scenario?", "a": ["Session fixation by pre-setting the token in a URL.", "DNS cache poisoning to redirect users to fake sites.", "Injecting JavaScript to steal session cookies via cross-site scripting.", "Cross-site request forgery exploiting user trust in websites."], "c": [0], "e": null}, {"q": "As a Certified Ethical Hacker, you have been contracted by a leading technology company to test the vulnerabilities in its web application. The\napplication integrates various third-party services and employs multiple APIs. During your advanced testing, you discover a particularly robust\nWeb API that is designed to work with several webhooks. Additionally, you find that the server has a web shell planted for legitimate\nadministrative tasks. Your objective is to exploit vulnerabilities related to the Web API, webhooks, and web shell.\nWhat technique would best allow you to compromise the system effectively while leaving minimal traces?", "a": ["Execute Insecure Direct Object Reference on the Web API to access unauthorized resources.", "Manipulate the webhook to trigger an unintended data transfer between the application and third-party services.", "Utilize SSRF to make unauthorized API calls from the server itself.", "Exploit the web shell by uploading malicious scripts disguised as routine administrative tasks."], "c": [2], "e": null}, {"q": "Following an attack on its mobile infrastructure, an e-commerce company is reconsidering its mobile security strategies. In an event where an\nattacker has been able to gain partial root access to the mobile application, which of these tactics will offer the most effective barrier to\nadditional exploitation?", "a": ["Implementing a mobile application management solution to control at relies on spoofed IP addresses to trick external servers into flooding the victim."], "c": [1], "e": null}, {"q": "As a recent graduate, you've landed your first job as a junior cybersecurity analyst for a local company. Your team leader is explaining the different\ntypes of hackers and their motivations. He mentions the term \"hacktivist\".\nAccording to the information you recall from your CEH v12 study material, which of the following best describes a hacktivist?", "a": ["A hacker who is not associated with any organization and hacks systems out of curiosity or to gain knowledge.", "A hacker who is hired by an organization to deliberately seek out and fix security vulnerabilities in their systems.", "A hacker who is primarily motivated by financial gain and often engages in illegal activities such as identity theft.", "A hacker who uses their skills to promote a political agenda or a social cause, often by launching attacks against systems to draw attention"], "c": [3], "e": null}, {"q": "As a certified ethical hacker, you have been tasked to exploit a security vulnerability on an Android device that uses the latest version of the OS.\nYou found that there's an unpatched weakness in the handling of user permissions in the device, but the device has a fully updated anti-virus\napplication installed.\nWhat would be the most effective approach to exploit this vulnerability without being detected by the anti-virus application?", "a": ["Deploy a payload using well-known exploit frameworks like Metasploit.", "Develop a custom exploit code that uses obfuscation techniques to avoid detection.", "Use an SMS phishing method to trick the user into granting unwanted permissions.", "Use a rootkit to gain control over the device and manipulate its software."], "c": [1], "e": null}, {"q": "As a Certified Ethical Hacker, you have been approached by a leading international corporation to assess and enhance their cloud-based security\nframework. The corporation recently transitioned to a serverless computing architecture for its e-commerce application and experienced\nsignificant improvements in scalability and cost efficiency. However, they fell victim to an intricate attack where an unauthorized user manipulated\ntheir cloud service's function-as-a-service (FaaS) component to execute malicious commands. Your investigation revealed that the attack\noriginated from an insecure third-party API used within one of the serverless functions.\nGiven the attack's complexity, what would be your recommended countermeasure for strengthening the security posture?", "a": ["Using a cloud access security broker to enforce security policies for third-party cloud services.", "Regularly update the serverless functions to patch vulnerabilities and reduce the attack surface.", "Deploying a cloud-native security platform that provides comprehensive protection across all cloud resources.", "Implementing a function-level permission model and enforcing the principle of least privilege."], "c": [3], "e": null}, {"q": "As a cybersecurity analyst, you were assigned the task of analyzing the traffic patterns of your company's network. You started noticing\nirregularities that suggested a potential scanning attempt. The attacker appears to be quite sophisticated, operating slowly and meticulously,\nmaking it a challenge to detect or trace.\nGiven the stealthiness of this approach, which of the following scenarios best describes the scanning technique the attacker might be using?", "a": ["The attacker is directly establishing a TCP connection with every port on the system to identify open ones, risking immediate detection.", "The attacker is sending packets with all flags set, hoping that closed ports will respond differently than open ones.", "The attacker is utilizing a `zombie' machine to transmit the scan, thus making the true source of the scan difficult to determine.", "The attacker is sending FIN packets, assuming that the target system will respond differently to these packets depending on the state of"], "c": [2], "e": null}, {"q": "You work as a network security officer for a large corporation. Recently, you've noticed that certain confidential files are being accessed by\nunauthorized users within the network. You suspect that a Man-in-the- Middle (MitM) attack is being carried out.\nWhich of the following network activities would help you confirm this?", "a": ["A sudden increase in network traffic.", "IP addresses being resolved to multiple MAC addresses.", "Multiple login attempts from the same IP address.", "Detection of abnormal amounts of DNS requests."], "c": [1], "e": null}, {"q": "A leading online retailer has been experiencing a series of security incidents involving unauthorized access to customer accounts and fraudulent\ntransactions. Upon investigation, it is suspected that attackers are employing sophisticated session-hijacking techniques to compromise user\nsessions and carry out illicit activities. The security team is tasked with implementing robust measures to prevent further breaches and protect\ncustomer trust.\nGiven the scenario described, which advanced session hijacking technique, resembling a scenario-based attack, poses the greatest challenge for\nthe security team to detect and mitigate effectively, potentially compromising the security of online transactions on the retailer's website?", "a": ["Session Replay Attack Capturing and Replaying Encrypted Session Tokens to Gain Unauthorized Access", "Cross-Site Request Forgery Attack Manipulating User Requests to Initiate Unauthorized Transactions", "Credential Stuffing Attack Using Stolen Credentials to Hijack Active User Sessions and Perform Fraudulent Activities", "Clickjacking Attack Embedding Malicious Iframes to Trick Users into Performing Unintended Actions on the Retailer's Website"], "c": [0], "e": null}, {"q": "As a cybersecurity analyst for a leading multinational company, you have unearthed evidence suggesting a breach. Analysis indicates that\nsophisticated steganography techniques are in play, allowing the hacker to exfiltrate data by cleverly embedding it within image files.\nConfronted with the deceptive nature of steganography and its potential implications, which course of action offers the best chance to detect and\ncounteract this clandestine threat?", "a": ["Implement a robust firewall to intercept all outgoing network traffic from your servers, aiming to disrupt any data exfiltration attempts.", "Roll out an Intrusion Prevention System geared towards identifying and neutralizing further unauthorized server activities.", "Engage a specialized steganalysis tool to scrutinize questionable files, decode the obscured data, and reveal the hacker's exfiltration", "Leverage a network traffic analyzer, keenly observing the nuances of outbound traffic for any irregularities suggestive of data exfiltration."], "c": [2], "e": null}, {"q": "As anewly appointed cybersecurity analyst in a financial firm, you are tasked with performing network scanning to maintain the organization's\nnetwork security posture. You decide to conduct a SYN scan, sometimes referred to as half-open scanning, using a popular tool like Nmap.\nIf you initiate a SYN scan against a target IP address and receive a SYN/ACK packet in response, how would you interpret this result?", "a": ["The target IP address is not reachable, as the receipt of a SYN/ACK packet is a common response to an unsuccessful attempt to connect.", "The scanned port on the target IP address is filtered, as the receipt of a SYN/ACK packet indicates that a firewall or filtering device is", "The scanned port on the target IP address is closed, as the receipt of a SYN/ACK packet indicates that the port has acknowledged but not", "The scanned port on the target IP address is open, as the receipt of a SYN/ACK packet indicates that the port is prepared to establish a"], "c": [3], "e": null}, {"q": "You have been hired by a government agency to evaluate Android smartphones' resistance against covert surveillance. During your assessment,\nyou want to demonstrate whether attackers could eavesdrop on sensitive conversations conducted through the loudspeaker without special\npermissions by exploiting built-in smartphone sensors.\nWhich specific attack technique should you implement to effectively demonstrate this privacy risk?", "a": ["Man-in-the-disk attack by manipulating application updates.", "Spearphone attack exploiting accelerometer-based vulnerabilities.", "Tap `n Ghost attack leveraging NFC and touchscreen vulnerabilities.", "Malicious APK installation and exploitation through Metasploit Framework."], "c": [1], "e": null}, {"q": "You are a new IT intern at a local tech company. The company hasa strong focus on cybersecurity and regularly hires ethical hackers to maintain\nits security posture. You come across the term `black box testing' in a company document. Uncertain about its meaning, you decide to ask your\nsupervisor. She explains that it refers to a type of testing in cybersecurity.\nIn the context of ethical hacking, what is `black box testing'?", "a": ["It involves the ethical hacker trying to break into a system without any prior knowledge about the system.", "It refers to testing in which the ethical hacker has full knowledge of the system under test.", "It refers to testing where the ethical hacker only knows the system's inputs and outputs.", "It involves the ethical hacker testing the system using only publicly available information."], "c": [0], "e": null}, {"q": "An ethical hacker is auditing a hospital's wireless network, which is currently secured with WPA encryption using TKIP. The hacker successfully\ndemonstrates packet-injection and decryption attacks on the network.\nWhich vulnerability in WPA most likely allowed these attacks to succeed?", "a": ["Dependence on weak passwords.", "Predictable group temporal key.", "Use of weak Initialization Vectors.", "Lack of AES-based encryption."], "c": [2], "e": null}, {"q": "As a security analyst, you're investigating an incident where an attacker was able to gain access to your network. Upon initial examination of the\nlog files, you noticed a large number of TCP SYN packets sent to various ports on the network but with no corresponding ACKs.\nWhat type of scanning technique do you think the attacker may have used?", "a": ["The attacker has used an XMAS scan to determine the open and closed ports on the network.", "The attacker has used a SYN scan, also known as half-open scanning, which involves sending SYN packets and waiting for SYN/ACK", "The attacker has used a TCP Connect scan to establish a full TCP connection with the target.", "The attacker has used a SYN/ACK scan to trick the firewall into allowing the packets to pass through."], "c": [1], "e": null}, {"q": "An organization uses SHA-256 for data integrity checks but is still experiencing unauthorized data modification.\nWhich cryptographic tool can help resolve this issue?", "a": ["Symmetric encryption", "Asymmetric encryption", "Digital signatures", "SSL/TLS certificates"], "c": [2], "e": null}, {"q": "In a comprehensive penetration testing scenario, you are charged with the task of gaining detailed insights into a target organization's network\nconfiguration, structure, and security posture. To accomplish this task, you plan to employ a multitude of reconnaissance techniques, including an\nin-depth DNS interrogation. DNS interrogation can reveal various pieces of information that are invaluable to a penetration tester. However, there\nare certain limitations to the kind of data you can obtain directly through this method.\nConsidering these restrictions, which among the following pieces of information CANNOT be directly obtained from an extensive DNS\ninterrogation?", "a": ["The estimated geographical location of the organization's servers derived from their IP addresses.", "The subdomains that are linked with the organization's primary internet domain.", "The IP addresses associated with the organization's multiple mail servers.", "The specific usernames and passwords used by the organization's employees."], "c": [3], "e": null}, {"q": "A corporation has transitioned to a public cloud service. The security team found a critical flaw in the API of the cloud service provider.\nWhat is the potential threat they are most likely to face?", "a": ["Compromise of encrypted data at rest", "DDoS attack on cloud servers", "Unauthorized access to cloud resources", "Vulnerability to physical security breaches"], "c": [2], "e": null}, {"q": "As a cybersecurity analyst at XYZ Corp., you're examining system logs and notice an array of activities that suggest the presence of an elusive\nrootkit. Given the stealthy nature of rootkits, their detection and eradication are pivotal to maintaining system security and preventing data\ncompromise. Assessing the system, you find the rootkit has been embedded deeply within the operating system kernel.\nIn this critical situation, which strategy should you follow to remediate the rootkit effectively while minimizing potential damage?", "a": ["Immediately opt for the radical approach, which includes powering down the system and disconnecting it from the network, to cease the", "Take the extreme measure of initiating a complete system format, followed by reinstalling the operating system from a trusted source.", "Implement a proactive defensive strategy by running a variety of high-interaction honeypots on the network, aiming to lure the attacker and", "Employ a systematic, multi-layered strategy, starting with the deployment of a specialized rootkit detection tool to verify the presence and"], "c": [3], "e": null}, {"q": "A red team operator is assessing the resilience of a corporate network's authentication infrastructure. They input valid usernames with specifically\nstructured guesses based on prior intel about naming conventions, such as birthdates or favorite sports teams. The guesses are tailored and\nautomated with logic-based iterations.\nWhich technique best describes this targeted approach?", "a": ["Exhaustive character testing without context.", "Watching users type their keys in public places.", "Combining fragments from two lists without rules.", "Strategic pattern-based input using known logic."], "c": [3], "e": null}, {"q": "An attacker performs DNS cache snooping using the dig command with the +norecurse flag against a known DNS server. The server returns\nNOERROR but provides no answer to the query.\nWhat does this most likely suggest?", "a": ["The requested record was found in the cache and returned.", "The DNS server failed to resolve the request.", "The queried domain has expired and no longer exists.", "No client from the DNS server's network has recently accessed the domain."], "c": [3], "e": null}, {"q": "In her role as a cybersecurity analyst for an established technology firm, Maria is assigned a crucial task. She's instructed to perform a thorough\npassive reconnaissance of a major competitor's online environment to understand their digital strategies better. The challenge, however, is to\ngather as much relevant information as she can without directly interacting with the competitor's systems or alerting them to her activities, to\navoid any potential legal implications.\nGiven these constraints and the sensitive nature of her assignment, which of the following tools or methods would be least appropriate and\npotentially risky for Maria to employ in her task?", "a": ["Leveraging the Wayback Machine to delve into the past and view archived versions of the competitor's website to study their evolution over", "Exploring online forums, bulletin boards, and social media discussions to gather insights on the competitor's products, customer feedback,", "Meticulously examining patent databases and public records for any technology or innovation recently patented by the competitor to", "Running an intensive port scan against the competitor
