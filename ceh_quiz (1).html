's public IP addresses to gain information on their internal network and server"], "c": [3], "e": null}, {"q": "During a red team exercise, a certified ethical hacker (CEH) is working on exploiting a potential vulnerability in the target's web server. The CEH\nhas completed the information gathering and footprinting stages and mirrored the website for offline analysis. They have also discovered the\nserver is prone to session hijacking.\nWhich next step is most likely to be part of a successful attack methodology, keeping in mind the requirement to minimize the possibility of\ndetection?", "a": ["Attempt SQL Injection to extract database information.", "Perform vulnerability scanning with automated tools to find additional weaknesses.", "Directly apply brute force attack to crack the server's password.", "Hijack a session and immediately modify server configuration files."], "c": [3], "e": null}, {"q": "A globally-operating bank recently encountered a severe security breach within its Android OS-based mobile banking application. Cybercriminals\nmanaged to exploit the bank's Mobile Device Management (MDM) system and successfully carried out a series of remote commands, creating\nsignificant havoc. Upon thorough investigation ofthis incident, it emerged that the attackers might have leveraged the Android Debug Bridge\n(ADB) as a conduit for unauthorized access.\nAs a Certified Ethical Hacker tasked with developing countermeasures to this issue, which action would you consider the most potent response in\nthis situation?", "a": ["Promoting the adoption of more robust personal identification methodologies, including, but not limited to, biometric systems.", "Establishing and enforcing a rigorous policy that unequivocally mandates the disabling of ADB, except when absolutely necessary and only", "Instigating the configuration of a Virtual Private Network to secure all transactions and activities conducted via the mobile banking", "Recommending frequent and consistent updates to the MDM system to stay abreast of the most recent security patches and"], "c": [1], "e": null}, {"q": "As a cybersecurity consultant, you are helping a small startup strengthen its information security awareness. During an internal audit, an\nemployee reports finding a USB drive labeled \"Employee Salary Info 2024\" in the company parking lot. Curious, they plugged it into their office\ncomputer, after which the system began behaving erratically.\nWhat kind of social engineering attack does this scenario represent?", "a": ["Impersonating a senior staff member to extract login credentials.", "Tempting the victim to engage with a malicious device using curiosity.", "Using a discarded document to retrieve sensitive corporate information.", "Attempt to bypass physical security by closely following an authorized employee."], "c": [1], "e": null}, {"q": "A major financial institution is experiencing persistent Denial-of-Service (DoS) attacks targeting its online banking services, causing significant\ndisruption to customer transactions and eroding trust in the institution. The security team is under immense pressure to identify and mitigate the\nsophisticated tactics employed by the attackers to ensure uninterrupted access to banking services.\nConsidering the scenario described, which sophisticated Denial-of-Service (DoS) technique, resembling a scenario-based attack, poses the\ngreatest challenge for the security team to detect and mitigate effectively, potentially jeopardizing the availability of online banking services?", "a": ["A coordinated UDP flood attack exploiting vulnerabilities in the institution's DNS infrastructure, flooding authoritative DNS servers to disrupt", "A zero-day exploit targeting the institution's web server software, causing buffer overflow and service unavailability through remote code", "A synchronized Layer 3 Smurf attack targeting the institution's internet-facing routers, flooding their interfaces with ICMP echo requests to", "A distributed SQL injection attack targeting the institution's online banking database servers, causing resource exhaustion and database"], "c": [1], "e": null}, {"q": "At DEF Corporation, as you dive deeper into the vulnerability analysis of their multi-tiered web applications, you observe an anomaly. Some\nencrypted user session tokens appear to be much longer than others, hinting at possible variable encryption strength based on user roles. This\ninconsistency could expose certain user sessions, especially those with elevated privileges, to cryptographic attacks.\nGiven the intricate nature of the system and the potential implications of a breach, what would be the most appropriate step to mitigate this\nspecific vulnerability?", "a": ["Adopt Multi-Factor Authentication for users with elevated privileges to strengthen access control.", "Rotate encryption keys frequently, ensuring that old keys become obsolete rapidly.", "Implement uniform encryption strength across all user roles, eliminating disparities in session token lengths.", "Integrate a centralized logging mechanism to detect and alert on any irregular access patterns based on session tokens."], "c": [2], "e": null}, {"q": "You are conducting a vulnerability assessment in a segmented internal network. When scanning a set of IPs using the nbtscan tool, you discover\nmultiple devices responding with NetBIOS names, but only one of them has the entry in its response.\nWhat does this indicate about that specific host?", "a": ["It is the local system from which the scan is being run.", "It is the domain master browser or Primary Domain Controller.", "It has disabled NetBIOS over TCP/IP resulting in limited response.", "It is a rogue DHCP server impersonating a legitimate host."], "c": [1], "e": null}, {"q": "A global media streaming platform is experiencing periodic traffic surges every 10 minutes, severely degrading performance and leading to\nwidespread buffering issues. Traffic analysis reveals intermittent spikes exceeding 300 Gbps, followed by quiet intervals. The security team\nsuspects the attacker is using a technique designed to disrupt services without maintaining a continuous flood.\nWhat type of DDoS attack best explains this scenario?", "a": ["A recursive HTTP GET flood mimicking user page views.", "A UDP flood-sustained attack targeting random high-numbered ports.", "A permanent DoS attack damaging backend hardware components.", "A Pulse Wave attack leveraging high-volume short bursts to overwhelm network resources."], "c": [3], "e": null}, {"q": "You are a cybersecurity trainer and are planning a course on ethical hacking for some newcomers in your organization. While creating the content,\nyou recall from the CEH vl2 study material that there are different types of penetration tests.\nWhich of the following best describes a black box penetration test?", "a": ["The tester is given a copy of the system to test so that the actual system remains unaffected.", "The tester has complete knowledge of the system to be tested.", "The tester has some knowledge of the system to be tested, such as user IDs and passwords.", "The tester has no prior knowledge of the system to be tested."], "c": [3], "e": null}, {"q": "You are a Certified Ethical Hacker hired by a financial institution to assess the robustness of its web application security. In your penetration\ntesting, you are particularly focused on exploiting vulnerabilities related to session management mechanisms. The web application uses multi-\nfactor authentication, encrypted cookies, and has well-configured web application firewalls. During your assessment, you identify several\npossibilities to compromise session management.\nWhich of the following techniques would most effectively exploit a session management vulnerability while bypassing the application's\nsophisticated security measures?", "a": ["Exploit insecure deserialization vulnerabilities in the session management code to achieve arbitrary code execution.", "Conduct Session Sidejacking by intercepting and using valid session tokens.", "Utilize Session Fixation to manipulate a user into utilizing a session ID that an attacker already has access to.", "Execute a Cross-Site Request Forgery attack by tricking authenticated users into executing malicious actions."], "c": [2], "e": null}, {"q": "You've recently been hired as a cybersecurity intern for a growing tech startup. During your onboarding, the company's chief information security\nofficer (CISO) explains the various types of hackers you need to be aware of as part of your role. The term \"script kiddie\" comes up during this\ndiscussion.\nBased on your CEH v12 study material, which of the following descriptions best defines a script kiddie?", "a": ["A young hacker who is still learning the basics of ethical hacking and cybersecurity.", "A hacker who uses pre-existing scripts and tools to carry out attacks without fully understanding how they work.", "A hacker who writes their own complex scripts and exploits them to carry out attacks.", "A hacker who only targets systems that use JavaScript and similar scripting languages."], "c": [1], "e": null}, {"q": "A future-focused security audit discusses risks where attackers collect encrypted data now, anticipating that they can decrypt it later with\nquantum computers.\nWhat is this threat known as?", "a": ["Flipping qubit values to corrupt the output", "Breaking RSA using quantum algorithms", "Replaying intercepted quantum messages", "Saving data today for future quantum decryption"], "c": [3], "e": null}, {"q": "Your role as a cybersecurity analyst at XYZ Corporation requires you to perform a thorough security assessment of the company's online\npresence. You initiate the process with a passive reconnaissance phase, trying to gather as much information as possible without interacting\ndirectly with the target system.\nWhich of the following techniques or tools is least likely to assist you in this endeavor?", "a": ["Utilizing search engines and associated services (Google, Bing, Google Earth, etc.).", "Inspecting the WHOIS database for domain registration details.", "Monitoring public posts and profiles on social media platforms and professional networking sites.", "Using a tool like Nmap to scan the company's public IP range."], "c": [3], "e": null}, {"q": "You are tasked with assessing wireless network security for a corporation using WPA2 encryption. During the assessment, you identify\nvulnerabilities that could allow attackers to intercept and replay previously captured packets.\nWhich WPA2 vulnerability is likely being exploited?", "a": ["Insecure WPS PIN recovery method.", "Hole196 vulnerability due to shared GTK.", "KRACK vulnerabilities through key reinstallation.", "Weak random number generator affecting GTK."], "c": [2], "e": null}, {"q": "During a cloud security assessment, your team discovered that a former employee still had access to critical resources despite leaving the\norganization months ago.\nWhich of the following practices could have most effectively prevented this issue?", "a": ["Implementing real-time traffic analysis", "Enforcing timely user de-provisioning", "Conducting regular penetration tests", "Using multi-cloud deployment models"], "c": [1], "e": null}, {"q": "Working as an Information Security Analyst at a technology firm, you've been asked to design training material for employees about the potential\ndangers of session hijacking. As part of the training, you want to explain how attackers could use side jacking to compromise their accounts.\nWhich of the following scenarios would most accurately describe a side jacking attack?", "a": ["An attacker exploits a vulnerability in the company's network firewall to gain unauthorized access to internal systems.", "An attacker intercepts network traffic, captures unencrypted session cookies, and uses these to impersonate the user.", "An attacker uses social engineering techniques to trick an employee into revealing their password.", "An attacker convinces an employee to visit a malicious site, which then injects a harmful script into their browser."], "c": [1], "e": null}, {"q": "As a senior cybersecurity professional at a multinational bank, you are investigating an incident where multiple systems have been infected with\nmalware. On the affected systems, the malware remains dormant until a specific action triggers its malicious activity. The malware has also\nshown signs of being able to avoid detection by changing its code or encryption each time it infects a new.\nBased on these characteristics, which type of malware is likely causing this problem, and what is the best method to mitigate its impact?", "a": ["Rootkit: Use an anti-rootkit tool for detection and removal, and ensure all systems are patched with the latest security updates.", "Adware: Use a reputable anti-adware tool to detect and remove the adware, and instruct employees not to click on suspicious", "Polymorphic Malware: Employ advanced threat detection tools that use behavior-based detection techniques and ensure all systems are", "Worm: Isolate the infected systems, and scan the entire network using up-to-date anti-virus software."], "c": [2], "e": null}, {"q": "An attacker examines differences in ciphertext outputs resulting from small changes in the input to deduce key patterns in a symmetric algorithm.\nWhat method is being employed?", "a": ["Timing attack to infer key bits based on processing time", "Brute-force attack to try every possible key", "Differential cryptanalysis on input-output differences", "Chosen-ciphertext attack to decrypt arbitrary ciphertexts"], "c": [2], "e": null}, {"q": "You're a security analyst conducting a foot printing exercise for a new client to uncover as much information as possible without direct\ninteraction. Your preliminary investigation using search engines and public databases has provided a significant amount of data about the\norganization's online presence. You are now considering using Google Hacking techniques to find further vulnerabilities.\nWhich of the following could best justify this decision?", "a": ["Google Hacking can assist in mapping out the client's internal network structure.", "Google Hacking can help locate potential phishing sites that mimic the client's website.", "Google Hacking can help discover hidden organizational data from the Deep Web.", "Google Hacking can help identify weaknesses in the client's website code."], "c": [3], "e": null}, {"q": "A senior executive receives a personalized email with a subject line that reads \"Annual Performance Review 2024\". The email contains a\ndownloadable PDF that installs a backdoor when opened. The email appears to come from the CEO and includes company branding.\nWhich phishing method does this best illustrate?", "a": ["Pharming using DNS poisoning", "Whaling attack aimed at high-ranking personnel", "Broad phishing sent to all employees", "Email clone attack with altered attachments"], "c": [1], "e": null}, {"q": "You're an IT security analyst at a fast-growing fintech startup. Recently, you've noticed an uptick in network traffic anomalies. You decide to\nperform a more thorough network scan using the ICMP Echo Request method. During the scan, you notice that a certain set of IPs in your network\nare not returning any Echo Reply, but other network functionalities seem to be operating normally.\nHow would you interpret this situation?", "a": ["The non-responsive IPs indicate severe network congestion that needs immediate addressing.", "The firewall or another security control is probably blocking the ICMP Echo Requests.", "The lack of an Echo Reply is a clear sign of a major breach in progress.", "The scanned IPs are likely unused and can be considered for future expansion."], "c": [1], "e": null}, {"q": "In a highly secure online banking environment, customers have reported unauthorized access to their accounts despite robust authentication\nmeasures in place. Upon investigation, it is discovered that attackers are employing sophisticated session hijacking techniques to compromise\nuser sessions and conduct fraudulent transactions. The security team is tasked with implementing effective countermeasures to prevent further\nunauthorized access and protect customer accounts.\nConsidering the scenario described, which advanced session-hijacking technique, resembling a scenario-based attack, poses the greatest\nchallenge for the security team to detect and mitigate effectively, potentially compromising the security of online banking transactions?", "a": ["Session Fixation Attack Manipulating Session Identifiers in HTTP Cookies", "Covert Cross-Site Scripting Attack Injecting Malicious Code into Online Banking Web Pages", "Man-in-the-Browser Attack Installing Malicious Browser Extensions to Intercept User Sessions", "Passive Sniffing Attack Capturing Encrypted Session Tokens on Unsecured Wi-Fi Networks"], "c": [2], "e": null}, {"q": "A multinational corporation relies heavily on remote access for its employees to connect to internal systems and resources. Recently, there have\nbeen reports of unauthorized access to sensitive company data, leading to concerns about potential session hijacking attacks. The security team\nis tasked with identifying the specific techniques used by attackers and implementing measures to enhance session security.\nConsidering the scenario described, which advanced session hijacking technique, resembling a scenario-based attack, poses the greatest\nchallenge for the security team to detect and mitigate effectively, potentially compromising the confidentiality of corporate data?", "a": ["Cookie Poisoning Attack Manipulating Session Cookies to Impersonate Authorized Users", "ARP Spoofing Attack Redirecting Traffic to Capture Session Data on Local Networks", "Brute-Force Session Guessing Exploiting Weak Session ID Generation Algorithms", "Session Sidejacking Intercepting Unencrypted Session Tokens over Public Wi-Fi Networks"], "c": [1], "e": null}, {"q": "After a recent breach, your team discovers that attackers used modified versions of legitimate system utilities and a Windows service to persist\nundetected for weeks, accessing internal credentials.\nWhat key step can be taken to better protect against similar future threats?", "a": ["Conduct weekly backups and store them off-site.", "Ensure all systems run the latest antivirus and firewall software.", "Monitor file hashes of sensitive executables for unauthorized changes.", "Disable unused ports and limit outbound traffic via firewall rules."], "c": [2], "e": null}, {"q": "A tester evaluates a login form that constructs SQL queries using unsanitized user input. By submitting ` OR `1'='1';--, the tester gains unauthorized\naccess to the application.\nWhat type of SQL injection has occurred?", "a": ["Time-based blind SQL injection", "Tautology-based SQL injection", "Error-based SQL injection", "Union-based SQL injection"], "c": [1], "e": null}, {"q": "A system analyst wants to implement an encryption solution that allows safe key distribution.\nWhich encryption method should the analyst consider?", "a": ["Hash functions", "Disk encryption", "Symmetric encryption", "Asymmetric encryption"], "c": [3], "e": null}, {"q": "In your role as a cybersecurity analyst at a large e-commerce company, you have been tasked with reinforcing the firm's defenses against potential\nDenial-of-Service (DoS) attacks. During a recent review, you noticed several IP addresses generating excessive traffic, causing an unnaturally high\nload on the server. An inspection of these packets revealed that the TCP three-way handshake was never completed, leaving multiple connections\nin a SYN_RECEIVED state. The intent appears to be the saturation of server resources without any genuine intent to establish a full connection.\nGiven these details, what type of DoS attack is most likely being executed against the company's servers?", "a": ["Smurf Attack: In this type of attack, a perpetrator uses a network's broadcast addressing to amplify the ICMP echo-request packets.", "SYN Flood: This attack floods a target with SYN requests in an attempt to consume enough server resources to make the system", "UDP Flood: This attack overwhelms random ports on a remote host with IP packets containing UDP datagrams, but this doesn't explain the", "Ping of Death: This attack sends malformed or oversized ping packets to crash, freeze, or reboot the targeted system, which isn't consistent"], "c": [1], "e": null}, {"q": "A city's power management utilizes SCADA systems to oversee operations. Recently, the infrastructure has shown unexplained anomalies such as\ninconsistent sensor values and intermittent outages. Security experts suspect a side-channel attack aiming to discreetly extract sensitive\ninformation from SCADA devices.\nWhich investigative technique would best confirm if attackers employed this specific side-channel method?", "a": ["Identify weak cryptographic settings in device communications.", "Measure unusual fluctuations during device operations at the hardware level.", "Review SCADA user interfaces for signs of unauthorized user actions.", "Assess network latency between SCADA devices for irregular delays."], "c": [1], "e": null}, {"q": "You are a Certified Ethical Hacker contracted by a technology company to perform a security assessment on Bluetooth-enabled devices. These\ndevices have Secure Simple Pairing (SSP) enabled, which generally offers strong security. During your assessment, you identify an attacker trying\nto exploit a vulnerability in the SSP implementation by employing sophisticated brute-force techniques. The attacker has partial access to the\nDiffie-Hellman key exchange. Your mission is to identify the most effective method to counteract this attack.\nWhich of the following countermeasures is most likely to be effective?", "a": ["Implement device whitelisting to ensure only approved devices can connect.", "Impose rate-limiting to slow down the brute-force attack.", "Use Bluetooth Low Energy for all Bluetooth connections to avoid traditional Bluetooth vulnerabilities.", "Strengthen SSP by increasing the encryption key length for the Diffie-Hellman exchange."], "c": [1], "e": null}, {"q": "During a black-box assessment, an attacker executes the Nmap command nmap -p25 --script smtp-enum-users --script-args smtp-enum-\nusers.methods={VRFY, EXPN, RCPT) . The script successfully returns multiple valid usernames.\nWhat server misconfiguration is being exploited?", "a": ["The SMTP server allows authentication without credentials.", "SMTP user verification commands are exposed without restrictions.", "SMTP server has disabled STARTTLS, enabling plaintext enumeration.", "DNS is misconfigured to point MX records to an internal relay."], "c": [1], "e": null}, {"q": "As a security analyst, you are testing your company's network for potential vulnerabilities. During your investigation, you suspect that an attacker\nmight be using MAC flooding to compromise the switches and sniff network traffic.\nWhich of the following indicators would most likely confirm your suspicions?", "a": ["The existence of multiple MAC addresses assigned to a single IP address.", "The presence of multiple IP addresses assigned to a single MAC address.", "Numerous MAC addresses that correspond to a single switch port.", "An increased number of ARP requests in the network traffic."], "c": [2], "e": null}, {"q": "You have recently been hired as an entry-level IT technician in a large corporation. In a meeting with the IT team, the terms \"ethical hacking\" and\n\"penetration testing\" are mentioned frequently. Later, a colleague explains to you that the main difference between the two is based on their goals.\nWhat is the primary goal of an ethical hacker in comparison to a penetration tester?", "a": ["An ethical hacker aims to improve system security, while a penetration tester seeks to bring the system down.", "An ethical hacker is focused on exploiting system vulnerabilities, while a penetration tester aims to secure the system.", "An ethical hacker is primarily focused on securing the system, while a penetration tester tries to exploit the system's vulnerabilities.", "An ethical hacker seeks to bring the system down, while a penetration tester is focused on improving system security."], "c": [2], "e": null}, {"q": "During a penetration test on a legacy Windows network, you use the nbtstat -A command on a target system and retrieve several NetBIOS names,\nincluding entries ending with \u003c20> and \u003c03>. However, attempts to list shared folders fail.\nWhich of the following best explains this behavior?", "a": ["The nbtstat utility cannot enumerate shares from NetBIOS names.", "File and printer sharing is disabled on the target system.", "The target system's NetBIOS service is bound to a non-standard port.", "The host is not part of any Active Directory domain."], "c": [1], "e": null}, {"q": "You are a cybersecurity consultant at a large healthcare organization. As part of your responsibilities, you are tasked with making sure the\ncompany's systems are secure from various attacks. Recently, you've noticed some unusual traffic patterns that suggest someone might be trying\nto evade the company's Intrusion Detection System (IDS).\nWhich of the following techniques would most likely be used by an attacker in an attempt to evade detection by the IDS?", "a": ["The attacker uses advanced malware that can self-replicate and spread throughout the network.", "The attacker sends phishing emails to employees, hoping to trick them into revealing their login credentials.", "The attacker splits malicious data packets into smaller segments to avoid detection.", "The attacker repeatedly pings the IDS to overwhelm it with traffic and cause a denial of service."], "c": [2], "e": null}, {"q": "During a red team engagement targeting a custom web application, a tester observes that the app takes a numeric id parameter from the URL and\ndynamically builds SQL queries. Suspecting SQL injection, the tester sends a crafted HTTP GET request like:\nhttp://vulnerableapp.local/view.php?id=|; DROP TABLE users; --\nShortly after, the application throws database errors, and the team confirms that the users table has been removed from the backend database.\nBased on this behavior, which SQL injection method was most likely used?", "a": ["The attacker triggered errors to extract database information.", "The attacker executed a second malicious query alongside the first.", "The attacker appended a UNION clause to retrieve additional data.", "The attacker used Boolean logic to infer true/false responses."], "c": [1], "e": null}, {"q": "As a newly appointed network security analyst at a mid-tier company, you have been tasked with assessing the security of the network. As part of\nthis, you need to ensure that your company's network can detect and prevent evasion techniques. You know that one popular evasion technique\nused by attackers is using `packet fragmentation'.\nWhich of the following IDS configurations should you implement to counteract this particular technique?", "a": ["Adjusting the IDS to recognize the regular intervals at which fragmented packets are sent.", "Employing a signature-based IDS that recognizes the specific signature of fragmented packets.", "Implementing an anomaly-based IDS that can recognize the irregular traffic patterns caused by packet fragmentation.", "Configuring the IDS to reject all fragmented packets to eliminate the risk."], "c": [2], "e": null}, {"q": "A malware analyst is tasked with evaluating a suspicious PDF file suspected of launching attacks through embedded JavaScript. Initial scans\nusing pdfid show the presence of JavaScript and /OpenAction keywords.\nWhat should the analyst do next to understand the potential impact?", "a": ["Extract and analyze stream objects using PDFStreamDumper.", "Upload the file to VirusTotal and rely on engine consensus.", "Disassemble the PDF using PE Explorer.", "Compute file hashes using HashMyFiles for signature matching."], "c": [0], "e": null}, {"q": "A cybersecurity company wants to prevent attackers from gaining information about its encrypted traffic patterns.\nWhich of the following encryption algorithms should they utilize?", "a": ["RSA", "HMAC", "AES", "DES"], "c": [2], "e": null}, {"q": "A company's customer data stored in a cloud environment has been exposed due to an unknown vulnerability.\nWhich of the following types of attack most likely led to this incident?", "a": ["Denial of Service attack on cloud servers", "Side-channel attack on the hypervisor", "Exploitation of misconfigured security groups", "Brute force attack on user passwords"], "c": [1], "e": null}, {"q": "You are a cybersecurity analyst at a tech startup that provides cloud-based services to its clients. Recently, your team detected suspicious activity\non one of your critical servers. After further investigation, you discovered an unauthorized user gained escalated privileges and is attempting to\nperform malicious actions. Your task is to thwart the attack and secure the system from future exploits.\nConsidering the potential consequences and complex nature of the situation, which of the following actions would you take first to immediately\ncontain the threat without causing significant disruption to your services?", "a": ["Power down the affected server immediately to stop all ongoing malicious activities, then isolate it from the network for further analysis.", "Engage with a digital forensics team to collect all necessary evidence for legal proceedings.", "Initiate a comprehensive vulnerability scan on all servers to detect any possible exploits that the attacker might use.", "Analyze and document the activities of the unauthorized user in real-time, then use this data to implement immediate countermeasures and"], "c": [3], "e": null}, {"q": "You are a security administrator for a medium-sized company. Your manager has asked you to conduct an audit of the organization's security\ninfrastructure. While reviewing the logs from the Intrusion Detection System (IDS), you notice that there have been several instances of alerts\nbeing triggered by regular user activities.\nWhich of the following is the most likely reason for this?", "a": ["Regular users are unintentionally triggering security protocols.", "The IDS is outdated and needs to be updated with the latest patches.", "The IDS is configured with very high sensitivity settings, leading to many false positives.", "The company's firewall is failing to filter out malicious traffic."], "c": [2], "e": null}, {"q": "Your role as a network administrator in a mid-sized company involves protecting the company's web servers from potential security threats.\nRecently, your company's web server experienced a Distributed Denial of Service (DDoS) attack. In explaining the situation to your team, you\nmention the attack specifically targeted the web server's application layer.\nWhich type of DDoS attack was most likely used against your company's web server?", "a": ["SYN flood attack", "ICMP flood attack", "HTTP flood attack", "UDP flood attack"], "c": [2], "e": null}, {"q": "During a penetration test, a security analyst encounters a web page that returns identical generic error messages regardless of input. To test for\nSQL injection, they submit a query that includes AND 1=1 and later AND 1=2, observing a change in the page content.\nWhat type of injection is being tested?", "a": ["The analyst is measuring response delays to infer true/false outcomes.", "The analyst is triggering visible database errors to gain structural insights.", "The analyst is appending a UNION clause to extract data from additional tables.", "The analyst is using conditional logic to infer database behavior from page responses."], "c": [3], "e": null}, {"q": "A multinational corporation recently survived a severe Distributed Denial-of-Service (DDoS) attack, which caused significant downtime and\nresulted in substantial financial losses. After implementing enhanced security measures, the company contracted you as a cybersecurity\nconsultant to assess their new infrastructure. During the audit, you discovered that the organization uses both hardware and cloud-based\nsolutions to distribute incoming traffic. The primary purpose of these solutions is to absorb and mitigate the effects of a DDoS attack, ensuring\nthat legitimate requests are not affected during such an event.\nWhat type of DDoS mitigation strategy is the company utilizing?", "a": ["Black Hole Routing: This approach directs all traffic into a non-existent interface, which wouldn't distribute traffic but", "Sinkholing: This technique reroutes traffic to a \"sinkhole\", a designated IP address where traffic can be analyzed. However, this doesn't align", "Rate Limiting: This technique controls the traffic rate using bandwidth management. It doesn't distribute the traffic but rather restricts it,", "Load Balancing: This approach distributes network or application traffic across many resources to optimize resource use, minimize latency,"], "c": [3], "e": null}, {"q": "A cloud provider faced a situation where one customer's malicious activity affected the organization's reputation and service delivery.\nWhich security control would have most effectively prevented this issue?", "a": ["Assessing multi-tenant isolation techniques", "Enforcing robust authentication methods", "Using strong encryption algorithms", "Implementing secure log management"], "c": [0], "e": null}, {"q": "During an internal penetration test, a security analyst assesses a web application that interfaces with a backend Oracle database. Initial attempts\nusing standard SQL injection payloads such as ` OR `1'=\"l and UNION SELECT return no useful output and do not affect application behavior.\nSuspecting input sanitization and error suppression, the analyst crafts a new payload:\n1 AND 1 \u003c (SELECT COUNT(*) FROM all_users A, all_users B, all_users C)\nUpon submitting this payload, the page takes significantly longer to respond compared to previous inputs, even though no visible output is\nreturned.\nWhat type of SQL injection technique is most likely being used here?", "a": ["Out-of-band SQL injection", "Heavy query-based SQL injection", "Time-based SQL injection using WAITFOR DELAY", "Union-based SQL injection"], "c": [1], "e": null}, {"q": "You've been hired as a Certified Ethical Hacker (CEH) by a large multinational corporation to investigate the unauthorized access of sensitive data\nfrom their web application. You discover that the web application uses a custom authorization scheme involving token-based authentication. The\nsystem issues tokens, which expire after 30 minutes. In the server logs, you notice multiple failed login attempts using expired tokens within a 3-\nminute window, followed by successful access with a valid token. You suspect that an attacker exploited the authorization scheme.\nWhat could be the most likely attack scenario?", "a": ["The attacker brute-forced the token generation algorithm to produce a valid token.", "The attacker took advantage of a race condition, where the system validates expired tokens.", "The attacker captured a valid token before its expiry and used it to gain access.", "The attacker utilized a token replay attack, confusing the server to accept an expired token."], "c": [2], "e": null}, {"q": "A cybersecurity team identifies suspicious outbound network traffic. Investigation reveals malware utilizing Background Intelligent Transfer\nService (BITS) to evade firewall detection.\nWhy would attackers use this particular service to hide malicious activities?", "a": ["Because BITS utilizes IP fragmentation to evade IDS.", "Because BITS traffic uses encrypted DNS packets.", "Because BITS packets appear identical to normal Windows update traffic.", "Because BITS operates exclusively through HTTP tunneling."], "c": [2], "e": null}, {"q": "You are a new member of your company's IT team, and you've been assigned to understand and implement ethical hacking principles to improve\nthe company's cybersecurity posture. Your supervisor highlights the importance of following the five phases of ethical hacking.\nWhat is the correct order of these phases?", "a": ["Gaining Access, Maintaining Access, Covering Tracks, Reconnaissance, Scanning", "Maintaining Access, Covering Tracks, Reconnaissance, Scanning, Gaining Access", "Scanning, Reconnaissance, Gaining Access, Covering Tracks, Maintaining Access", "Reconnaissance, Scanning, Gaining Access, Maintaining Access, Covering Tracks"], "c": [3], "e": null}, {"q": "As acertified ethical hacker, you have been engaged to evaluate the security protocols of a smart city project. This cutting-edge venture\nincorporates an interconnected system featuring intelligent traffic lights, public Wi-Fi points, and advanced water management facilities. Upon\nevaluating the loT network's logs, you stumble upon anomalous traffic patterns, signifying a high volume of data exchange between a particular\ntraffic light and an external IP address. Your further investigation reveals that this traffic light has an inexplicably open port.\nGiven the gravity of these revelations, what would be your subsequent course of action?", "a": ["Isolate the implicated traffic light from the overarching network for a detailed investigation into its firmware to identify any possible security", "Thoroughly analyze and amend the loT network's firewall rules to prevent any further interaction with the suspicious external IP.", "Conduct an exhaustive penetration test across the network infrastructure to uncover any concealed vulnerabilities.", "Attempt to orchestrate a reverse connection from the traffic light to the external IP, aiming to comprehend the type and purpose of the data"], "c": [0], "e": null}, {"q": "During a routine security audit, administrators found that cloud storage backups were illegally accessed and modified.\nWhat countermeasure would most directly mitigate such incidents in the future?", "a": ["Deploying biometric entry systems.", "Adopting the 3-2-1 backup model.", "Implementing resource auto-scaling.", "Regularly conducting SQL injection testing."], "c": [1], "e": null}, {"q": "You have recently joined as a cybersecurity analyst at a multinational corporation. Your role includes regular vulnerability assessments of the\ncompany's wide-ranging IT infrastructure. During one of these assessments, you employ the Nessus scanner. The scanner flags a severe\nvulnerability marked as CVE-2023-12456. This vulnerability specifically targets the SSH (Secure Shell) service running on one of the company's\nLinux servers. With a CVSS (Common Vulnerability Scoring System) score of 9.0, the vulnerability poses a substantial risk. Most concerning is its\nability to allow potential remote code execution.\nGiven the high-risk nature of the vulnerability, as depicted by the CVSS score, and its potential impact, what course of action should be\nimmediately prioritized from the following choices?", "a": ["Commence a manual inspection of the discovered SSH service vulnerability. If it cannot be verified, mark it as a false positive and move on", "Without delay, apply the patch recommended by the vendor. Subsequently, initiate a system-wide reboot during the next downtime", "Establish a backup SSH service on an unaffected server and reroute all SSH traffic to this server until the vulnerability on the original server", "Temporarily isolate the affected server from the broader network, perform an in-depth system audit, and then apply patches as required"], "c": [1], "e": null}, {"q": "A large chemical plant uses operational technology (OT) networks to control its industrial processes. Recently, security personnel noticed\nabnormal behavior from critical Programmable Logic Controllers (PLCs), suspecting a stealthy compromise via malicious firmware.\nWhich action should the team take first to effectively verify and neutralize this issue?", "a": ["Implement enhanced intrusion detection rules to flag unusual traffic patterns.", "Immediately isolate suspicious devices within separate network segments.", "Restrict remote administrative access to essential industrial equipment.", "Perform detailed inspections of device software for hidden, unauthorized modifications."], "c": [3], "e": null}, {"q": "You are a Certified Ethical Hacker and have been hired by a financial institution to assess the security of its newly developed web application. The\napplication employs a multifaceted authentication system with JavaScript-based client-side controls. During your testing, you discover that client-\nside controls enforce password strength and ensure CAPTCHA validation. The application also uses a proprietary encryption algorithm for client-\nside data. Your goal is to bypass these client-side controls to assess how robust they really are.\nWhat method would be the most effective for bypassing these controls without triggering server-side alarms?", "a": ["Reverse-engineer the proprietary encryption algorithm and manipulate the encrypted data before submission.", "Disable JavaScript in the browser and proceed to submit weaker passwords and invalid CAPTCHAs.", "Utilize a proxy tool to intercept and modify the client-side controls before they reach the server.", "Inject malicious JavaScript code into the login form to overwrite the client-side validation rules."], "c": [1], "e": null}, {"q": "A large media-streaming company begins receiving complaints from users that their web application is timing out or failing to load. The security\nteam observes that the web server is overwhelmed with a high number of open HTTP connections, most of which appear to be legitimate but are\ntransmitting data at an abnormally slow rate. These connections are never fully completed, causing the server's resources to remain occupied and\nunable to process new incoming client requests. The incident response team rules out bandwidth exhaustion and malformed packet-based\nattacks and suspects an application-layer DoS technique is responsible.\nGiven the scenario, which specific type of attack is most likely being executed on the company's web application?", "a": ["The attacker uses a Slowloris attack to keep many open connections alive, slowly exhausting the server's connection pool.", "The attacker uses a flooding attack on the server with random UDP packets to random ports to consume available bandwidth.", "The attacker floods the server with continuous ICMP Echo Request packets, overwhelming its network stack.", "The attacker sends fragmented packets with overlapping offset values to destabilize the target system."], "c": [0], "e": null}, {"q": "During an ethical hacking exercise, a security analyst is testing a web application that manages confidential information. The analyst suspects the\napplication may be susceptible to SQL injection attacks.\nWhich of the following payloads will most likely reveal if the application is vulnerable to time-based blind SQL injection attacks?", "a": ["`OR `1'='1'; -", "` AND BENCHMARK); -", "`UNION SELECT NULL, NULL, NULL; -~", "`AND 1=0 UNION ALL SELECT `admin'/admin'; -"], "c": [1], "e": null}, {"q": "You are a security consultant who has been hired to conduct security awareness training at a mid-sized organization. During the session on social\nengineering, you emphasize the importance of being vigilant against different types of social engineering attacks.\nWhich of the following scenarios best describes a tailgating social engineering attack?", "a": ["An attacker calls a company's customer service representative, claiming they lost their account details and need assistance in recovering", "An attacker leaves a USB labelled \"Employee Bonus List\" in the restroom, hoping someone will insert it into their computer.", "A person gains access to the building by following an employee through a secure door before it closes.", "An email is sent to a company's employees claiming there is an urgent system update and they need to enter their login credentials to"], "c": [2], "e": null}, {"q": "As a cybersecurity professional in XYZ Corporation, you've been assigned to investigate an anomaly in the system logs that suggest possible\nunauthorized activities. The system administrators detected repeated failed login attempts on a critical server, followed by a sudden surge in\noutbound data traffic. These events, while discrete, are raising concerns that the system may have been compromised.\nGiven the high stakes and sophisticated nature of this potential security breach, what should be your initial course of action to manage this\nsituation effectively?", "a": ["Immediately alter the credentials of the server and notify all users to change their passwords.", "Conduct a thorough audit of all outbound traffic and scrutinize the destination IPs to gain insights into the attacker's network.", "Conduct real-time monitoring of the server, scrutinize the logs for unusual patterns, and identify the nature of the activities to devise an", "Immediately disconnect the suspicious server from the network to prevent further data exfiltration."], "c": [2], "e": null}, {"q": "A critical infrastructure facility has an extensive network of loT devices integrated with its OT systems. Following a recent surge in cyberattacks\non similar facilities globally, the security team received an anonymous email detailing a possible attack on their systems. The attacker allegedly\nplans to compromise the loT devices and use them as a gateway to the OT systems.\nWhat should be the immediate action of the security team to mitigate this threat?", "a": ["Establish a secure communication protocol between loT and OT systems with proper encryption and authentication.", "Initiate a full-scale penetration testing exercise on loT devices to identify and patch vulnerabilities.", "Employ an intrusion prevention system on the network to detect and block any malicious activities.", "Deploy a machine-learning-based security solution to monitor and predict potential threats."], "c": [0], "e": null}, {"q": "In an enterprise environment, the network security team is alerted to unusual network behavior suggestive of advanced sniffing techniques being\nemployed by a potential attacker. Upon closer examination, it is discovered that the adversary is exploiting vulnerabilities in legacy protocols to\nintercept sensitive communications. The security team must identify the specific sniffing technique being utilized and deploy effective\ncountermeasures to protect critical assets.\nAmidst the advanced sniffing activities observed in the enterprise network, which intricate technique poses the most formidable challenge for the\nsecurity team to detect and neutralize effectively, potentially compromising the confidentiality of proprietary information?", "a": ["Covert Channel Establishment through Modbus Protocol Manipulation", "Covert Data Interception via X.25 Packet Fragmentation", "Encrypted Data Extraction via HTTP Header Field Overflows", "Steganographic Payload Embedding within SMTP Email Headers"], "c": [0], "e": null}, {"q": "In your role as a cybersecurity specialist for a growing tech company, you are tasked with performing a regular network scan to check for any\npotential vulnerabilities. Your manager has specifically asked you to use a NULL scan for this round.\nIn the context of TCP NULL scanning, what response (or lack thereof) would indicate that a particular port on a target machine is closed?", "a": ["The target machine responds with an ICMP error message.", "The target machine responds with a TCP RST packet.", "The target machine does not send any response.", "The target machine responds with a TCP SYN/ACK packet."], "c": [1], "e": null}, {"q": "A penetration tester is evaluating a web application that uses HTTPS, secure cookies, and implements multi factor authentication to prevent\nsession hijacking.\nTo hijack a legitimate user's session without triggering security alerts, which advanced technique should the tester employ?", "a": ["Exploit a browser zero-day vulnerability to inject malicious scripts", "Utilize a session token replay attack by capturing encrypted tokens", "Implement a man-in-the-middle attack by compromising a trusted network device", "Perform a Cross-Site Request Forgery attack to manipulate session tokens"], "c": [0], "e": null}, {"q": "A cybersecurity research team identifies suspicious behavior on a user's Android device. Upon investigation, they discover that a seemingly\nharmless app, downloaded from a third-party app store, has silently overwritten several legitimate applications such as WhatsApp and SHAREit.\nThese fake replicas maintain the original icon and user interface but serve intrusive advertisements and covertly harvest credentials and personal\ndata in the background. The attackers achieved this by embedding malicious code in utility apps like video editors and photo filters, which users\nwere tricked into installing. The replacement occurred without user consent, and the malicious code communicates with a command-and-control\n(C&C) server to execute further instructions.\nWhat type of attack is being carried out in this scenario?", "a": ["Man-in-the-Disk attack", "Camfecting attack", "Simjacker attack", "Agent Smith attack"], "c": [3], "e": null}, {"q": "A penetration tester is hired by a company to assess its vulnerability to social engineering attacks targeting its IT department. The tester decides\nto use a sophisticated pretext involving technical jargon and insider information to deceive employees into revealing their network credentials.\nWhat is the most effective social engineering technique the tester should employ to maximize the chances of obtaining valid credentials without\nraising suspicion?", "a": ["Send a generic phishing email with a malicious attachment to multiple employees", "Conduct a phone call posing as a high-level executive requesting urgent password resets", "Visit the office in person as a maintenance worker to gain physical access to terminals", "Create a convincing fake IT support portal that mimics the company's internal systems"], "c": [1], "e": null}, {"q": "A government agency trains a group of cybersecurity experts to carry out covert cyber missions against foreign threats and gather intelligence\nwithout being detected. These experts work exclusively for national interests.\nWhat classification best describes them?", "a": ["Hacktivists", "Gray hat hackers", "Organized hackers", "State-sponsored hackers"], "c": [3], "e": null}, {"q": "During a red team assessment of an enterprise LAN environment, the tester discovers an access switch that connects multiple internal\nworkstations. The switch has no port security measures in place. To silently intercept communication between different hosts without deploying\nARP poisoning or modifying the routing table, the tester launches a MAC flooding attack using the macof utility from the dsniff suite. This\ncommand sends thousands of Ethernet frames per minute, each with a random, spoofed source MAC addresses. Soon after the flooding begins,\nthe tester puts their network interface into promiscuous mode and starts capturing packets. They observe unicast traffic between different\ninternal machines appearing in their packet sniffer - traffic that should have only reached specific destinations on the network.\nWhat internal switch behavior is responsible for this sudden exposure of isolated traffic?", "a": ["The switch entered hub-like behavior due to a full CAM table.", "The interface performed DHCP starvation to capture broadcasts.", "The switch performed ARP spoofing to misroute packets.", "The switch disabled MAC filtering due to duplicate address conflicts."], "c": [0], "e": null}, {"q": "A penetration tester is assessing a web application that uses dynamic SQL queries for searching users in the database. The tester suspects the\nsearch input field is vulnerable to SQL injection.\nWhat is the best approach to confirm this vulnerability?", "a": ["Inject JavaScript into the search field to test for Cross-Site Scripting", "Use a directory traversal attack to access server configuration files", "Input `; DROP TABLE users; -- into the search field to test if the database query can be altered", "Perform a brute-force attack on the user login page to guess weak passwords"], "c": [2], "e": null}, {"q": "During an internal security assessment of a medium-sized enterprise network, a security analyst notices an unusual spike in ARP traffic. Closer\ninspection reveals that one particular MAC address is associated with multiple IP addresses across different subnets. The ARP packets were\nunsolicited replies rather than requests, and several employees from different departments have reported intermittent connection drops, failed\nlogins, and broken intranet sessions. The analyst suspects an intentional interference on the local network segment.\nWhat is the most likely cause of this abnormal behavior?", "a": ["Port security restricting all outbound MAC responses", "ARP poisoning causing routing inconsistencies", "Legitimate ARP table refresh on all clients", "DHCP snooping improperly configured"], "c": [1], "e": null}, {"q": "A company's online service is under a multi-vector DoS attack using both SYN floods and HTTP GET floods from a botnet. Standard firewalls and\nIDS are unable to prevent the outages.\nTo mitigate the attack without disrupting legitimate traffic, which advanced defense should the company implement?", "a": ["Use DDoS mitigation services that offer multi-layer protection", "Increase server bandwidth and apply basic rate limiting", "Configure the firewall to block all incoming SYN packets from external IPs", "Deploy a Web Application Firewall with anomaly detection"], "c": [0], "e": null}, {"q": "A penetration tester identifies malware that monitors the activities of a user and secretly collects personal information, such as login credentials\nand browsing habits.\nWhat type of malware is this?", "a": ["Ransomware", "Spyware", "Worm", "Rootkit"], "c": [1], "e": null}, {"q": "A penetration tester evaluates an industrial control system (ICS) that manages critical infrastructure. The tester discovers that the system uses\nweak default passwords for remote access.\nWhat is the most effective method to exploit this vulnerability?", "a": ["Execute a Cross-Site Request Forgery attack to manipulate system settings", "Perform a brute-force attack to guess the system's default passwords", "Conduct a denial-of-service attack to disrupt the system temporarily", "Use the default passwords to gain unauthorized access to the ICS and control system operations"], "c": [3], "e": null}, {"q": "A red team member uses an access token obtained from an Azure function to authenticate with Azure PowerShell and retrieve storage account\nkeys.\nWhat kind of abuse does this scenario demonstrate?", "a": ["Exploiting managed identities for unauthorized access", "Enumeration of user groups with AzureGraph", "Lateral movement via Stormspotter", "Gathering NSG rule information"], "c": [0], "e": null}, {"q": "A penetration tester is assessing a mobile application and discovers that the app is vulnerable to improper session management. The session\ntokens are not invalidated upon logout, allowing the tokens to be reused.\nWhat is the most effective way to exploit this vulnerability?", "a": ["Perform a replay attack by using the same session token after the user logs out", "Use a Cross-Site Request Forgery attack to steal the session tokens", "Execute a SQL injection attack to retrieve session tokens from the database", "Use a brute-force attack to guess valid session tokens"], "c": [0], "e": null}, {"q": "A penetration tester is assessing the security of a corporate wireless network that uses WPA2-Enterprise encryption with RADIUS authentication.\nThe tester wants to perform a man-in-the-middle attack by tricking wireless clients into connecting to a rogue access point.\nWhat is the most effective method to achieve this?", "a": ["Execute a Cross-Site Scripting attack on the wireless controller's login page", "Perform a dictionary attack on the RADIUS server to retrieve credentials", "Set up a fake access point with the same SSID and use a de-authentication attack", "Use a brute-force attack to crack the WPA2 encryption directly"], "c": [2], "e": null}, {"q": "A penetration tester is targeting a wireless network secured with WPA2-PSK. The tester captures the handshake but wants to speed up the\nprocess of cracking the pre-shared key.\nWhich approach would be most effective?", "a": ["Conduct a Cross-Site Scripting attack on the router's login page", "Use a dictionary attack with a large wordlist to crack the WPA2 key", "Use a brute-force attack to crack the pre-shared key manually", "Perform a SQL injection attack to bypass the WPA2 authentication"], "c": [1], "e": null}, {"q": "A penetration tester suspects that a web application's login form is vulnerable to SQL injection due to improper sanitization of user input.\nWhat is the most appropriate approach to test for SQL injection in the login form?", "a": ["Inject JavaScript into the input fields to test for Cross-Site Scripting", "Use a brute-force attack on the login page to guess valid credentials", "Enter ` OR `1'='1 in the username and password fields to bypass authentication", "Perform a directory traversal attack to access sensitive files"], "c": [2], "e": null}, {"q": "During a red team operation on a segmented enterprise network, the testers discover that the organization's perimeter devices are configured to\ndeeply inspect only connection initiation packets, especially TCP SYNs and HTTP requests. However, response traffic and acknowledgment\npackets within ongoing sessions are allowed with minimal inspection. The red team needs to covertly transmit payloads to an internal\ncompromised host using a method that blends into existing session traffic and avoids detection.\nWhich approach should they take to bypass these defensive mechanisms?", "a": ["ICMP flooding", "Port knocking", "ACK tunneling", "SYN scanning"], "c": [2], "e": null}, {"q": "A penetration tester suspects that the web application'mso\"Order History\" page is vulnerable to SQL injection because it displays user orders based\non an unprotected user ID parameter in the URL.\nWhat is the most appropriate approach to test this?", "a": ["Perform a directory traversal attack to access sensitive system files", "Inject JavaScript into the URL parameter to test for Cross-Site Scripting", "Use a brute-force attack on the login form to identify valid user credentials", "Modify the URL parameter to userlD=I OR 1=1 and observe if all orders are displayed"], "c": [3], "e": null}, {"q": "A financial institution's online banking platform is experiencing intermittent downtime caused by a sophisticated DDoS attack that combines SYN\nfloods and HTTP GET floods from a distributed botnet. Standard firewalls and load balancers are unable to mitigate the attack without affecting\nlegitimate users.\nTo protect their infrastructure and maintain service availability, which advanced mitigation strategy should the institution implement?", "a": ["Configure firewalls to block all incoming SYN and HTTP requests from external IPs", "Deploy an Intrusion Prevention System with deep packet inspection capabilities", "Utilize a cloud-based DDoS protection service that offers multi-layer traffic scrubbing and auto-scaling", "Increase server bandwidth and apply basic rate limiting on incoming traffic"], "c": [2], "e": null}, {"q": "A penetration tester discovers that a system is infected with malware that encrypts all the files and demands payment to decrypt them.\nWhat type of malware is this?", "a": ["Ransomware", "Worm", "Keylogger", "Spyware"], "c": [0], "e": null}, {"q": "A penetration tester discovers malware on a system that disguises itself as legitimate software but performs malicious actions in the\nbackground.\nWhat type of malware is this?", "a": ["Spyware", "Trojan", "Rootkit", "Worm"], "c": [1], "e": null}, {"q": "An attacker is analyzing traffic from a mobile app and finds that sensitive data like session tokens are being transmitted over HTTP instead of\nHTTPS. The attacker plans to intercept and manipulate the data during transmission.\nWhich vulnerability is the attacker exploiting?", "a": ["Insufficient Input Validation", "Improper SSL Pinning", "Security Misconfiguration", "Insecure Communication"], "c": [3], "e": null}, {"q": "A penetration tester is tasked with enumerating user accounts and network resources in a highly secured Windows environment where standard\nmethods like SMB null sessions are blocked. The network employs strict firewall rules and intrusion detection systems to prevent unauthorized\naccess.\nWhich technique should the tester use to discreetly gather the required information without triggering security alarms?", "a": ["Utilize NetBIOS over TCP/IP to list shared resources anonymously", "Conduct a zone transfer by querying the organization's DNS servers", "Leverage Active Directory Web Services for unauthorized queries", "Exploit a misconfigured LDAP service to perform anonymous searches"], "c": [3], "e": null}, {"q": "A penetration tester targets a company's executive assistants by referencing upcoming board meetings in an email requesting access to\nconfidential agendas.\nWhat is the most effective social engineering technique to obtain the necessary credentials without raising suspicion?", "a": ["Develop a fake LinkedIn profile to connect and request information", "Create a personalized email referencing specific meetings and request access", "Call posing as a trusted IT support to verify credentials", "Send a mass phishing email with a fake meeting link"], "c": [1], "e": null}, {"q": "During a covert red team engagement, a penetration tester is tasked with identifying live hosts in a target organization's internal subnet\n(10.0.0.0/24) without triggering intrusion detection systems (IDS). To remain undetected, the tester opts to use the command nmap -sn -PE\n10.0.0.0/24, which results in several \"Host is up\" responses, even though the organization's IDS is tuned to detect high-volume scans. After the\nengagement, the client reviews the logs and is surprised that the scan was not flagged.\nWhat allowed the scan to complete without triggering alerts?", "a": ["It used UDP packets that bypassed ICMP inspection.", "It used TCP ACK packets that were allowed through.", "It scanned only the ports open in the firewall whitelist.", "It performed an ICMP Echo ping sweep without port probing."], "c": [3], "e": null}, {"q": "During a security assessment of a cloud-hosted application using SOAP-based web services, a red team operator intercepts a legitimate SOAP\nrequest sent by a user. The operator duplicates the body of the message along with its digital signature, inserts the duplicate into the same SOAP\nenvelope, and forwards it to the server. Due to improper validation of the message structure, the server accepts the duplicated body as authentic\nand processes it, resulting in unauthorized code execution. This behavior reveals a vulnerability in how the server handles signed SOAP\nmessages.\nWhat type of attack does this scenario illustrate?", "a": ["IMDS abuse", "Wrapping attack", "Cloud snooper attack", "Cryptanalysis attack"], "c": [1], "e": null}, {"q": "A financial services firm is experiencing a sophisticated DoS attack on their DNS servers with DNS amplification and their web servers with HTTP\nfloods. Traditional firewall rules and IDS are failing to mitigate the attack effectively.\nTo protect their infrastructure without impacting legitimate users, which advanced mitigation strategy should the firm implement?", "a": ["Deploy a Web Application Firewall to filter HTTP traffic", "Utilize a cloud-based DDoS protection service with traffic scrubbing capabilities", "Increase server capacity and implement simple rate limiting", "Block all incoming traffic from suspicious IP ranges using access control lists"], "c": [1], "e": null}, {"q": "A penetration tester is assessing an organization's cloud infrastructure and discovers that the cloud storage buckets are not publicly accessible\nbut have misconfigured Identity and Access Management (IAM) policies. The IAM policies unintentionally grant read and write permissions to any\nauthenticated user.\nWhat is the most effective way to exploit this misconfiguration?", "a": ["Use leaked API keys to access the cloud storage buckets and exfiltrate data", "Execute a SQL injection attack on the organization's website to retrieve sensitive information", "Create a personal cloud account to authenticate and access the misconfigured storage buckets", "Perform a Cross-Site Scripting attack on the cloud management portal to gain access"], "c": [2], "e": null}, {"q": "A penetration tester is running a vulnerability scan on a company's network. The scan identifies an open port with a high-severity vulnerability\nlinked to outdated software.\nWhat is the most appropriate next step for the tester?", "a": ["Ignore the vulnerability and focus on finding more vulnerabilities", "Research the vulnerability and determine if it has a publicly available exploit", "Execute a denial-of-service attack on the open port", "Perform a brute-force attack on the service running on the open port"], "c": [1], "e": null}, {"q": "A penetration tester is tasked with assessing the security of a smart home loT device that communicates with a mobile app over an unencrypted\nconnection. The tester wants to intercept the communication and extract sensitive information.\nWhat is the most effective approach to exploit this vulnerability?", "a": ["Use a man-in-the-middle attack to intercept and analyze the unencrypted traffic", "Use a dictionary attack to guess the admin login credentials of the device", "Execute a SQL injection attack on the loT device's cloud management portal", "Perform a brute-force attack on the device's Wi-Fi credentials"], "c": [0], "e": null}, {"q": "An ethical hacker needs to enumerate user accounts and shared resources within a company's internal network without raising any security alerts.\nThe network consists of Windows servers running default configurations.\nWhich method should the hacker use to gather this information covertly?", "a": ["Utilize SNMP queries to extract user information from network devices", "Deploy a packet sniffer to capture and analyze network traffic", "Perform a DNS zone transfer to obtain internal domain details", "Exploit null sessions to connect anonymously to the IPC$ share"], "c": [3], "e": null}, {"q": "A penetration tester is tasked with identifying vulnerabilities on a web server running outdated software. The server hosts several web\napplications and is protected by a basic firewall.\nWhich technique should the tester use to exploit potential server vulnerabilities?", "a": ["Conduct a SQL injection attack on the web application's login form", "Perform a brute-force login attack on the admin panel", "Use directory traversal to access sensitive configuration files", "Execute a buffer overflow attack targeting the web server software"], "c": [3], "e": null}, {"q": "A penetration tester needs to identify open ports and services on a target network without triggering the organization's intrusion detection\nsystems, which are configured to detect high-volume traffic and common scanning techniques. To achieve stealth, the tester decides to use a\nmethod that spreads out the scan over an extended period.\nWhich scanning technique should the tester employ to minimize the risk of detection?", "a": ["Use a Stealth scan by adjusting the scan timing options to be slow and random", "Execute a UDP scan targeting all ports simultaneously", "Perform a TCP SYN scan using a fast scan rate", "Conduct a TCP Xmas scan sending packets with all flags set"], "c": [0], "e": null}, {"q": "A penetration tester identifies malware on a system that hides its presence and gives an attacker access to administrative functions without being\ndetected.\nWhat type of malware is this?", "a": ["Ransomware", "Virus", "Keylogger", "Rootkit"], "c": [3], "e": null}, {"q": "During an internal assessment, a penetration tester gains access to a hash dump containing NTLM password hashes from a compromised\nWindows system. To crack the passwords efficiently, the tester uses a high-performance CPU setup with the hashcat tool, configuring it to attempt\nmillions of password combinations per second using a known hash algorithm. This setup drastically reduces the time required for password\nrecovery compared to CPU-based cracking methods.\nWhich technique is being optimized in this scenario?", "a": ["Spoof NetBIOS to impersonatea file server", "Dump SAM contents for offline password retrieval", "Exploit dictionary rules with appended symbols", "Leverage hardware acceleration for cracking speed"], "c": [3], "e": null}, {"q": "A penetration tester detects malware on a system that secretly records all keystrokes entered by the user.\nWhat type of malware is this?", "a": ["Worm", "Rootkit", "Keylogger", "Ransomware"], "c": [2], "e": null}, {"q": "During a network analysis at a mid-sized enterprise, a security engineer detects irregular DHCP behavior. Multiple endpoints are being assigned\nincorrect gateway and DNS settings, causing loss of connectivity and redirection to unauthorized servers. Packet captures show that clients are\nreceiving IP address offers from more than one DHCP source. Upon further investigation, the logs confirm that the access switch is forwarding\nDHCP responses from all connected ports without filtering. This indicates that an unauthorized (rogue) DHCP server has been introduced into the\nnetwork, impersonating the legitimate server and responding to client DHCPDISCOVER messages.\nTo prevent this type of attack from occurring in the future, what security feature should the administrator enable?", "a": ["Port security on all trunk ports", "Static DHCP reservations for clients", "DHCP snooping on trusted interfaces", "ARP inspection across VLANs"], "c": [2], "e": null}, {"q": "A system administrator observes that several machines in the network are repeatedly sending out traffic to unknown IP addresses. Upon\ninspection, these machines were part of a coordinated spam campaign.\nWhat is the most probable cause?", "a": ["Keyloggers were harvesting user credentials", "Worms exploited zero-day vulnerabilities", "Browsers were redirected to adware-injected sites", "Devices were enslaved into a botnet network"], "c": [3], "e": null}, {"q": "A hacker is analyzing a system that uses two rounds of symmetric encryption with different keys. To speed up key recovery, the attacker encrypts\nthe known plaintext with all possible values of the first key and stores the intermediate ciphertexts. Then, they decrypt the final ciphertext using all\npossible values of the second key and compare the results to the stored values.\nWhich cryptanalytic method does this approach represent?", "a": ["Reverse permutations to bypass encryption", "Scrape electromagnetic leakage for bits", "Use midpoint collision to identify key pair", "Flood memory with brute-forced credentials"], "c": [2], "e": null}, {"q": "A penetration tester is assessing a web application that does not properly sanitize user input in the search field. The tester suspects the\napplication is vulnerable to a SQL injection attack.\nWhich approach should the tester take to confirm the vulnerability?", "a": ["Inject JavaScript into the search field to perform a Cross-Site Scripting attack", "Perform a brute-force attack on the login page to identify weak passwords", "Input a SQL query such as ` OR 1=1 -- into the search field to check for SQL injection", "Use directory traversal in the search field to access sensitive files on the server"], "c": [2], "e": null}, {"q": "An ethical hacker needs to gather detailed information about a company's internal network without initiating any direct interaction that could be\nlogged or raise suspicion.\nWhich approach should be used to obtain this information covertly?", "a": ["Analyze the company's SSL certificates for internal details", "Inspect public WHOIS records for hidden network data", "Examine email headers from past communications with the company", "Utilize network scanning tools to map the company's IP range"], "c": [2], "e": null}, {"q": "A penetration tester is conducting an external assessment of a corporate web server. They start by accessing\nhttps://www.targetcorp.com/robots.txt and observe multiple Disallow entries that reference directories such as /admin-panel/, /backup/, and\n/confidential_docs/. When the tester directly visits these paths via browser, they find that access is not restricted by authentication and gain\naccess to sensitive files, including server configuration and unprotected credentials.\nWhich stage of the web server attack methodology is demonstrated in this scenario?", "a": ["Gathering information through exposed indexing instructions.", "Leveraging the directory traversal flaw to access critical server files.", "Injecting malicious SQL queries to access sensitive database records.", "Performing a cross-site request forgery attack to manipulate user actions."], "c": [0], "e": null}, {"q": "A penetration tester performs a vulnerability scan on a company's network and identifies a critical vulnerability related to an outdated version of a\ndatabase server.\nWhat should the tester prioritize as the next step?", "a": ["Perform a denial-of-service attack on the database server", "Conduct a brute-force attack on the d internal system within a corporate network protected by advanced\nfirewalls, IDS, and email security gateways. To maintain persistence and evade content inspection, the attacker crafts a malicious HTML email\nattachment containing obfuscated JavaScript code. When the user opens the attachment in a browser, a hidden JavaScript blob dynamically\nreconstructs a malware payload and triggers an automatic file download on the client side. No external connections are initiated during this\nprocess, making it difficult for network security tools to detect or block the attack.\nWhich evasion technique is being employed to bypass the firewall and IDS protections?", "a": ["HTML smuggling", "Port forwarding", "HTTP header spoofing", "Cross-site scripting"], "c": [0], "e": null}, {"q": "During a red team simulation, an attacker attempts to deliver a payload to a web server hosted within a segmented enterprise network. The target\nenvironment uses a Network-based Intrusion Detection System (NIDS) that performs deep packet inspection and pattern matching against known\nattack signatures. To avoid triggering alarms, the attacker decides to manipulate the structure of the packets rather than the actual attack code.\nThe approach involves crafting packets with intentionally malformed checksums and modifying specific fields so that the packets are accepted by\nthe IDS but discarded by the destination system. This leads the IDS to process and log a different set of data than what the actual target receives,\neffectively bypassing signature detection.\nWhich evasion technique is the attacker employing to deceive the IDS into misinterpreting the attack traffic while the payload remains unchanged\non the target system?", "a": ["Polymorphic shellcode", "Insertion attack", "Fragmentation attack", "Session splicing"], "c": [1], "e": null}, {"q": "A penetration tester is evaluating a secure web application that uses HTTPS, secure cookie flags, and regenerates session IDs only during specific\nuser actions.\nTo hijack a legitimate user's session without triggering security alerts, which advanced session hijacking technique should the tester employ?", "a": ["Implement a Cross-Site Scripting attack to steal session tokens.", "Conduct a session token prediction attack by analyzing session ID patterns.", "Perform a man-in-the-middle attack by exploiting certificate vulnerabilities.", "Use a session fixation attack by setting a known session ID before the user logs in."], "c": [3], "e": null}, {"q": "A penetration tester is trying to attack a wireless network that uses WPA3 encryption. The tester wants to exploit the handshake to obtain the\npassword but realizes WPA3 has stronger protections.\nWhat would be the most effective approach to compromise the network?", "a": ["Downgrade the connection to WPA2 and capture the handshake to crack the key", "Perform a brute-force attack directly on the WPA3 handshake", "Perform a SQL injection attack on the router's login page", "Execute a dictionary attack on the WPA3 handshake using common passwords"], "c": [0], "e": null}, {"q": "A company hires a hacker to test its network security by simulating real-world attacks. The hacker has permission and operates within legal\nboundaries.\nWhat is this type of hacker called?", "a": ["Grey Hat Hacker", "Black Hat Hacker", "White Hat Hacker", "Script Kiddie"], "c": [2], "e": null}, {"q": "A multinational organization is implementing a security upgrade for its corporate wireless infrastructure. The current WPA2-Personal configuration\nrelies on a shared passphrase, which the IT team finds difficult to rotate and manage securely across hundreds of employee devices. To enhance\nsecurity and scalability, the organization decides to migrate to WPA2-Enterprise. The new setup must allow for centralized control of user\nauthentication, support certificate-based identity verification, and ensure that each authenticated client is assigned a unique session encryption\nkey to prevent ke eamlessly redirected to a\nvisually identical phishing page, hosted on a suspicious IP address. After tracing the DNS resolution path, the tester discovers that the\nauthoritative DNS server has been compromised, and its records have been altered to point to the attacker's server. The redirection affects all DNS\nqueries for the domain, indicating unauthorized control over name resolution infrastructure, rather than local cache poisoning or client-side\nmanipulation. The tester confirms that this redirection was achieved by tampering with the DNS zone records themselves.\nWhich technique is being used in this scenario?", "a": ["Initiate a DNS amplification attack by leveraging recursive servers to flood the target.", "Carry out DNS server hijacking by tampering with the legitimate name resolution infrastructure.", "Perform DNS rebinding in the import functionality to manipulate browser-origin interactions.", "Establish covert communication using DNS tunneling over standard DNS queries."], "c": [1], "e": null}, {"q": "During a cryptographic audit of a legacy system, a security analyst observes that an outdated block cipher is leaking key-related information when\nanalyzing large sets of plaintext-ciphertext pairs.\nWhat approach might an attacker exploit here?", "a": ["Modify the padding to obtain plaintext", "Attack the hash algorithm for collisions", "Use linear approximations to infer secret bits", "Launch a key replay through IV duplication"], "c": [2], "e": null}, {"q": "A red team operator wants to obtain credentials from a Windows machine without touching the LSASS process memory, as security controls and\nCredential Guard are active. Instead, they leverage a method that uses the Security Support Provider Interface (SSPI) to generate NetNTLM\nresponses within the context of the logged-in user and collect those responses for offline cracking.\nWhich attack technique is being used in this scenario?", "a": ["Hash injection approach using credential hashes for aut
