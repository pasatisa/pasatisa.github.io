onitor the execution of scripts and system tools, especially those invoked by unsanctioned processes."], "c": [3], "e": null}, {"q": "An ethical hacker is conducting a penetration test on a company's network with full knowledge and permission from the organization.\nWhat is this type of hacking called?", "a": ["Blue Hat Hacking", "Black Hat Hacking", "Grey Hat Hacking", "White Hat Hacking"], "c": [3], "e": null}, {"q": "What is the main difference between ethical hacking and malicious hacking?", "a": ["Ethical hackers use different tools than malicious hackers", "Ethical hacking is illegal, while malicious hacking is legal", "Ethical hackers always work alone, while malicious hackers work in teams", "Ethical hacking is performed with permission, while malicious hacking is unauthorized"], "c": [3], "e": null}, {"q": "A security analyst is tasked with gathering detailed information about an organization's network infrastructure without making any direct contact\nthat could be logged or trigger alarms.\nWhich method should the analyst use to obtain this information covertly?", "a": ["Examine leaked documents or data dumps related to the organization", "Use network mapping tools to scan the organization's IP range", "Initiate social engineering attacks to elicit information from employees", "Perform a DNS brute-force attack to discover subdomains"], "c": [0], "e": null}, {"q": "A penetration tester is assessing a company's HR department for vulnerability to social engineering attacks using knowledge of recruitment and\nonboarding processes.\nWhat is the most effective technique to obtain network access credentials without raising suspicion?", "a": ["Conduct a phone call posing as a new employee to request password resets", "Create a convincing fake onboarding portal that mimics the company's internal systems", "Develop a fake social media profile to connect with HR employees and request sensitive information", "Send a generic phishing email with a link to a fake HR policy document"], "c": [1], "e": null}, {"q": "A penetration tester is mapping a Windows-based internal network. The tester notices that TCP port 139 and UDP port 137 are open on multiple\nsystems. File and printer sharing is enabled.\nTo retrieve hostnames, user details, and domain roles without triggering alerts, which tool and method would be most effective?", "a": ["Perform LDAP enumeration via anonymous bind.", "Run nbtstat -A to query the NetBIOS name table.", "Use psloggedon to retrieve remote login sessions.", "Use pspasswd to change remote passwords."], "c": [1], "e": null}, {"q": "A penetration tester is attempting to gain access to a wireless network that is secured with WPA2 encryption. The tester successfully captures the\nWPA2 handshake but now needs to crack the pre-shared key.\nWhat is the most effective method to proceed?", "a": ["Execute a SQL injection attack on the router's login page", "Perform a brute-force attack using common passwords against the captured handshake", "Use a dictionary attack against the captured WPA2 handshake to crack the key", "Conduct a de-authentication attack to disconnect all clients from the network"], "c": [2], "e": null}, {"q": "During a security evaluation of a smart agriculture setup, an analyst investigates a cloud-managed irrigation controller. The device is found to\ntransmit operational commands and receive firmware updates over unencrypted HTTP. Additionally, it lacks mechanisms to verify the integrity or\nauthenticity of those updates. This vulnerability could allow an adversary to intercept communications or inject malicious firmware, leading to\nunauthorized control over the device's behavior or denial of essential functionality.\nWhich loT threat category does this situation best illustrate?", "a": ["Insecure ecosystem interfaces", "Insufficient privacy protection", "Insecure default settings", "Insecure network services"], "c": [0], "e": null}, {"q": "A penetration tester has completed a vulnerability scan on a company's internal network. The scan reveals multiple low-risk vulnerabilities, but\none high-risk vulnerability is associated with outdated server software.\nWhat should the tester prioritize as the next step?", "a": ["Focus on exploiting the low-risk vulnerabilities first", "Perform a brute-force attack on the server to gain access", "Verify if the high-risk vulnerability is exploitable by checking for known exploits", "Ignore the high-risk vulnerability and proceed with testing other systems"], "c": [2], "e": null}, {"q": "A penetration tester suspects that a web application's product search feature is vulnerable to SQL injection. The tester needs to confirm this by\nmanipulating the SQL query.\nWhat is the best technique to test for SQL injection?", "a": ["Input 1 OR 1=1 in the search field to retrieve all products from the database", "Insert admin `-- in the search field to attempt bypassing authentication", "Inject a malicious script into the search field to test for Cross-Site Scripting", "Use directory traversal syntax in the search field to access server files"], "c": [0], "e": null}, {"q": "A penetration tester is hired to legally assess the security of a company's network by identifying vulnerabilities and attempting to exploit them.\nWhat type of hacker is this?", "a": ["Script Kiddie", "Black Hat", "White Hat", "Grey Hat"], "c": [2], "e": null}, {"q": "A penetration tester suspects that a web application's user profile page is vulnerable to SQL injection, as it uses the userlD parameter in SQL\nqueries without proper sanitization.\nWhich technique should the tester use to confirm the vulnerability?", "a": ["Attempt a directory traversal attack using the userlD parameter", "Inject HTML code into the userlD parameter to test for Cross-Site Scripting", "Modify the userlD parameter in the URL to `OR `1'='1 and check if it returns multiple profiles", "Use the userlD parameter to perform a brute-force attack on the admin login page"], "c": [2], "e": null} wide update", "Create a targeted spear-phishing email that references recent internal projects and requests credential verification", "Conduct a phone call posing as the CEO to request immediate password changes from executives", "Develop a fake social media profile to connect with executives and request private information"], "c": [1], "e": null}, {"q": "A penetration tester is evaluating a web application that does not properly validate the authenticity of HTTP requests. The tester suspects the\napplication is vulnerable to Cross-Site Request Forgery (CSRF).\nWhich approach should the tester use to exploit this vulnerability?", "a": ["Execute a directory traversal attack to access restricted server files", "Perform a brute-force attack on the application's login page to guess weak credentials", "Inject a SQL query into the input fields to perform SQL injection", "Create a malicious website that sends a crafted request on behalf of the user when visited"], "c": [3], "e": null}, {"q": "An attacker extracts the initial bytes from an encrypted file container and uses a tool to iterate through numeric combinations.\nWhat type of cryptanalytic technique is being utilized?", "a": ["Force encryption key through quantum solving", "Test every possible password through automation", "Analyze output length to spot anomalies", "Seek identical digests across hash outputs"], "c": [1], "e": null}, {"q": "During an internal red team engagement, a penetration tester is tasked with mapping the network topology of an organization with multiple\nsegmented subnets. The tester initiates a series of traceroutes from a compromised host to various internal devices across these segments.\nUpon analyzing the output, the tester observes that a specific IP address, 10.10.10.1, consistently appears as the second-to-last hop before\nreaching several target systems located in different IP ranges. Despite varying final destination IPs, this intermediate address remains constant.\nNo signs of DNS spoofing, ICMP anomalies, or host-level misconfigurations are present.\nWhat does this repeated hop pattern most likely indicate in the context of network architecture?", "a": ["DNS poisoning at the local resolver used by the compromised host.", "Loopback misconfiguration at the destination endpoints.", "A core router facilitating communication across multiple internal subnets.", "Presence of a transparent proxy device acting as a forwarder."], "c": [2], "e": null}, {"q": "A penetration tester submits altered ciphertexts to a web server and pays close attention to how the server responds. When the server produces\ndifferent error messages for certain inputs, the tester starts to infer which inputs result in valid internal processing.\nWhich cryptanalytic method is being used in this scenario?", "a": ["Exploit padding error feedback to recover data", "Inspect randomness across multiple sessions", "Flip bits randomly to scramble the decryption", "Compare traffic timing to deduce the key"], "c": [0], "e": null}, {"q": "A penetration tester is tasked with uncovering historical content from a company's website, including previously exposed login portals or sensitive\ninternal pages. Direct interaction with the live site is prohibited due to strict monitoring policies. To stay undetected, the tester decides to explore\npreviously indexed snapshots of the organization's web content saved by external sources.\nWhich approach would most effectively support this passive information-gathering objective?", "a": ["Apply the cache: operator to view Google's stored versions of target pages.", "Search with intext: \"login\" site:target.com to retrieve login data.", "Use the link: operator to find backlinks to login portals.", "Use the intitle: login operator to list current login pages."], "c": [0], "e": null}, {"q": "A penetration tester is tasked with compromising a company's wireless network, which uses WPA2-PSK encryption. The tester wants to capture\nthe WPA2 handshake and crack the pre-shared key.\nWhat is the most appropriate approach to achieve this?", "a": ["Perform a brute-force attack directly on the WPA2 encryption", "Execute a Cross-Site Scripting attack on the router's admin panel", "Conduct a Man-in-the-Middle attack by spoofing the router's MAC address", "Use a de-authentication attack to force a client to reconnect, capturing the WPA2 handshake"], "c": [3], "e": null}, {"q": "A penetration tester evaluates a company's susceptibility to advanced social engineering attacks targeting its executive team. Using detailed\nknowledge of recent financial audits and ongoing projects, the tester crafts a highly credible pretext to deceive executives into revealing their\nnetwork credentials.\nWhat is the most effective social engineering technique the tester should employ to obtain the necessary credentials without raising suspicion?", "a": ["Conduct a phone call posing as an external auditor requesting access to financial systems", "Develop a spear-phishing email that references specific financial audit details and requests login confirmation", "Create a convincing fake email from the CFO asking for immediate credential verification", "Send a mass phishing email with a link to a fake financial report"], "c": [1], "e": null}, {"q": "While conducting a covert penetration test on a UNIX-based infrastructure, the tester decides to bypass intrusion detection systems by sending\nspecially crafted TCP packets with an unusual set of flags enabled. These packets do not initiate or complete any TCP handshake. During the\nscan, the tester notices that when certain ports are probed, there is no response from the target, but for others, a TCP RST (reset) packet is\nreceived. The tester notes that this behavior consistently aligns with open and closed ports, respectively, without triggering detection systems\nconfigured to monitor connection-based scans.\nBased on these observations, which scanning technique is most likely being used?", "a": ["FIN scan using stealthy flag combinations", "ACK flag scan to evaluate firewall behavior", "Xmas scan leveraging RFC 793 quirks", "TCP Connect scan to complete the three-way handshake"], "c": [0], "e": null}, {"q": "An ethical hacker needs to gather sensitive information about a company's internal network without engaging directly with the organization's\nsystems to avoid detection.\nWhich method should be employed to obtain this information discreetly?", "a": ["Perform a WHOIS lookup on the company's domain registrar", "Analyze the organization's job postings for technical details", "Exploit a public vulnerability in the company's web server", "Use port scanning tools to probe the company's firewall"], "c": [1], "e": null}, {"q": "A penetration tester finds malware that spreads across a network without user interaction, replicating itself from one machine to another.\nWhat type of malware is this?", "a": ["Worm", "Keylogger", "Virus", "Ransomware"], "c": [0], "e": null}, {"q": "A penetration tester is assessing a web application that employs secure, HTTP-only cookies, regenerates session IDs upon login and uses strict\nsession timeout policies.\nTo hijack a user's session without triggering the application's security defenses, which advanced technique should the tester utilize?", "a": ["Conduct a network-level man-in-the-middle attack to intercept and reuse session tokens", "Perform a session token prediction by analyzing session ID entropy and patterns", "Execute a Cross-Site Request Forgery attack to manipulate session states", "Implement a session fixation strategy by pre-setting a session ID before user authentication"], "c": [0], "e": null}, {"q": "A university's online registration system is experiencing disruptions due to a DDoS attack that combines DNS reflection and HTTP slowloris\ntechniques. Standard firewalls and load balancers are unable to mitigate the attack without impacting legitimate users.\nTo ensure uninterrupted registration services, which advanced mitigation strategy should the university implement?", "a": ["Deploy an Intrusion Prevention System with deep packet inspection capabilities", "Increase server bandwidth and implement basic rate limiting on all incoming traffic", "Configure the firewall to block all incoming DNS and HTTP requests from external IPs", "Utilize a hybrid DDoS mitigation service that offers both on-premises and cloud-based protection"], "c": [3], "e": null}, {"q": "In a vertical privilege escalation scenario, the attacker attempts to gain access to a user account with higher privileges than their current level.\nWhich of the following examples describes vertical privilege escalation?", "a": ["An attacker uses an unquoted service path vulnerability to gain unauthorized access to another user's data with equivalent privileges.", "An attacker leverages a lack of session management controls to switch accounts and access resources assigned to another user with the", "An attacker exploits weak access controls to access and steal sensitive information from another user's account with alike privileges.", "An attacker escalates from a regular user to an administrator by exploiting administrative functions."], "c": [3], "e": null}, {"q": "While evaluating a smart card implementation, a security analyst observes that an attacker is measuring fluctuations in power consumption and\ntiming variations during encryption operations on the chip. The attacker uses this information to infer secret keys used within the device.\nWhat type of exploitation is being carried out?", "a": ["Observe hardware signals to deduce secrets", "Disrupt control flow to modify instructions", "Crack hashes using statistical collisions", "Force session resets through input flooding"], "c": [0], "e": null}, {"q": "A penetration tester finds that a web application does not properly validate user input and is vulnerable to reflected Cross-Site Scripting (XSS).\nWhat is the most appropriate approach to exploit this vulnerability?", "a": ["Perform a brute-force attack on the user login form to steal credentials", "Inject a SQL query into the search form to attempt SQL injection", "Embed a malicious script in a URL and tricked a user into clicking the link", "Use directory traversal to access sensitive files on the server"], "c": [2], "e": null}, {"q": "During a red team assessment, an ethical hacker is assigned the task of mapping a large multinational enterprise's external attack surfaces. The\ntarget organization operates multiple regional websites and cloud-hosted environments under different subdomains. Due to strict rules of\nengagement, the hacker must avoid any active scans or probes that could alert the organization's security monitoring systems. The goal is to\nuncover as many publicly exposed subdomains as possible to identify potential unpatched or misconfigured services that may exist under\nobscure or forgotten subdomains.\nWhich method should the ethical hacker use to passively enumerate the organization's subdomains?", "a": ["Attempt to guess admin credentials and access the company's DNS portal.", "Leverage tools like Netcraft or DNSdumpster to gather subdomain information.", "Conduct a brute-force DNS subdomain enumeration.", "Request internal DNS records using spoofed credentials."], "c": [1], "e": null}, {"q": "During a stealth assessment of a corporate internal network, an attacker gains access to a subnet where host communications are switched and\nprotected against common ARP poisoning techniques. While passively sniffing traffic, the attacker observes that the target system (Host B)\nintermittently delays its response to ARP requests. Recognizing a potential opportunity, the attacker crafts and injects a fake ARP reply that maps\nthe target's IP address to their own MAC address and sends it before the legitimate reply arrives. Over time, the attacker notices that packets\noriginally intended for Host B occasionally arrive at their own system, especially during these ARP response delays. The switch's CAM table seems\nto temporarily associate the target's IP with the attacker's MAC and port, before reverting back once the legitimate host reasserts itself.\nWhat type of sniffing attack is the attacker performing?", "a": ["Passive sniffing on a switched network", "ARP poisoning for MiTM interception", "Switch port stealing via timing-based ARP spoofing", "Duplicate IP conflict resolution attack"], "c": [2], "e": null}, {"q": "A security researcher is analyzing a target organization's publicly accessible cloud infrastructure. While reviewing the website's HTML source\ncode, the researcher discovers direct references to files hosted on Amazon S3.\nWhat is the most effective way to identify additional publicly accessible bucket URLs used by the target?", "a": ["Perform packet sniffing to intercept internal S3 bucket names.", "Use Google advanced search operators to enumerate S3 bucket URLs.", "Exploit XSS to force the page to reveal the S3 links.", "Use SQL injection to extract internal file paths from the database."], "c": [1], "e": null}, {"q": "During a security assessment, a consultant investigates how the application handles requests from authenticated users. They discover that once\na user logs in, the application does not verify the origin of subsequent requests. To exploit this, the consultant creates a web page containing a\nmalicious form that submits a funds transfer request to the application. A logged-in user, believing the page is part of a promotional campaign,\nfills out the form and submits it. The application processes the request successfully without any reauthentication or user confirmation, completing\nthe transaction under the victim's session.\nWhich session hijacking technique is being used in this scenario?", "a": ["Hijacking a user session using a cross-site request forgery attack", "Hijacking a user session using a cross-site script attack", "Hijacking a user session using a session replay attack", "Hijacking a user session using a session fixation attack"], "c": [0], "e": null}, {"q": "A penetration tester is testing a web application's product search feature, which takes user input and queries the database. The tester suspects\nthe input is not properly sanitized.\nWhat is the best approach to confirm the presence of SQL injection?", "a": ["Enter 1' OR `1'='1 to check if all products are returned", "Use directory traversal syntax to access restricted files on the server", "Input `; DROP TABLE products; -- to see if the table is deleted", "Inject a script like to test for Cross-Site Scripting"], "c": [0], "e": null}, {"q": "A penetration tester is tasked with mapping an organization's network while avoiding detection by sophisticated intrusion detection systems\n(IDS). The organization employs advanced IDS capable of recognizing common scanning patterns.\nWhich scanning technique should the tester use to effectively discover live hosts and open ports without triggering the IDS?", "a": ["Perform an ICMP Echo scan to ping all network devices", "Conduct a TCP Connect scan using randomized port sequences", "Execute a FIN scan by sending TCP packets with the FIN flag set", "Use an Idle scan leveraging a third-party zombie host"], "c": [3], "e": null}, {"q": "During a black-box internal penetration test, a security analyst is tasked with identifying potentially exploitable services running on an SNMP-\nenabled Linux server. The target organization uses SNMPv2, and the default community string \"public\" has not been changed. The analyst\nconfirms that UDP port 161 is open and accessible. To gather service-related intelligence for privilege escalation or lateral movement, the analyst\ndecides to enumerate all running processes on the host.\nWhich Nmap command would most effectively retrieve the required information?", "a": ["nmap -sU -p 161 --script snmp-sysdescr", "nmap -sU -p 161 --script snmp-win32-services", "nmap -sU -p 161 --script snmp-processes", "nmap -sU -p 161 --script snmp-interfaces"], "c": [2], "e": null}, {"q": "A penetration tester is tasked with scanning a network protected by an IDS and firewall that actively blocks connection attempts on non-standard\nports. The tester needs to gather information on the target system without triggering alarms.\nWhich technique should the tester use to evade detection?", "a": ["Execute a TCP ACK scan to map firewall rules and bypass the IDS", "Use a low-and-slow scan to reduce detection by the IDS", "Perform a SYN flood attack to overwhelm the firewall", "Conduct a full TCP Connect scan to confirm open ports"], "c": [0], "e": null}, {"q": "During a red team engagement simulating a targeted attack on a smart office environment, an ethical hacker identifies a thermostat used for\nregulating temperature across multiple floors. While analyzing its firmware management process, the tester discovers that the device accepts\nolder versions without verifying their integrity or authenticity. The attacker successfully loads a previously deprecated firmware that contains\nknown vulnerabilities and gains unauthorized access to the broader network by exploiting reintroduced flaws. No mechanisms are in place to\nprevent version rollback or verify firmware trustworthiness.\nWhich loT security issue is most accurately demonstrated in this scenario?", "a": ["Denial-of-service through physical tampering", "Insecure network service exposure", "Use of insecure third-party components", "Lack of secure update mechanisms"], "c": [3], "e": null}, {"q": "During a security assessment of a company's internal web application, a penetration tester examines how the application processes input values\npassed in the web address query string. The application includes a feature that dynamically fetches documents based on a filename value\nprovided in the web address (e.g., https://intranet.example.com/view?file=report.txt). By altering this input to include sequences like\n../../../../etc/passwd, the tester successfully navigates beyond the intended storage location and accesses restricted files. Further manipulation\nreveals access to sensitive configuration files, source code, and internal scripts, confirming that the application lacks proper input sanitization and\nisolation of file access paths.\nWhich attack method does this scenario illustrate?", "a": ["Exploit buffer overflow issues by injecting oversized data in HTTP request headers.", "Inject malicious scripts into web pages to manipulate content via XSS vulnerabilities.", "Use directory traversal sequences in URL parameters to retrieve unauthorized system content.", "Conduct a brute-force attack to obtain administrative credentials."], "c": [2], "e": null}, {"q": "A penetration tester has gained access to a target system using default credentials.\nWhat is the most effective next step to escalate privileges on the system?", "a": ["Use a known local privilege escalation vulnerability to gain admin access", "Perform a denial-of-service attack to crash the system", "Execute a Cross-Site Scripting attack on the system's login page", "Use a dictionary attack to brute-force the root password"], "c": [0], "e": null}, {"q": "While assessing a web server's behavior, a tester sends malformed HTTP GET requests using unusual methods like \"DELETE\" and \"OPTIONS\"\ncombined with long URI strings and observes varying status codes and response headers. The tester uses a tool that matches these responses\nagainst known patterns to deduce the server's software and version.\nWhich technique is the tester employing?", "a": ["Conducting session fixation using malformed cookie headers targeting the web server.", "Sending phishing emails to extract web server login credentials.", "Injecting scripts into headers for persistent XSS attacks on the server-side.", "Fingerprinting server identity using banner-grabbing techniques."], "c": [3], "e": null}, {"q": "A penetration tester is investigating a web server that allows for unrestricted file uploads. The server accepts files without proper validation or\nsanitization of file types.\nWhich technique should the tester use to exploit this vulnerability and gain potentially control of the server?", "a": ["Perform a SQL injection attack to extract sensitive database information", "Upload a shell script disguised as an image file to execute commands on the server", "Use a Cross-Site Scripting attack to steal user session cookies", "Conduct a brute-force attack on the server's FTP service to gain access"], "c": [1], "e": null}, {"q": "During a high-stakes engagement on a secure corporate network, a penetration tester discovers an opportunity to attack the domain controller. By\nabusing an API call from Microsoft's Encrypting File System Remote Protocol (MS-EFSRPC), the tester forces the domain controller to initiate\nNTLM authentication to a server controlled by the tester. The tester then captures the resulting NTLM hash and relays it to the Active Directory\nCertificate Services (AD CS), ultimately obtaining a certificate that confers administrative privileges over the network. This sophisticated method\nallows the tester to compromise the network without requiring direct access to the domain controller.\nWhich network-level hijacking techniqueis illustrated in this scenario?", "a": ["Stealing session tokens using browser-based exploits", "Employing a session donation method to transfer tokens", "Exploiting vulnerabilities in TLS compression via a CRIME attack", "Hijacking sessions using a PetitPotam relay attack"], "c": [3], "e": null}, {"q": "An AWS security operations team receives an alert regarding abnormal outbound traffic from an EC2 instance. The instance, which previously\nhandled backend microservices, begins transmitting encrypted data packets to an external domain. Upon deeper investigation, it is discovered\nthat the external domain resolves to a Dropbox account not associated with the organization. Network flow logs confirm a consistent pattern of\ndata transfers to this destination during off-peak hours. Further forensic analysis reveals that a malicious executable was silently installed on the\ninstance, which modifies the sync configuration of the Dropbox client to use the attacker's access token. This enables the compromised EC2\ninstance to automatically sync selected data folders with the attacker's Dropbox storage, bypassing traditional perimeter defenses.\nWhat type of attack has likely occurred?", "a": ["Cloud Snooper attack leveraging port masquerading", "Side-channel attack exploiting CPU cache", "Man-in-the-Cloud attack", "Cryptojacking using CoinHive scripts"], "c": [2], "e": null}, {"q": "Which of the following is the primary goal of ethical hacking?             Next Questions>", "a": ["To steal sensitive information from a company's network", "To spread malware to compromise multiple systems", "To disrupt services by launching denial-of-service attacks", "To identify and fix security vulnerabilities in a system     Browse atleast 50% to increase passing rate x"], "c": [3], "e": null}, {"q": "During an internal red team engagement, an operator discovers that TCP port 389 is open on a target system identified as a domain controller. To\nassess the extent of LDAP exposure, the operator runs the command ldapsearch -h -x -s base namingcontexts and receives a response revealing\nthe base distinguished name (DN): DC=internal,DC=corp. This naming context indicates the root of the LDAP directory structure used by the\norganization's Active Directory. With this discovery, the operator plans the next step to continue LDAP enumeration and expand visibility into users\nand objects in the domain.\nWhat is the most logical next action?", "a": ["Launch a brute-force attack against user passwords via SMB", "Use the base DN in a filter to enumerate directory objects", "Attempt an RDP login to the domain controller", "Conduct an ARP scan on the local subnet"], "c": [1], "e": null}, {"q": "During a security assessment of a metropolitan public transportation terminal, a penetration tester examines a network-connected loT\nsurveillance camera system that is used for 24/7 video monitoring of high-traffic areas. Upon analyzing the camera's network traffic, the tester\nobserves that it uses an outdated encryption protocol (SSLv2) to transmit video data to the control center. The tester uses a network packet\nsniffer to intercept this traffic and easily decrypts the stream, successfully reconstructing full video footage in real time without authentication.\nFurther analysis reveals that the camera does not enforce TLS or any modern encryption standard and lacks support for mutual authentication or\nsecure key exchange. Additionally, no integrity checks are performed, leaving the data open to manipulation.\nWhat loT vulnerability is most likely being exploited in this scenario?", "a": ["Jamming attack on RF communication", "Credential theft via web application", "Insecure data transfer and storage", "Replay attack on wireless signals"], "c": [2], "e": null}, {"q": "A security analyst investigates unusual east-west traffic on a corporate network. A previously unknown MAC address is found actively\ncommunicating from a port connected to a trusted desktop. On closer inspection, a small computing device (Raspberry Pi) was physically\ninserted between the switch and the legitimate machine. This setup allows the rogue device to piggyback onto the network using the identity and\nprivileges of the authenticated workstation without triggering any authentication processes or alarms.\nWhich evasion technique is being used to blend unauthorized traffic with legitimate access?", "a": ["NAC bypass using a pre-authenticated device for network bridging", "Spoofing ARP responses from a dynamic IP allocation pool", "VLAN double tagging to shift between network segments", "Exploiting a wireless rogue access point to tunnel through the firewall"], "c": [0], "e": null}, {"q": "A penetration tester discovers that a web application is vulnerable to Local File Inclusion (LFl) due to improper input validation in a URL\nparameter.\nWhich approach should the tester take to exploit this vulnerability?", "a": ["Conduct a brute-force attack on the admin login page to gain access", "Use directory traversal to access sensitive files on the server, such as/etc/passwd", "Inject SQL commands into the URL parameter to test for database vulnerabilities", "Perform a Cross-Site Scripting attack by injecting malicious scripts into the URL"], "c": [1], "e": null}, {"q": "A penetration tester is tasked with assessing the security of an Android mobile application that stores sensitive user data. The tester finds that\nthe application does not use proper encryption to secure data at rest.\nWhat is the most effective way to exploit this vulnerability?", "a": ["Access the local storage to retrieve sensitive data directly from the device", "Use SQL injection to retrieve sensitive data from the backend server", "Perform a brute-force attack on the application's login credentials", "Execute a Cross-Site Scripting attack to steal session cookies"], "c": [0], "e": null}, {"q": "A Certified Ethical Hacker (CEH) is auditing a company's web server that employs virtual hosting. The server hosts multiple domains and uses a\nweb proxy to maintain anonymity and prevent IP blocking. The CEH discovers that the server's document root directory, which stores critical HTML\nfiles, is named \"certroot\" and is stored in the directory /admin/web. The server root, which stores the server's configuration, error, executable, and\nlog files, is also identified. The CEH also notes that the server uses a virtual document tree for additional storage.\nGiven this scenario which of the following actions would most likely increase the security of the web server?", "a": ["Changing the server's IP address regularly", "Moving the document root directory to a different disk", "Implementing an open-source web server architecture such as LAMP", "Regularly updating and patching the server software"], "c": [3], "e": null}, {"q": "As an IT technician in a small software development company, you are tasked with providing security against different kinds of cyber threats. You\nlearn about various methods hackers might use to bypass your company's firewalls.\nWhich of the following is a common technique used by attackers to evade firewall detection?", "a": ["Implementing an open-source operating system to bypass proprietary software restrictions.", "Using encrypted communication channels to evade network monitoring tools.", "Changing the source IP address of packets to appear as if the traffic is coming from a trusted source.", "Utilizing social engineering techniques to trick employees into revealing sensitive information."], "c": [2], "e": null}, {"q": "A penetration tester is assessing a company's vulnerability to advanced social engineering attacks targeting its legal department. Using\ncomprehensive knowledge of recent mergers and internal legal proceedings, the tester crafts a highly credible pretext to deceive legal employees\ninto sharing confidential case documents.\nWhat is the most effective social engineering technique the tester should employ to obtain confidential documents without raising suspicion?", "a": ["Send a spear-phishing email referencing specific merger details and requesting document access", "Create a fake LinkedIn profile to connect with legal employees and request document sharing", "Conduct a mass phishing campaign with generic legal templates attached", "Visit the office in person posing as a new legal intern to request document access"], "c": [0], "e": null}];
let questions=[],idx=0,score=0,wrong=0,answered=false;
function shuffle(a){return a.sort(()=>Math.random()-.5)}
function restart(){
  questions=[...ALL];
  if(document.getElementById('shuffle').checked)shuffle(questions);
  idx=0;score=0;wrong=0;answered=false;
  document.getElementById('scoreboard').style.display='none';
  document.getElementById('qcard').style.display='block';
  render();
}
function render(){
  if(idx>=questions.length){showScore();return}
  const q=questions[idx];answered=false;
  document.getElementById('cur').textContent=idx+1;
  document.getElementById('tot').textContent=questions.length;
  document.getElementById('sc').textContent=score;
  document.getElementById('sw').textContent=wrong;
  document.getElementById('prog').style.width=(idx/questions.length*100)+'%';
  document.getElementById('qnum').textContent='Pergunta '+(idx+1)+' de '+questions.length+(q.c.length>1?' [Multi: '+q.c.length+' corretas]':'');
  document.getElementById('qtext').textContent=q.q;
  document.getElementById('feedback').className='feedback';
  document.getElementById('nextBtn').style.display='none';
  const div=document.getElementById('answers');div.innerHTML='';
  q.a.forEach((a,i)=>{
    const btn=document.createElement('button');
    btn.className='answer-btn';btn.dataset.i=i;
    btn.innerHTML='\x3cspan class="letter">'+String.fromCharCode(65+i)+'.\x3c/span>\x3cspan>'+a+'\x3c/span>';
    btn.onclick=()=>select(btn,q);
    div.appendChild(btn);
  });
}
function select(btn,q){
  if(answered)return;answered=true;
  const chosen=parseInt(btn.dataset.i);
  document.querySelectorAll('.answer-btn').forEach(b=>{
    b.disabled=true;
    const i=parseInt(b.dataset.i);
    if(q.c.includes(i))b.className='answer-btn reveal';
    else if(i===chosen)b.className='answer-btn wrong';
  });
  const ok=q.c.includes(chosen);
  const fb=document.getElementById('feedback');
  if(ok){score++;fb.className='feedback show ok';fb.textContent='Correto!'+(q.e?'\u2014 '+q.e:'');}
  else{wrong++;fb.className='feedback show bad';fb.textContent='Errado. '+(q.e||'A correta esta a verde.');}
  document.getElementById('sc').textContent=score;
  document.getElementById('sw').textContent=wrong;
  document.getElementById('nextBtn').style.display='inline-block';
}
function next(){idx++;render();}
function skip(){if(!answered){wrong++;document.getElementById('sw').textContent=wrong;}idx++;render();}
function showScore(){
  document.getElementById('qcard').style.display='none';
  const sb=document.getElementById('scoreboard');sb.style.display='block';
  const pct=Math.round(score/questions.length*100);
  document.getElementById('finalScore').textContent=score+'/'+questions.length+' ('+pct+'%)';
  document.getElementById('finalMsg').textContent=pct>=70?'Passaste! Bom trabalho.':'Continua a estudar!';
}
restart();
</script>
