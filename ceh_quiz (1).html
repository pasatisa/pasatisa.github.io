the attacker's 100 connections, likely maintaining operation", "m=95, b=10: Here, the server can handle 95 connections per second, but it falls short against the attacker's 100 connections, albeit the", "m=110, b=20: Despite the attacker sending 100 connections, the server can handle 110 connections per second, therefore likely staying"], "c": [0], "e": null}, {"q": "A large organization has recently performed a vulnerability assessment using Nessus Professional, and the security team is now preparing the\nfinal report. They have identified a high-risk vulnerability, named XYZ, which could potentially allow unauthorized access to the network. In\npreparing the report, which of the following elements would NOT be typically included in the detailed documentation for this specific vulnerability?", "a": ["Proof of concept of the vulnerability, if possible, to demonstrate its potential impact on the system.", "The list of all affected systems within the organization that are susceptible to the identified vulnerability.", "The CVE ID of the vulnerability and its mapping to the vulnerability's name, XYZ.", "The total number of high, medium, and low-risk vulnerabilities detected throughout the network."], "c": [3], "e": null}, {"q": "Recently, the employees of a company have been receiving emails that seem to be from their colleagues, but with suspicious attachments. When\nopened, these attachments appear to install malware on their systems. The IT department suspects that this is a targeted malware attack. Which\nofthe following measures would be the most effective in preventing such attacks?", "a": ["Regularly scan systems for any new files and examine them", "Avoiding the use of outdated web browsers and email software", "Disabling Autorun functionality on all drives", "Applying the latest patches and updating software programs"], "c": [3], "e": null}, {"q": "A network security analyst, while conducting penetration testing, is aiming to identify a service account password using the Kerberos\nauthentication protocol. They have a valid user authentication ticket (TGT) and decided to carry out a Kerberoasting attack. In the scenario\ndescribed, which of the following steps should the analyst take next?", "a": ["Perform a PRobability INfinite Chained Elements attack", "Request a service ticket for the service principal name of the target service account", "Extract plaintext passwords, hashes, PIN codes, and Kerberos tickets using a tool like Mimikatz", "Carry out a passive wire sniffing operation using Internet packet sniffers"], "c": [1], "e": null}, {"q": "As a cybersecurity analyst at loT Defend, you are working with a large utility company that uses Industrial Control Systems (ICS) in its operational\ntechnology (OT) environment. The company has recently integrated loT devices into this environment to enable remote monitoring and control.\nThey want to ensure these devices do not become a weak link in their security posture. To identify potential vulnerabilities in the loT devices,\nwhich of the following actions should you recommend as the first step?", "a": ["Conduct a vulnerability assessment specifically for the loT devices.", "Use stronger encryption algorithms for data transmission between loT devices.", "Install the latest antivirus software on each loT device.", "Implement network segmentation to isolate loT devices from the rest of the network."], "c": [0], "e": null}, {"q": "A penetration tester is performing an enumeration on a client's network. The tester has acquired permission to perform enumeration activities.\nThey have identified a remote inter-process communication (IPC) share and are trying to collect more information about it. The tester decides to\nuse a common enumeration technique to collect the desired data. Which of the following techniques would be most appropriate for this scenario?", "a": ["Probe the IPC share by attempting to brute force admin credentials", "Brute force Active Directory", "Conduct a DNS zone transfer", "Extract usernames using email IDs"], "c": [0], "e": null}, {"q": "As a cybersecurity analyst at TechSafe Inc., you are working on a project to improve the security of a smart home system. This loT-enabled system\ncontrols various aspects of the home, from heating and lighting to security cameras and door locks. Your client wants to ensure that even if one\ndevice is compromised, the rest of the system remains secure. Which of the following strategies would be most effective for this purpose?", "a": ["Recommend using a strong password for the smart home system's main control panel.", "Advise using a dedicated network for the smart home system, separate from the home's main Wi-Fi network.", "Propose frequent system resets to clear any potential malware.", "Suggest implementing two-factor authentication for the smart home system's mobile app."], "c": [1], "e": null}, {"q": "During your summer internship at a tech company, you have been asked to review the security settings of their web server. While inspecting, you\nnotice the server reveals detailed error messages to users, including database query errors and internal server errors. As a cybersecurity beginner,\nwhat is your understanding of this setting, and how would you advise the company?", "a": ["Implement stronger encryption to secure the error messages.", "Suppress detailed error messages, as they can expose sensitive information.", "Increase the frequency of automated server backups.", "Retain the setting as it aids in troubleshooting user issues."], "c": [1], "e": null}, {"q": "You are the chief security officer at AlphaTech, a tech company that specializes in data storage solutions. Your company is developing a new\ncloud storage platform where users can store their personal files. To ensure data security, the development team is proposing to use symmetric\nencryption for data at rest. However, they are unsure of how to securely manage and distribute the symmetric keys to users. Which of the\nfollowing strategies would you recommend to them?", "a": ["Use hash functions to distribute the keys.", "Use digital signatures to encrypt the symmetric keys.", "Use HTTPS protocol for secure key transfer.", "Implement the Diffie-Hellman protocol for secure key exchange."], "c": [3], "e": null}, {"q": "You work as a cloud security specialist at SkyNet Solutions. One of your clients is a healthcare organization that plans to migrate its electronic\nhealth record (EHR) system to the cloud. This system contains highly sensitive personal and medical data. As part of your job, you need to ensure\nthe security and privacy of this data while it is being transferred and stored in the cloud. You recommend that data should be encrypted during\ntransit and at rest. However, you also need to ensure that even if a cloud service provider(CSP) has access to encrypted data, they should not be\nable to decrypt it. Which of the following would be the most suitable strategy to meet this requirement?", "a": ["Use client-side encryption and manage encryption keys independently of the CSP.", "Utilize the CSP's built-in data encryption services.", "Rely on network-level encryption protocols for data transfer.", "Use SSL/TLS for data transfer and allow the CSP to manage encryption keys."], "c": [0], "e": null}, {"q": "A certified ethical hacker is conducting a Whois footprinting activity on a specific domain. The individual is leveraging various tools such as Batch\nIP Converter and Whois Analyzer Pro to retrieve vital details but is unable to gather complete Whois information from the registrar for a particular\nset of data. As the hacker, what might be the probable data model being utilized by the domain's registrar for storing and looking up Whois\ninformation?", "a": ["Thick Whois model working correctly", "Thick Whois model with a malfunctioning server", "Thin Whois model working correctly", "Thin Whois model with a malfunctioning server"], "c": [2], "e": null}, {"q": "You are a cybersecurity professional managing cryptographic systems for a global corporation. The company uses a mix of Elliptic Curve\nCryptography (ECC) for key exchange and symmetric encryption algorithms for data encryption. The time complexity of ECC key pair generation is\n0(n`3), where 'n' is the size of the key. An advanced threat actor group has a quantum computer that can potentially break ECC with a time\ncomplexity of O((log n)*2). Given that the ECC key size is 'n=512' and varying symmetric encryption algorithms and key sizes, which scenario\nwould provide the best balance of security and performance?", "a": ["Data encryption with AES-256: Provides high security with better performance than 3DES, but not as fast as other AES key sizes.", "Data encryption with AES-128: Provides moderate security and fast encryption, offering a balance between the two.", "Data encryption with Blowfish using a 448-bit key: Offers high security but potential compatibility issues due to Blowfish's less widespread", "Data encryption with 3DES using a 168-bit key: Offers high security but slower performance due to 3DES's inherent inefficiencies."], "c": [0], "e": null}, {"q": "You are a security analyst for CloudSec, a company providing cloud security solutions. One of your clients, a financial institution, wants to shift its\noperations to a public cloud while maintaining a high level of security control. They want to ensure that they can monitor all their cloud resources\ncontinuously and receive real-time alerts about potential security threats. They also want to enforce their security policies consistently across all\ncloud workloads. Which of the following solutions would best meet these requirements?", "a": ["Implement a Virtual Private Network for secure data transmission.", "Deploy a Cloud Access Security Broker.", "Use multi-factor authentication for all cloud user accounts.", "Use client-side encryption for all stored data."], "c": [1], "e": null}, {"q": "Consider a hypothetical situation where an attacker, known for his proficiency in SQL Injection attacks, is targeting your web server. This adversary\nmeticulously crafts 'q' malicious SQL queries, each inducing a delay of `d' seconds in the server response. This delay in response is an indicator of\na potential attack. If the total delay, represented by the product 'q*d', crosses a defined threshold 'T', an alert is activated in your security system.\nFurthermore, it is observed that the attacker prefers prime numbers for `q', and `d' follows a pattern in the Fibonacci sequence. Now, consider\n'd=13' seconds (a Fibonacci number) and various values of `q' (a prime number) and 'T'. Which among the following scenarios will most likely\ntrigger an alert?", "a": ["q=19, T=260: Despite the attacker's increased effort, the total delay does not exceed the threshold, thus no alert is", "q=17, T=220: Even though the attacker increases `q', the total delay just surpasses the threshold, possibly activating", "q=11, T=150: Here, the total delay induced by the attacker does not surpass the threshold, so the security system", "q=13, T=180: In this case, the total delay caused by the attacker breaches the threshold, likely leading to the triggering"], "c": [1], "e": null}, {"q": "You are an ethical hacker contracted to conduct a security audit for a company. During the audit, you discover that the company's wireless\nnetwork is using WEP encryption. You understand the vulnerabilities associated with WEP and plan to recommend a more secure encryption\nmethod. Which of the following would you recommend as a suitable replacement to enhance the security of the company's wireless network?", "a": ["MAC address filtering", "Open System authentication", "WPA2-PSK with AES encryption", "SSID broadcast disabling"], "c": [2], "e": null}, {"q": "You are the lead cybersecurity analyst at a multinational corporation that uses a hybrid encryption system to secure inter-departmental\ncommunications. The system uses RSA encryption for key exchange and AES for data encryption, taking advantage of the strengths of both\nasymmetric and symmetric encryption. Each RSA key pair has a size of 'n' bits, with larger keys providing more security at the cost of slower\nperformance. The time complexity of generating an RSA key pair is O(n*2), and AES encryption has a time complexity of O(n). An attacker has\ndeveloped a quantum algorithm with time complexity O((log n)*2) to crack RSA encryption. Given 'n=4000' and variable `AES key size', which\nscenario is likely to provide the best balance of security and performance?", "a": ["AES key size=128 bits: This configuration provides less security than option A, but RSA key generation and AES encryption will be faster.", "AES key size=256 bits: This configuration provides a high level of security, but RSA key generation may be slow.", "AES key size=192 bits: This configuration is a balance between options A and B, providing moderate security and performance.", "AES key size=512 bits: This configuration provides the highest level of security but at a significant performance cost due to the large AES"], "c": [2], "e": null}, {"q": "An experienced cyber attacker has created a fake LinkedIn profile, successfully impersonating a high-ranking official from a well-established\ncompany, to execute a social engineering attack. The attacker then connected with other employees within the organization, receiving invitations\nto exclusive corporate events and gaining access to proprietary project details shared within the network. What advanced social engineering\ntechnique has the attacker primarily used to exploit the system and what is the most likely immediate threat to the organization?", "a": ["Spear Phishing and Spam", "Whaling and Targeted Attacks", "Baiting and Involuntary Data Leakage", "Pretexting and Network Vulnerability"], "c": [1], "e": null}, {"q": "As a cybersecurity analyst for a large corporation, you are auditing the company's mobile device management (MDM) policy. One of your areas of\nconcern is data leakage from company-provided smartphones. You are worried about employees unintentionally installing malicious apps that\ncould access sensitive corporate data on their devices. Which of the following would be an effective measure to prevent such data leakage?", "a": ["Enforce a policy that only allows app installations from approved corporate app stores.", "Mandate the use of VPNs when accessing corporate data.", "Regularly change Wi-Fi passwords used by the devices.", "Require biometric authentication for unlocking devices."], "c": [0], "e": null}, {"q": "A certified ethical hacker is carrying out an email footprinting exercise on a targeted organization using eMailTrackerPro. They want to map out\ndetailed information about the recipient's activities after receiving the email. Which among the following pieces of information would NOT be\ndirectly obtained from eMailTrackerPro during this exercise?", "a": ["The time recipient spent reading the email", "Geolocation of the recipient", "The email accounts related to the domain of the organization", "Tvpe of device used to open the email"], "c": [2], "e": null}, {"q": "You are a cybersecurity trainee tasked with securing a small home network. The homeowner is concerned about potential \"Wi-Fi eavesdropping,'\nwhere unauthorized individuals could intercept the wireless communications. What would be the most effective first step to mitigate this risk,\nconsidering the simplicity and the residential nature of the network?", "a": ["Reduce the signal strength of the wireless router", "Enable MAC address filtering", "Enable encryption on the wireless network", "Disable the network's SSID broadcast"], "c": [2], "e": null}, {"q": "A well-resourced attacker intends to launch a highly disruptive DDoS attack against a major online retailer. The attacker aims to exhaust all the\nnetwork resources while keeping their identity concealed. Their method should be resistant to simple defensive measures such as IP-based\nblocking. Based on these objectives, which of the following attack strategies would be most effective?", "a": ["The attacker should leverage a botnet to launch a Pulse Wave attack, sending high-volume traffic pulses at regular intervals", "The attacker should execute a simple ICMP flood attack from a single IP, exploiting the retailer's ICMP processing", "The attacker should instigate a protocol-based SYN flood attack, consuming connection state tables on the retailer's servers", "The attacker should initiate a volumetric flood attack using a single compromised machine to overwhelm the retailer's network bandwidth"], "c": [0], "e": null}, {"q": "A large organization is investigating a possible identity theft case where an attacker has created a new identity by combining multiple pieces of\ninformation from different victims to open a new bank account. The attacker also managed to receive government benefits using a fraudulent\nidentity. Given the circumstances, which type of identity theft is the organization dealing with?", "a": ["Identity Cloning and Concealment", "Synthetic Identity Theft", "Child Identity Theft", "Social Identity Theft"], "c": [1], "e": null}, {"q": "A company recently experienced a debilitating social engineering attack that led to substantial identity theft. An inquiry found that the employee\ninadvertently provided critical information during an innocuous phone conversation. Considering the specific guidelines issued by the company to\nthwart social engineering attacks, which countermeasure would have been the most successful in averting the incident?", "a": ["Adopt a robust software policy that restricts the installation of unauthorized applications.", "Conduct comprehensive training sessions for employees on various social engineering methodologies and the risks associated with", "Implement a well-documented change management process for modifications related to hardware or software.", "Reinforce physical security measures to limit access to sensitive zones within the company premises, thereby warding off unauthorized"], "c": [1], "e": null}, {"q": "An IT company has just implemented new security controls to their network and system setup. As a Certified Ethical Hacker, your responsibility is\nto assess the possible vulnerabilities in the new setup. You are given the information that the network and system are adequately patched with the\nlatest updates, and all employees have gone through recent cybersecurity awareness training. Considering the potential vulnerability sources,\nwhat is the best initial approach to vulnerability assessment?", "a": ["Conducting social engineering tests to check if employees can be tricked into revealing sensitive information", "Investigating if any ex-employees still have access to the company's system and data", "Checking for hardware and software misconfigurations to identify any possible looph", "Evaluating the network for inherent technology weaknesses prone to specific types of attacks"], "c": [2], "e": null}, {"q": "An ethical hacker has been tasked with assessing the security of a major corporation's network. She suspects the network uses default SNMP\ncommunity strings. To exploit this, she plans to extract valuable network information using SNMP enumeration. Which tool could best help her to\nget the information without directly modifying any parameters within the SNMP agent's management information base (MIB)?", "a": ["OpUtils, are mainly designed for device management and not SNMP enumeration", "snmp-check to gather a wide array of information about the target", "Nmap, with a script to retrieve all running SNMP processes and associated ports", "SnmpWalk, with a command to change an OID to a different value"], "c": [1], "e": null}, {"q": "During a recent vulnerability assessment of a major corporation's IT systems, the security team identified several potential risks. They want to use\na vulnerability scoring system to quantify and prioritize these vulnerabilities. They decide to use the Common Vulnerability Scoring System\n(CVSS). Given the characteristics of the identified vulnerabilities, which of the following statements is the most accurate regarding the metric\ntypes used by CVSS to measure these vulnerabilities?", "a": ["Temporal metric represents the inherent qualities of a vulnerability.", "Temporal metric involves measuring vulnerabilities based on a specific environment or implementation.", "Base metric represents the inherent qualities of a vulnerability.", "Environmental metric involves the features that change during the lifetime of the vulnerability."], "c": [2], "e": null}, {"q": "You are a cybersecurity consultant at SecureloT Inc. A manufacturing company has contracted you to strengthen the security of their Industrial\nloT (IloT) devices used in their operational technology (OT)environment. They are concerned about potential attacks that could disrupt their\nproduction lines and compromise safety. They have an advanced firewall system in place, but you know this alone is not enough. Which of the\nfollowing measures should you suggest to provide comprehensive protection for their lloT devices?", "a": ["Rely on the existing firewall and install antivirus software on each IloT device.", "Implement network segmentation to separate IloT devices from the rest of the network.", "Increase the frequency of changing passwords on all IloT devices.", "Use the same encryption standards for lloT devices as for IT devices."], "c": [1], "e": null}, {"q": "In an advanced digital security scenario, a multinational enterprise is being targeted with a complex series of assaults aimed to disrupt\noperations, manipulate data integrity, and cause serious financial damage. As the Lead Cybersecurity Analyst with CEH and CISSP certifications,\nyour responsibility is to correctly identify the specific type of attack based on the following indicators:\nThe attacks are exploiting a vulnerability in the target system's hardware, inducing misprediction of future instructions in a program's control flow.\nThe attackers are strategically inducing the victim process to speculatively execute instructions sequences that would not have been executed in\nthe absence of the misprediction, leading to subtle side effects. These side effects, which are observable from the shared state, are then utilized\nto infer the values of in-flight data.\nWhat type of attack best describes this scenario?", "a": ["Watering Hole Attack", "Privilege Escalation Attack", "Rowhammer Attack", "Side-Channel Attack"], "c": [3], "e": null}, {"q": "In the process of implementing a network vulnerability assessment strategy for a tech company, the security analyst is confronted with the\nfollowing scenarios:\n1) A legacy application is discovered on the network, which no longer receives updates from the vendor.\n2) Several systems in the network are found running outdated versions of web browsers prone to distributed attacks.\n3) The network firewall has been configured using default settings and passwords.\n4) Certain TCP/IP protocols used in the organization are inherently insecure.\nThe security analyst decides to use vulnerability scanning software. Which of the following limitations of vulnerability assessment should the\nanalyst be most cautious about in this context?", "a": ["Vulnerability scanning software is not immune to software engineering flaws that might lead to serious vulnerabilities being missed", "Vulnerability scanning software cannot define the impact of an identified vulnerability on different business operations", "Vulnerability scanning software is limited in its ability to perform live tests on web applications to detect errors or unexpected behavior", "Vulnerability scanning software is limited in its ability to detect vulnerabilities at a given point in time"], "c": [1], "e": null}, {"q": "In your cybersecurity class, you are learning about common security risks associated with web servers. One topic that comes up is the risk posed\nby using default server settings. Why is using default settings on a web server considered a security risk, and what would be the best initial step\nto mitigate this risk?", "a": ["Default settings cause server malfunctions; simplify the settings", "Default settings allow unlimited login attempts; setup account lockout", "Default settings reveal server software type; change these settings", "Default settings enable auto-updates; disable and manually patch"], "c": [2], "e": null}, {"q": "As a junior security analyst for a small business, you are tasked with setting up the company's first wireless network. The company wants to\nensure the network is secure from potential attacks. Given that the company's workforce is relatively small and the need for simplicity in\nmanaging network security, which of the following measures would you consider a priority to protect the network?", "a": ["Hide the network SSID", "Implement a MAC address whitelist", "Establish a regular schedule for changing the network password", "Enable WPA2 or WPA3 encryption on the wireless router"], "c": [3], "e": null}, {"q": "During a reconnaissance mission, an ethical hacker uses Maltego, a popular footprinting tool, to collect information about a target organization.\nThe information includes the target's Internet infrastructure details (domains, DNS names, Netblocks, IP address information). The hacker decides\nto use social engineering techniques to gain further information. Which of the following would be the least likely method of social engineering to\nyield beneficial information based on the data collected?", "a": ["Impersonating an ISP technical support agent to trick the target into providing further network details", "Eavesdropping on internal corporate conversations to understand key topics", "Dumpster diving in the target company's trash bins for valuable printouts", "Shoulder surfing to observe sensitive credentials input on the target's computers"], "c": [3], "e": null}, {"q": "An organization has been experiencing intrusion attempts despite deploying an Intrusion Detection System (IDS) and Firewalls. As a Certified\nEthical Hacker, you are asked to reinforce the intrusion detection process and recommend a better rule-based approach. The IDS uses Snort rules\nand the new recommended tool should be able to complement it. You suggest using YARA rules with an additional tool for rule generation. Which\nof the following tools would be the best choice for this purpose and why?", "a": ["yarGen - Because it generates YARA rules from strings identified in malware files while removing strings that also appear in goodware files", "Koodous - Because it combines social networking with antivirus signatures and YARA rules to detect malware", "YaraRET - Because it helps in reverse engineering Trojans to generate YARA rules", "AutoYara - Because it automates the generation of YARA rules from a set of malicious and benign files"], "c": [0], "e": null}, {"q": "During an attempt to perform an SQL injection attack, a certified ethical hacker is focusing on the identification of database engine type by\ngenerating an ODBC error. The ethical hacker, after injecting various payloads, finds that the web application returns a standard, generic error\nmessage that does not reveal any detailed database information. Which of the following techniques would the hacker consider next to obtain\nuseful information about the underlying database?", "a": ["Utilize a blind injection technique that uses time delays or error signatures to extract information", "Attempt to compromise the system through OS-level command shell execution", "Try to insert a string value where a number is expected in the input field", "Use the UNION operator to combine the result sets of two or more SELECT statements"], "c": [0], "e": null}, {"q": "During an ethical hacking engagement, you have been assigned to evaluate the security of a large organization's network. While examining the\nnetwork traffic, you notice numerous incoming requests on various ports from different locations that show a pattern of an orchestrated attack.\nBased on your analysis, you deduce that the requests are likely to be automated scripts being run by unskilled hackers. What type of hacker\nclassification does this scenario most likely represent?", "a": ["Script Kiddies trying to compromise the system using pre-made scripts.", "Gray Hats testing system vulnerabilities to help vendors improve security.", "White Hats conducting penetration testing to identify security weaknesses.", "Black Hats trying to exploit system vulnerabilities for malicious intent."], "c": [0], "e": null}, {"q": "Your company suspects a potential security breach and has hired you as a Certified Ethical Hacker to investigate. You discover evidence of\nfootprinting through search engines and advanced Google hacking techniques. The attacker utilized Google search operators to extract sensitive\ninformation. You further notice queries that indicate the use of the Google Hacking Database (CHDB) with an emphasis on VPN footprinting.\nWhich of the following Google advanced search operators would be the LEAST useful in providing the attacker with sensitive VPN-related\ninformation?", "a": ["link: This operator searches websites or pages that contain links to the specified website or page", "intitle: This operator restricts results to only the pages containing the specified term in the title", "inurl: This operator restricts the results to only the pages containing the specified word in the URL", "location: This operator finds information for a specific location"], "c": [3], "e": null}, {"q": "In a recent cyber-attack against a large corporation, an unknown adversary compromised the network and began escalating privileges and lateral\nmovement. The security team identified that the adversary used a sophisticated set of techniques, specifically targeting zero-day vulnerabilities.\nAs a Certified Ethical Hacker (CEH) hired to understand this attack and propose preventive measures, which of the following actions will be most\ncrucial for your initial analysis?", "a": ["Investigating the data exfiltration methods used by the adversary.", "Checking the persistence mechanisms used by the adversary in compromised systems.", "Analyzing the initial exploitation methods, the adversary used.", "Identifying the specific tools used by the adversary for privilege escalation."], "c": [2], "e": null}, {"q": "Jason, a certified ethical hacker, is hired by a major e-commerce company to evaluate their network's security. As part of his reconnaissance,\nJason is trying to gain as much information as possible about the company's public-facing servers without arousing suspicion. His goal is to find\npotential points of entry and map out the network infrastructure for further examination. Which technique should Jason employ to gather this\ninformation without alerting the company's intrusion detection systems (IDS)?", "a": ["Jason should directly connect to each server and attempt to exploit known vulnerabilities.", "Jason should use a DNS zone transfer to gather information about the company's servers.", "Jason should perform a ping sweep to identify all the live hosts in the company's IP range.", "Jason should use passive reconnaissance techniques such as WHOIS lookups, NS lookups, and web research."], "c": [3], "e": null}, {"q": "As the lead security engineer for a retail corporation, you are assessing the security of the wireless networks in the company's stores. One of your\nmain concerns is the potential for \"Wardriving\" attacks, where attackers drive around with a Wi-Fi-enabled device to discover vulnerable wireless\nnetworks. Given the nature of the retail stores, you need to ensure that any security measures you implement do not interfere with customer\nexperience, such as their ability to access in-store Wi-Fi. Taking into consideration these factors, which of the following would be the most\nsuitable measure to mitigate the risk of Wardriving attacks?", "a": ["Limit the range of the store's wireless signals", "Implement MAC address filtering", "Disable SSID broadcasting", "Implement WPA3 encryption for the store's Wi-Fi network"], "c": [3], "e": null}, {"q": "A penetration tester was assigned to scan a large network range to find live hosts. The network is known for using strict TCP filtering rules on its\nfirewall, which may obstruct common host discovery techniques. The tester needs a method that can bypass these firewall restrictions and\naccurately identify live systems. What host discovery technique should the tester use?", "a": ["UDP Ping Scan", "ICMP Timestamp Ping Scan", "ICMP ECHO Ping Scan", "TCP SYN Ping Scan"], "c": [3], "e": null}, {"q": "As part of a college project, you have set up a web server for hosting your team's application. Given your interest in cybersecurity, you have taken\nthe lead in securing the server. You are aware that hackers often attempt to exploit server misconfigurations. Which of the following actions would\nbest protect your web server from potential misconfiguration-based attacks?", "a": ["Performing regular server configuration audits", "Implementing a firewall to filter traffic", "Regularly backing up server data", "Enabling multi-factor authentication for users"], "c": [0], "e": null}, {"q": "You are the chief cybersecurity officer at CloudSecure Inc., and your team is responsible for securing a cloud based application that handles\nsensitive customer data. To ensure that the data is protected from breaches, you have decided to implement encryption for both data-at-rest and\ndata-in-transit. The development team suggests using SSL/TLS for securing data in transit. However, you want to also implement a mechanism to\ndetect if the data was tampered with during transmission. Which of the following should you propose?", "a": ["Switch to using SSH for data transmission.", "Encrypt data using the AES algorithm before transmission.", "Implement IPsec in addition to SSL/TLS.", "Use the cloud service provider's built-in encryption services."], "c": [2], "e": null}, {"q": "Sarah, a system administrator, was alerted of potential malicious activity on the network of her company. She discovered a malicious program\nspread through the instant messenger application used by her team. The attacker had obtained access to one of her teammate's messenger\naccounts and started sending files across the contact list. Which best describes the attack scenario and what measure could have prevented it?", "a": ["Insecure Patch Management; updating application software regularly", "Portable Hardware Media/Removable Devices; disabling Autorun functionality", "Instant Messenger Applications; verifying the sender's identity before opening any files", "Rogue/Decoy Applications; ensuring software is labeled as TRUSTED"], "c": [2], "e": null}, {"q": "A multinational organization has recently faced a severe information security breach. Investigations reveal that the attacker had a high degree of\nunderstanding of the organization's internal processes and systems. This knowledge was utilized to bypass security controls and corrupt valuable\nresources. Considering this event, the security team is contemplating the type of attack that occurred and the steps they could have taken to\nprevent it. Choose the most plausible type of attack and a countermeasure that the organization could have employed:", "a": ["Insider attacks and the organization should have implemented robust access control and monitoring.", "Distribution attack and the organization could have ensured software and hardware integrity checks.", "Active attack and the organization could have used network traffic analysis.", "Passive attack and the organization should have used encryption techniques."], "c": [0], "e": null}, {"q": "As a security analyst for SkySecure Inc., you are working with a client that uses a multi-cloud strategy, utilizing services from several cloud\nproviders. The client wants to implement a system that will provide unified security management across all their cloud platforms. They need a\nsolution that allows them to consistently enforce security policies, identify and respond to threats, and maintain visibility of all their cloud\nresources. Which of the following should you recommend as the best solution?", "a": ["Implement separate security management tools for each cloud platform.", "Use a Cloud Access Security Broker.", "Rely on the built-in security features of each cloud platform.", "Use a hardware-based firewall to secure all cloud resources."], "c": [1], "e": null}, {"q": "As a security consultant, you are advising a startup that is developing an loT device for home security. The device communicates with a mobile\napp, allowing homeowners to monitor their homes in real time. The CEO is concerned about potential Man-in-the-Middle (MitM) attacks that could\nallow an attacker to intercept and manipulate the device's communication. Which of the following solutions would best protect against such\nattacks?", "a": ["Use CAPTCHA on the mobile app's login screen.", "Frequently change the loT device's IP address.", "Limit the range of the loT device's wireless signals.", "Implement SSL/TLS encryption for data transmission between the loT device and the mobile app."], "c": [3], "e": null}, {"q": "A Certified Ethical Hacker (CEH) is analyzing a target network. To do this, he decides to utilize an IDLE/IPID header scan using Nmap. The network\nanalysis reveals that the IPID number increases by 2 after following the steps of an IDLE scan. Based on this information, what can the CEH\nconclude about the target network?", "a": ["The target network has no firewall present", "The ports on the target network are closed", "The target network hasa stateful firewall present", "The ports on the target network are open"], "c": [3], "e": null}, {"q": "You have been given the responsibility to ensure the security of your school's web server. As a step towards this, you plan to restrict unnecessary\nservices running on the server. In the context of web server security, why is this step considered important?", "a": ["Unnecessary services slow down the server; optimize server speed.", "Unnecessary services reveal server software; hide software details.", "Unnecessary services could contain vulnerabilities; minimize the attack surface.", "Unnecessary services eat up server memory; save memory resources."], "c": [2], "e": null}, {"q": "An ethical hacker is hired to evaluate the defenses of an organization's database system which is known to employ a signature-based IDS. The\nhacker knows that some SQL Injection evasion techniques may allow him to bypass the system's signatures. During the operation, he successfully\nretrieved a list of usernames from the database without triggering an alarm by employing an advanced evasion technique. Which of the following\ncould he have used?", "a": ["Manipulating white spaces in SQL queries to bypass signature detection", "Implementing sophisticated matches such as \"OR john' = `john\" in place of classical matches like \"OR 1=1\"", "Using the URL encoding method to replace characters with their ASCII codes in hexadecimal form", "Utilizing the char encoding function to convert hexadecimal and decimal values into characters that pass-through SQL engine parsing"], "c": [3], "e": null}, {"q": "As the Chief Information Security Officer (CISO) at a large university, you are responsible for the security of a campus-wide Wi-Fi network that\nserves thousands of students, faculty, and staff. Recently, there has been a rise in reports of unauthorized network access, and you suspect that\nsome users are sharing their login credentials. You are considering deploying an additional layer of security that could effectively mitigate this\nissue. What would be the most suitable measure to implement in this context?", "a": ["Implement 802.1X authentication", "Enforce a policy of regularly changing Wi-Fi passwords", "Implement network segmentation", "Deploy a VPN for the entire campus"], "c": [0], "e": null}, {"q": "An ethical hacker is scanning a target network. They initiate a TCP connection by sending an SYN packet to a target machine and receiving a\nSYN/ACK packet in response. But instead of completing the three-way handshake with an ACK packet, they send an RST packet. What kind of\nscan is the ethical hacker likely performing and what is their goal?", "a": ["They are performing a vulnerability scan to identify any weaknesses in the target system.", "They are performing a network scan to identify live hosts and their IP addresses.", "They are performing a TCP connect scan to identify open ports on the target machine.", "They are performing an SYN scan to stealthily identify open ports without fully establishing a connection."], "c": [3], "e": null}, {"q": "In the process of setting up a lab for malware analysis, a cybersecurity analyst is tasked to establish a secure environment using a sheep dip\ncomputer. The analyst must prepare the testbed while adhering to best practices. Which of the following steps should the analyst avoid when\nconfiguring the environment?", "a": ["Connecting the system to the production network during the malware analysis", "Simulating Internet services using tools such as INetSim", "Installing multiple guest operating systems on the virtual machine", "Installing malware analysis tools on the guest OS"], "c": [0], "e": null}, {"q": "A large e-commerce organization is planning to implement a vulnerability assessment solution to enhance its security posture. They require a\nsolution that imitates the outside view of attackers, performs well-organized inference-based testing, scans automatically against continuously\nupdated databases, and supports multiple networks. Given these requirements, which type of vulnerability assessment solution would be most\nappropriate?", "a": ["Service-based solution offered by an auditing firm", "Product-based solution installed on a private network", "Tree-based assessment approach", "Inference-based assessment solution"], "c": [0], "e": null}, {"q": "During a penetration testing assignment, a Certified Ethical Hacker (CEH) used a set of scanning tools to create a profile of the target\norganization. The CEH wanted to scan for live hosts, open ports, and services on a target network. He used Nmap for network inventory and\nHping3 for network security auditing. However, he wanted to spoof IP addresses for anonymity during probing. Which command should the CEH\nuse to perform this task?", "a": ["Hping3 -2 10.0.0.25-p 80", "Hping3 -1 10.0.0.25 -ICMP", "Nmap -sS -Pn -n -vw --packet-trace -p- --script discovery -T4", "Hping3 -S 192.168.1.1 -a 192.168.1.254 -p 22 --flood"], "c": [3], "e": null}, {"q": "An ethical hacker is hired to conduct a comprehensive network scan of a large organization that strongly suspects potential intrusions into their\ninternal systems. The hacker decides to employ a combination of scanning tools to obtain a detailed understanding of the network. Which\nsequence of actions would provide the most comprehensive information about the network's status?", "a": ["Use Hping3 for an ICMP ping scan on the entire subnet, then use Nmap for a SYN scan on identified active hosts, and finally use Metasploit", "Initiate with Nmap for a ping sweep, then use Metasploit to scan for open ports and services, and finally use Hping3 to perform remote OS", "Start with Hping3 for a UDP scan on random ports, then use Nmap for a version detection scan, and finally use Metasploit to exploit", "Begin with NetScanTools Pro for a general network scan, then use Nmap for OS detection and version detection, and finally perform an SYN"], "c": [0], "e": null}, {"q": "While working as an intern for a small business, you have been tasked with managing the company's web server. The server is being bombarded\nwith requests, and the company's website is intermittently going offline. You suspect that this could be a Distributed Denial of Service (DDoS)\nattack. As an ethical hacker, which of the following steps would be your first course of action to mitigate the issue?", "a": ["Install a newer version of the server software", "Implement IP address whitelisting", "Increase the server's bandwidth", "Contact your Internet Service Provider for assistance"], "c": [3], "e": null}, {"q": "As a cybersecurity consultant, you are working with a client who wants to migrate their data to a Software as a Service (SaaS) cloud environment.\nThey are particularly concerned about maintaining the privacy of their sensitive data, even from the cloud service provider. Which ofthe following\nstrategies would best ensure the privacy of their data in the SaaS environment?", "a": ["Encrypt the data client-side before uploading to the SaaS environment and manage encryption keys independently.", "Implement a Virtual Private Network for accessing the SaaS applications.", "Use multi-factor authentication for all user accounts accessing the SaaS applications", "Rely on the cloud service provider's built-in security features."], "c": [0], "e": null}, {"q": "An ethical hacker is performing a network scan to evaluate the security of a company's IT infrastructure. During the scan, he discovers an active\nhost with multiple open ports running various services. The hacker uses TCP communication flags to establish a connection with the host and\nstarts communicating with it. He sends a SYN packet to a port on the host and receives a SYN/ACK packet back. He then sends an ACK packet for\nthe received SYN/ACK packet, which triggers an open connection. Which of the following actions should the ethical hacker perform next?", "a": ["Send a FIN or RST packet to close the connection.", "Scan another port on the same host using the SYN, ACK, and RST flags.", "Send a PSH packet to inform the receiving application about the buffered data.", "Conduct a vulnerability scan on the open port to identify any potential weaknesses."], "c": [3], "e": null}, {"q": "A multinational corporation's computer system was infiltrated by an advanced persistent threat (APT). During forensic analysis, it was discovered\nthat the malware was utilizing a blend of two highly sophisticated techniques to stay undetected and continue its operations.\nFirstly, the malware was embedding its harmful code into the actual binary or executable part of genuine system files rather than appending or\nprepending itself to the files. This made it exceptionally difficult to detect and eradicate, as doing so risked damaging the system files themselves.\nSecondly, the malware exhibited characteristics of a type of malware that changes its code as it propagates, making signature-based detection\napproaches nearly impossible.\nOn top of these, the malware maintained a persistent presence by installing itself in the registry, making it able to survive system reboots.\nGiven these distinctive characteristics, which two types of malware techniques does this malware most closely embody?", "a": ["Polymorphic and Macro malware", "Polymorphic and Metamorphic malware", "Metamorphic and Rootkit malware", "Macro and Rootkit malware"], "c": [2], "e": null}, {"q": "As a certified ethical hacker, you are performing a system hacking process for a company that is suspicious about its security system. You found\nthat the company's passwords are all known words, but not in the dictionary. You know that one employee always changes the password by just\nadding some numbers to the old password. Which attack is most likely to succeed in this scenario?", "a": ["Brute-Force Attack", "Password Spraying Attack", "Hybrid Attack", "Rule-based Attack"], "c": [2], "e": null}, {"q": "A security analyst is investigating a potential network-level session hijacking incident. During the investigation, the analyst finds that the attacker\nhas been using a technique in which they injected an authentic-looking reset packet using a spoofed source IP address and a guessed\nacknowledgment number. As a result, the victim's connection was reset. Which of the following hijacking techniques has the attacker most likely\nused?", "a": ["Blind hijacking", "TCP/IP hijacking", "UDP hijacking", "RST hijacking"], "c": [3], "e": null}, {"q": "During a red team engagement, an ethical hacker is tasked with testing the security measures of an organization's wireless network. The hacker\nneeds to select an appropriate tool to carry out a session hijacking attack. Which of the following tools should the hacker use to effectively\nperform session hijacking and subsequent security analysis, given that the target wireless network has the Wi-Fi Protected Access-pre-shared key\n(WPA-PSK) security protocol in place?", "a": ["DroidSheep", "Hetty", "bettercap", "FaceNiff"], "c": [2], "e": null}, {"q": "As a certified ethical hacker, you are tasked with gaining information about an enterprise's internal network. You are permitted to test the\nnetwork's security using enumeration techniques. You successfully obtain a list of usernames using email IDs and execute a DNS Zone Transfer.\nWhich enumeration technique would be most effective for your next move given that you have identified open TCP ports 25 (SMTP) and 139\n(NetBIOS Session Service)?", "a": ["Exploit the NFS protocol on TCP port 2049 to gain control over a remote system", "Perform a brute force attack on Microsoft Active Directory to extract valid usernames", "Exploit the NetBIOS Session Service on TCP port 139 to gain unauthorized access to the file system", "Use SNMP to extract usernames given the community strings"], "c": [2], "e": null}, {"q": "A large corporate network is being subjected to repeated sniffing attacks. To increase security, the company's IT department decides to implement\na combination of several security measures. They permanently add the MAC address of the gateway to the ARP cache, switch to using IPv6\ninstead of IPv4, implement the use of encrypted sessions such as SSH instead of Telnet, and use Secure File Transfer Protocol instead of FTP.\nHowever, they are still faced with the threat of sniffing. Considering the countermeasures, what should be their next step to enhance network\nsecurity?", "a": ["Enable network identification broadcasts", "Implement network scanning and monitoring tools", "Use HTTP instead of HTTPS for protecting usernames and passwords", "Retrieve MAC addresses from the OS"], "c": [1], "e": null}, {"q": "As the chief security officer at SecureMobile, you are overseeing the development of a mobile banking application. You are aware of the potential\nrisks of man-in-the-middle (MitM) attacks where an attacker might intercept communication between the app and the bank's servers. Recently, you\nhave learned about a technique used by attackers where they use rogue Wi-Fi hotspots to conduct MitM attacks. To prevent this type of attack,\nyou plan to implement a security feature in the mobile app. What should this feature accomplish?", "a": ["It should prevent the app from connecting to any unencrypted Wi-Fi networks.", "It should prevent the app from communicating over a network if it detects a rogue access point.", "It should require two-factor authentication for user logins.", "It should require users to change their password every 30 days."], "c": [1], "e": null}, {"q": "A cyber attacker has initiated a series of activities against a high-profile organization following the Cyber Kill Chain Methodology. The attacker is\npresently in the \"Delivery\" stage. As an Ethical Hacker, you are trying to anticipate the adversary's next move. What is the most probable\nsubsequent action from the attacker based on the Cyber Kill Chain Methodology?", "a": ["The attacker will start reconnaissance to gather as much information as possible about the target.", "The attacker will exploit the malicious payload delivered to the target organization and establish a foothold.", "The attacker will initiate an active connection to the target system to gather more data.", "The attacker will attempt to escalate privileges to gain complete control of the compromised system."], "c": [1], "e": null}, {"q": "You are a cloud security expert at CloudGuard Inc. working with a client who plans to transition their infrastructure to a public cloud. The client\nexpresses concern about potential data breaches and wants to ensure that only authorized personnel can access certain sensitive resources. You\npropose implementing a Zero Trust security model. Which of the following best describes how the Zero Trust model would enhance the security of\ntheir cloud resources?", "a": ["It operates on the principle of least privilege, verifying each request as if it is from an untrusted source, regardless of its location.", "It encrypts all data stored in the cloud, ensuring only authorized users can decrypt it.", "It ensures secure data transmission by implementing SSL/TLS protocols.", "It uses multi-factor authentication for all user accounts."], "c": [0], "e": null}, {"q": "Your company, Encryptor Corp, is developing a new application that will handle highly sensitive user information. As a cybersecurity specialist, you\nwant to ensure this data is securely stored. The development team proposes a method where data is hashed and then encrypted before storage.\nHowever, you want an added layer of security to verify the integrity of the data upon retrieval. Which of the following cryptographic concepts\nshould you propose to the team?", "a": ["Apply a digital signature mechanism.", "Switch to elliptic curve cryptography.", "Implement a block cipher mode of operation.", "Suggest using salt with hashing."], "c": [0], "e": null}, {"q": "As part of a penetration testing team, you've discovered a web application vulnerable to Cross-Site Scripting (XSS). The application sanitizes\ninputs against standard XSS payloads but fails to filter out HTML-encoded characters. On further analysis, you've noticed that the web application\nuses cookies to track session IDs. You decide to exploit the XSS vulnerability to steal users' session cookies. However, the application\nimplements HTTPOnly cookies, complicating your original plan. Which of the following would be the most viable strategy for a successful attack?", "a": ["Develop a browser exploit to bypass the HTTPOnly restriction, then use a HTML-encoded XSS payload to retrieve the cookies.", "Build an XSS payload using HTML encoding and use it to exploit the server-side code, potentially disabling the HTTPOnly flag on cookies.", "Utilize an HTML-encoded XSS payload to trigger a buffer overflow attack, forcing the server to reveal the HTTPOnly cookies.", "Create a sophisticated XSS payload that leverages HTML encoding to bypass the input sanitization, and then use it to redirect users to a"], "c": [3], "e": null}, {"q": "An ethical hacker is testing the security of a website's database system against SQL Injection attacks. They discover that the IDS has a strong\nsignature detection mechanism to detect typical SQL injection patterns. Which evasion technique can be most effectively used to bypass the IDS\nsignature detection while performing a SQL Injection attack?", "a": ["Employ IP fragmentation to obscure the attack payload", "Use Hex encoding to represent the SQL query string", "Leverage string concatenation to break identifiable keywords", "Implement case variation by altering the case of SQL statements"], "c": [1], "e": null}, {"q": "You have been hired as an intern at a start-up company. Your first task is to help set up a basic web server for the company's new website. The\nteam leader has asked you to make sure the server is secure from common threats. Based on your knowledge from studying for the CEH exam,\nwhich of the following actions should be your priority to secure the web server?", "a": ["Limiting the number of concurrent connections to the server", "Installing a web application firewall", "Regularly updating and patching the server software", "Encrypting the company's website with SSL/TLS"], "c": [2], "e": null}, {"q": "A sophisticated attacker targets your web server with the intent to execute a Denial of Service (DoS) attack. His strategy involves a unique mixture\nof TCP SYN, UDP and ICMP floods, using 'r' packets per second. Your server, reinforced with advanced security measures, can handle `h' packets\nper second before it starts showing signs of strain. If 'r' surpasses `h', it overwhelms the server, causing it to become unresponsive. In a peculiar\npattern, the attacker selects 'r' as a composite number and `h' as a prime number, making the attack detection more challenging. Considering\n'r=2010' and different values for `h', which of the following scenarios would potentially cause the server to falter?", "a": ["h=1987: The attacker's packet rate exceeds the server's capacity, causing potential unresponsiveness.", "h=1993: Despite being less than 'r', the server's prime number capacity keeps it barely operational, but the risk of falling is", "h=2003: The server can manage more packets than the attacker is sending, hence it stays operational.", "h=1999: Despite the attacker's packet flood, the server can handle these requests, remaining responsive."], "c": [0], "e": null}, {"q": "An IT security team is conducting an internal review of security protocols in their organization to identify potential vulnerabilities. During their\ninvestigation, they encounter a suspicious program running on several computers. Further examination reveals that the program has been logging\nall user keystrokes. How can the security team confirm the type of program and what countermeasures should be taken to ensure the same attack\ndoes not occur in the future?", "a": ["The program is a keylogger; the team should employ intrusion detection systems and regularly update the system software.", "The program is spyware; the team should use password managers and encrypt sensitive data.", "The program is a Trojan; the team should regularly update antivirus software and install a reliable firewall.", "The program is a keylogger; the team should educate employees about phishing attacks and maintain regular backups."], "c": [0], "e": null}, {"q": "Being a Certified Ethical Hacker (CEH), a company has brought you on board to evaluate the safety measures in place for their network system.\nThe company uses a network time protocol server in the demilitarized zone. During your enumeration, you decide to run a ntptrace command.\nGiven the syntax: ntptrace [-n] [-m maxhosts] [servername/IP_address], which command usage would best serve your objective to find where the\nNTP server obtains the time from and to trace the list of NTP servers connected to the network?", "a": ["ntptrace -n -m 5192.168.1.1", "ntptrace -m 5192.168.1.1", "ntptrace 192.168.1.1", "ntptrace -n localhost"], "c": [2], "e": null}, {"q": "A Certified Ethical Hacker is attempting to gather information about a target organization's network structure through network footprinting. During\nthe operation, they encounter ICMP blocking by the target system's firewall. The hacker wants to ascertain the path that packets take to the host\nsystem from a source, using an alternative protocol. Which of the following actions should the hacker consider next?", "a": ["Use UDP Traceroute in the Linux operating system by executing the `traceroute' command with the destination IP or domain name.", "Utilize the Path Analyzer Pro to trace the route from the source to the destination target systems.", "Use the ICMP Traceroute on the Windows operating system as it is the default utility.", "Use the ARIN Whois database search tool to find the network range of the target network."], "c": [0], "e": null}, {"q": "An ethical hacker is preparing to scan a network to identify live systems. To increase the efficiency and accuracy of his scans, he is considering\nseveral different host discovery techniques. He expects several unused IP addresses at any given time, specifically within the private address\nrange of the LAN, but he also anticipates the presence of restrictive firewalls that may conceal active devices. Which scanning method would be\nmost effective in this situation?", "a": ["ARP Ping Scan", "ICMP ECHO Ping Sweep", "ICMP Timestamp Ping", "TCP SYN Ping"], "c": [0], "e": null}, {"q": "A penetration tester is tasked with gathering information about the subdomains of a target organization's website. The tester needs a versatile\nand efficient solution for the task. Which of the following options would be the most effective method to accomplish this goal?", "a": ["Employing a tool like Sublist3r, which is designed to enumerate the subdomains of websites using OSINT", "Using a people search service, such as Spokeo or Intelius, to gather information about the employees of the target organization", "Analyzing LinkedIn profiles to find employees of the target company and their job titles", "Utilizing the Harvester tool to extract email addresses related to the target domain using a search engine like Google or Bing"], "c": [0], "e": null}, {"q": "Your network infrastructure is under a SYN flood attack. The attacker has crafted an automated botnet to simultaneously send 's' SYN packets per\nsecond to the server. You have put measures in place to manage `f' SYN packets per second, and the system is designed to deal with this number\nwithout any performance issues. If 's' exceeds 'f', the network infrastructure begins to show signs of overload. The system's response time\nincreases exponentially (2*k), where 'k' represents each additional SYN packet above the 'f' limit. Now, considering 's=500' and different 'f' values,\nin which scenario is the server most likely to experience overload and significantly increased response times?", "a": ["f=490: The server can handle 490 SYN packets per second. With 's' exceeding `f' by 10, the response time shoots up (2\u00ef\u00bf\u00bd10 = 1024 times the", "f=505: The server can handle 505 SYN packets per second. In this case, the response time increases but not as drastically (245 = 32 times", "f=495: The server can handle 495 SYN packets per second. The response time drastically rises, indicating a", "f=510: The server can handle 510 SYN packets per second, which is greater than what the attacker is sending. The system stays stable, and"], "c": [0], "e": null}, {"q": "A penetration tester is conducting an assessment of a web application for a financial institution. The application uses form-based authentication\nand does not implement account lockout policies after multiple failed login attempts. Interestingly, the application displays detailed error\nmessages that disclose whether the username or password entered is incorrect. The tester also notices that the application uses HTTP headers\nto prevent clickjacking attacks but does not implement Content Security Policy (CSP). With these observations, which of the following attack\nmethods would likely be the most effective for the penetration tester to exploit these vulnerabilities and attempt unauthorized access?", "a": ["The tester could launch a Cross-Site Scripting attack to steal authenticated session cookies, potentially bypassing the clickjacking", "The tester could execute a Brute Force attack, leveraging the lack of account lockout policy and the verbose error messages to guess the", "The tester could execute a Man-in-the-Middle attack to intercept and modify the HTTP headers for a Clickjacking attack.", "The tester could exploit a potential SQL Injection vulnerability to manipulate the application's database."], "c": [1], "e": null}, {"q": "In a large organization, a network security analyst discovered a series of packet captures that seem unusual. The network operates on a switched\nEthernet environment. The security team suspects that an attacker might be using a sniffer tool. Which technique could the attacker be using to\nsuccessfully carry out this attack, considering the switched nature of the network?", "a": ["The attacker might be implementing MAC flooding to overwhelm the switch's memory.", "The attacker might be using passive sniffing, as it provides significant stealth advantages.", "The attacker might be compromising physical security to plug into the network directly.", "The attacker is probably using a Trojan horse with in-built sniffing capability."], "c": [0], "e": null}, {"q": "You are a cybersecurity consultant for a smart city project. The project involves deploying a vast network of loT devices for public utilities like\ntraffic control, water supply, and power grid management. The city administration is concerned about the possibility of a Distributed Denial of\nService (DDoS) attack crippling these critical services. They have asked you for advice on how to prevent such an attack. What would be your\nprimary recommendation?", "a": ["Establish strong, unique passwords for each loT device.", "Deploy network intrusion detection systems across the loT network.", "Implement IP address whitelisting for all loT devices.", "Implement regular firmware updates for all loT devices."], "c": [2], "e": null}, {"q": "Consider a scenario where a Certified Ethical Hacker is attempting to infiltrate a company's network without being detected. The hacker intends to\nuse a Stealth scan on a BSD-derived TCP/IP stack, but he suspects that the network security devices may be able to detect SYN packets. Based on\nthis information, which ofthe following methods should he use to bypass the detection mechanisms and why?", "a": ["TCP Connect/Full-Open Scan, because it completes a three-way handshake with the target machine", "Maimon Scan, because it is very similar to NULL, FIN, and Xmas scans, but the probe used here is FIN/ACK", "Xmas Scan, because it can pass through filters undetected, depending on the security mechanisms installed", "ACK Flag Probe Scan, because it exploits the vulnerabilities within the BSD-derived TCP/IP stack"], "c": [3], "e": null}, {"q": "While performing a security audit of a web application, an ethical hacker discovers a potential vulnerability. The application responds to logically\nincorrect queries with detailed error messages that divulge the underlying database's structure. The ethical hacker decides to exploit this\nvulnerability further. Which type of SQL Injection attack is the ethical hacker likely to use?", "a": ["In-band SQL Injection", "UNION SQL Injection", "Error-based SQL Injection", "Blind/Inferential SQL Injection"], "c": [2], "e": null}, {"q": "You are a security analyst of a large IT company and are responsible for maintaining the organization's security posture. You are evaluating\nmultiple vulnerability assessment tools for your network. Given that your network has a hybrid IT environment with on-premise and cloud assets,\nwhich tool would be most appropriate considering its comprehensive coverage and visibility, continuous scanning, and ability to monitor\nunexpected changes before they turn into breaches?", "a": ["Qualys Vulnerability Management", "Open VAS", "Nessus Professional", "GFI LanCuard"], "c": [0], "e": null}, {"q": "Martin, a Certified Ethical Hacker (CEH), is conducting a penetration test on a large enterprise network. He suspects that sensitive information\nmight be leaking out of the network. Martin decides to use network sniffing as part of his testing methodology. Which of the following sniffing\ntechniques should Martin employ to get a comprehensive understanding of the data flowing across the network?", "a": ["MAC Flooding", "ARP Poisoning", "Raw Sniffing", "DNS Poisoning"], "c": [2], "e": null}, {"q": "As a cybersecurity consultant for SafePath Corp, you have been tasked with implementing a system for secure email communication. The key\nrequirement is to ensure both confidentiality and non-repudiation. While considering various encryption methods, you are inclined towards using a\ncombination of symmetric and asymmetric cryptography. However, you are unsure which cryptographic technique would best serve the purpose.\nWhich of the following options would you choose to meet these requirements?", "a": ["Apply asymmetric encryption with RSA and use the public key for encryption.", "Apply asymmetric encryption with RSA and use the private key for signing.", "Use the Diffie-Hellman protocol for key exchange and encryption.", "Use symmetric encryption with the AES algorithm."], "c": [1], "e": null}, {"q": "As a cybersecurity analyst for SecureNet, you are performing a security assessment of a new mobile payment application. One of your primary\nconcerns is the secure storage of customer data on the device. The application stores sensitive information such as credit card details and\npersonal identification numbers (PINs) on the device. Which of the following measures would best ensure the security of this data?", "a": ["Enable GPS tracking for all devices using the app.", "Encrypt all sensitive data stored on the device.", "Implement biometric authentication for app access.", "Regularly update the app to the latest version."], "c": [1], "e": null}, {"q": "A large multinational corporation is in the process of evaluating its security infrastructure to identify potential vulnerabilities. After a\ncomprehensive analysis, they found multiple areas of concern, including time of check/time of use (TOC/TOU) errors, improper input handling,\nand poor patch management. Which of the following approaches will best help the organization mitigate the vulnerability associated with\nTOC/TOU errors?", "a": ["Regular patching of servers, firmware, operating system, and applications", "Ensuring atomicity of operations between checking and using data resources", "Implementing stronger encryption algorithms for all data transfers", "Frequently updating firewall configurations to prevent intrusion attempts"], "c": [1], "e": null}, {"q": "A security analyst is preparing to analyze a potentially malicious program believed to have infiltrated an organization's network. To ensure the\nsafety and integrity of the production environment, the analyst decided to use a sheep dip computer for the analysis. Before initiating the analysis,\nwhat key step should the analyst take?", "a": ["Store the potentially malicious program on an external medium, such as a CD-ROM.", "Run the potentially malicious program on the sheep dip computer to determine its behavior.", "Install the potentially malicious program on the sheep dip computer.", "Connect the sheep dip computer to the organization's internal network."], "c": [0], "e": null}, {"q": "As an IT Security Analyst, you've been asked to review the security measures of an e-commerce website that relies on a SQL database for storing\nsensitive customer data. Recently, an anonymous tip has alerted you to a possible threat: a seasoned hacker who specializes in SQL Injection\nattacks may be targeting your system. The site already employs input validation measures to prevent basic injection attacks, and it blocks any\nuser inputs containing suspicious patterns. However, this hacker is known to use advanced SQL Injection techniques. Given this situation, which\nof the following strategies would the hacker most likely adopt to bypass your security measures?", "a": ["The hacker may resort to a DDoS attack instead, attempting to crash the server and thus render the e-commerce site unavailable", "The hacker could deploy an `out-of-band' SQL Injection attack, extracting data via a different communication channel, such as DNS or HTTP", "The hacker might employ a `blind' SQL Injection attack, taking advantage of the application's true or false responses to extract data bit by", "The hacker may try to use SQL commands which are less known and less likely to be blocked by your system's security"], "c": [1], "e": null}, {"q": "Your company, SecureTech Inc., is planning to transmit some sensitive data over an unsecured communication channel. As a cyber security\nexpert, you decide to use symmetric key encryption to protect the data. However, you must also ensure the secure exchange of the symmetric key.\nWhich of the following protocols would you recommend to the team to achieve this?", "a": ["Switching all data transmission to the HTTPS protocol.", "Utilizing SSH for secure remote logins to the servers.", "Implementing SSL certificates on your company's web servers.", "Applying the Diffie-Hellman protocol to exchange the symmetric key."], "c": [3], "e": null}, {"q": "As an IT intern, you have been asked to help set up a secure Wi-Fi network for a local coffee shop. The owners want to provide free Wi-Fi to their\ncustomers, but they are concerned about potential security risks. They are looking for a simple yet effective solution that would not require a lot of\ntechnical knowledge to manage. Which of the following security measures would be the most suitable in this context?", "a": ["Implement WPA2 or WPA3 encryption", "Require customers to use VPN when connected to the Wi-Fi", "Disable the network's SSID broadcast", "Enable MAC address filtering"], "c": [0], "e": null}, {"q": "During a penetration test, an ethical hacker is exploring the security of a complex web application. The application heavily relies on JavaScript for\nclient-side input sanitization, with an apparent assumption that this alone is adequate to prevent injection attacks. During the investigation, the\nethical hacker also notices that the application utilizes cookies to manage user sessions but does not enable the HttpOnly flag. This lack of flag\npotentially exposes the cookies to client-side scripts. Given these identified vulnerabilities, what would be the most effective strategy for the\nethical hacker to exploit this application?", "a": ["Launch a Cross-Site Scripting attack, aiming to bypass the client-side sanitization and exploit the exposure of session cookies.", "Employ a brute-force attack to decipher user credentials, considering the lack of server-side validation.", "Instigate a Distributed Denial of Service attack to overload the server, capitalizing on potential weak server-side security.", "Implement an SQL Injection attack to take advantage of potential unvalidated input and gain unauthorized database access."], "c": [0], "e": null}, {"q": "In the process of footprinting a target website, an ethical hacker utilized various tools to gather critical information. The hacker encountered a\ntarget site where standard web spiders were ineffective due to a specific file in its root directory. However, they managed to uncover all the files\nand web pages on the target site, monitoring the resulting incoming and outgoing traffic while browsing the website manually. What technique did\nthe hacker likely employ to achieve this?", "a": ["User-directed spidering with tools like Burp Suite and WebScarab", "Using the Netcraft tool to gather website information", "Using Photon to retrieve archived URLs of the target website from archive.org", "Examining HTML source code and cookies"], "c": [0], "e": null}, {"q": "During a comprehensive security assessment, your cybersecurity team at XYZ Corp stumbles upon signs that point toward a possible Advanced\nPersistent Threat (APT) infiltration in the network infrastructure. These sophisticated threats often exhibit subtle indicators that distinguish them\nfrom other types of cyberattacks. To confirm your suspicion and adequately isolate the potential APT, which of the following actions should you\nprioritize?", "a": ["Vigilantly monitor for evidence of zero-day exploits that manage to evade your firewall or antivirus software", "Search for proof of a spear-phishing attempt, such as the presence of malicious emails or risky attachments", "Investigate for anomalies in file movements or unauthorized data access attempts within your database system", "Scrutinize for repeat network login attempts from unrecognized geographical regions"], "c": [2], "e": null}, {"q": "As a budding cybersecurity enthusiast, you have set up a small lab at home to learn more about wireless network security. While experimenting\nwith your home Wi-Fi network, you decide to use a well-known hacking tool to capture network traffic and attempt to crack the Wi-Fi password.\nHowever, despite many attempts, you have been unsuccessful. Your home Wi-Fi network uses WPA2 Personal with AES encryption. Why are you\nfinding it difficult to crack the Wi-Fi password?", "a": ["Your hacking tool is outdated.", "The network is using MAC address filtering.", "The Wi-Fi password is too complex and long.", "The network is using an uncrackable encryption method."], "c": [2], "e": null}, {"q": "An ethical hacker is testing a web application of a financial firm. During the test, a `Contact Us' form's input field is found to lack proper user input\nvalidation, indicating a potential Cross-Site Scripting (XSS) vulnerability. However, the application has a stringent Content Security Policy (CSP)\ndisallowing inline scripts and scripts from external domains but permitting scripts from its own domain. What would be the hacker's next step to\nconfirm the XSS vulnerability?", "a": ["Load a script from an external domain to test the vulnerability", "Inject a benign script inline to the form to see if it executes", "Utilize a script hosted on the application's domain to test the form", "Try to disable the CSP to bypass script restrictions"], "c": [2], "e": null}, {"q": "John, a security analyst, is analyzing a server suspected of being compromised. The attacker has used a non admin account and has already\ngained a foothold on the system. John discovers that a new Dynamic Link Library is loaded in the application directory of the affected server. This\nDLL does not have a fully qualified path and seems to be malicious. What privilege escalation technique has the attacker likely used to\ncompromise this server?", "a": ["Exploiting Misconfigured Services", "Named Pipe Impersonation", "DLL Hijacking", "Spectre and Meltdown Vulnerabilities"], "c": [2], "e": null}, {"q": "Alex, a cloud security engineer working in Eyecloud Inc. is tasked with isolating applications from the underlying infrastructure and stimulating\ncommunication via well-defined channels. For this purpose, he used an open-source technology that helped him in developing, packaging, and\nrunning applications; further, the technology provides PaaS through OS-level virtualization, delivers containerized software packages, and\npromotes fast software delivery.\nWhat is the cloud technology employed by Alex in the above scenario?", "a": ["Serverless computing", "Zero trust network", "Virtual machine", "Docker"], "c": [3], "e": null}, {"q": "Henry is a penetration tester who works for XYZ organization. While performing enumeration on a client organization, he queries the DNS server\nfor a specific cached DNS record. Further, by using this cached record, he determines the sites recently visited by the organization's user.\nWhat is the enumeration technique used by Henry on the organization?", "a": ["DNSSEC zone walking", "DNS zone walking", "DNS cache snooping", "DNS cache poisoning"], "c": [2], "e": null}, {"q": "Gregory, a professional penetration tester working at Sys Security Ltd., is tasked with performing a security test of web applications used in the\ncompany. For this purpose, Gregory uses a tool to test for any security loopholes by hijacking a session between a client and server. This tool has\na feature of intercepting proxy that can be used to inspect and modify the traffic between the browser and target application. This tool can also\nperform customized attacks and can be used to test the randomness of session tokens.\nWhich of the following tools is used by Gregory in the above scenario?", "a": ["Nmap", "CxSAST", "Bu
